# Agent HQ – nur /api/ an den Node-Service weiterreichen.
# Das statische Dashboard (index.html, status.json, uptime.json) liefert Plesk
# weiter direkt aus httpdocs; nur die dynamischen Endpunkte gehen an Node.
#
# Einfügen in Plesk:
#   Domain agents.naschberger.info -> Apache & nginx Settings
#   -> "Zusätzliche nginx-Direktiven" -> untenstehenden Block einfügen -> Übernehmen.
#
# Sicherheit: Node lauscht nur auf 127.0.0.1 (nicht von außen erreichbar).
# Der Passwortschutz der Domain (Plesk) gilt für dieselbe vhost auch für /api/.

location /api/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
}
