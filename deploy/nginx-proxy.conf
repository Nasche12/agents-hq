# Agent HQ – nur /api/ an den Node-Service weiterreichen.
# Das statische Dashboard (index.html, status.json, uptime.json) liefert Plesk
# weiter direkt aus httpdocs; nur die dynamischen Endpunkte gehen an Node.
#
# Einfügen in Plesk:
#   Domain agents.naschberger.info -> Apache & nginx Settings
#   -> "Zusätzliche nginx-Direktiven" -> untenstehenden Block einfügen -> Übernehmen.
#
# Sicherheit: Node lauscht nur auf 127.0.0.1 (nicht von außen erreichbar).
# Der Plesk-Passwortschutz sitzt in einem "location ~ ^/"-Regex-Block, den unser
# "^~ /api/" NICHT erbt -> /api/ ist allein durch die Basic-Auth in server.js
# (HQ_USER/HQ_PASS) geschützt. Diese müssen daher = den Plesk-Login-Daten sein.
#
# WICHTIG: "^~" ist Pflicht. Plesk generiert im vhost einen Regex-Catch-all
# "location ~ ^/ { proxy_pass ...7081 (Apache) }". Ein normales "location /api/"
# ist nur ein Prefix (nginx-Prio 4) und verliert gegen den Regex (Prio 3) -> der
# Request geht an Apache -> 404. "^~" hebt den Prefix auf Prio 2 und schaltet die
# Regex-Prüfung für diesen Pfad ab, sodass der Proxy zu Node greift.

location ^~ /api/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
}

# SPA-Reload-Fix: Das Dashboard ist eine Single-Page-App mit "sauberen" URLs
# (history.pushState -> /analytics, /systems ...). Beim RELOAD oder Direktaufruf
# fragt der Browser diese Pfade direkt beim Server an. Es gibt aber keine Datei
# httpdocs/analytics -> Plesks Regex-Catch-all "~ ^/" liefert eine 404-Fehlerseite.
# Lösung: für die bekannten App-Routen index.html aus dem Docroot ausliefern; der
# Client-Router übernimmt dann anhand des Pfads. "location =" (exakter Match) hat
# nginx-Priorität 1 und schlägt Plesks Regex-Catch-all zuverlässig.
# Assets bleiben relativ ladbar, weil die Pfade KEINEN Slash am Ende haben
# (Basis bleibt "/", also lädt "app.js" korrekt als /app.js).
# Neue Top-Level-View ergänzt? -> hier eine weitere Zeile hinzufügen.
location = /overview    { try_files /index.html =404; }
location = /agents      { try_files /index.html =404; }
location = /missions    { try_files /index.html =404; }
location = /automations { try_files /index.html =404; }
location = /analytics   { try_files /index.html =404; }
location = /systems     { try_files /index.html =404; }
location = /trading     { try_files /index.html =404; }

# Discord Slash-Commands: Discord POSTet signierte Interactions hierher.
# WICHTIG: Dieser Pfad muss OHNE Passwortschutz erreichbar sein (Discord kann sich
# nicht per Basic-Auth anmelden). Signatur-Prüfung (ed25519) macht server.js selbst.
# Als Interactions Endpoint URL im Dev-Portal eintragen:
#   https://agents.naschberger.info/discord/interactions
location = /discord/interactions {
    auth_basic off;
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Signatur-Header durchreichen (nginx reicht sie per Default weiter; explizit zur Sicherheit):
    proxy_set_header X-Signature-Ed25519 $http_x_signature_ed25519;
    proxy_set_header X-Signature-Timestamp $http_x_signature_timestamp;
    proxy_read_timeout 10s;
}
