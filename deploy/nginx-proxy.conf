# Agent HQ – nur /api/ an den Node-Service weiterreichen.
# Das statische Dashboard (index.html, status.json, uptime.json) liefert Plesk
# weiter direkt aus httpdocs; nur die dynamischen Endpunkte gehen an Node.
#
# Einfügen in Plesk:
#   Domain agents.naschberger.info -> Apache & nginx Settings
#   -> "Zusätzliche nginx-Direktiven" -> untenstehenden Block einfügen -> Übernehmen.
#
# Sicherheit: Node lauscht nur auf 127.0.0.1 (nicht von außen erreichbar).
# Der Passwortschutz der Domain (Plesk) gilt für dieselbe vhost auch für /api/.

location /api/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
}

# Discord Slash-Commands: Discord POSTet signierte Interactions hierher.
# WICHTIG: Dieser Pfad muss OHNE Passwortschutz erreichbar sein (Discord kann sich
# nicht per Basic-Auth anmelden). Signatur-Prüfung (ed25519) macht server.js selbst.
# Als Interactions Endpoint URL im Dev-Portal eintragen:
#   https://agents.naschberger.info/discord/interactions
location = /discord/interactions {
    auth_basic off;
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Signatur-Header durchreichen (nginx reicht sie per Default weiter; explizit zur Sicherheit):
    proxy_set_header X-Signature-Ed25519 $http_x_signature_ed25519;
    proxy_set_header X-Signature-Timestamp $http_x_signature_timestamp;
    proxy_read_timeout 10s;
}
