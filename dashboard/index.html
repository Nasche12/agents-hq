<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent HQ – naschberger.info</title>
<style>
:root{
 --bg:oklch(14% 0.03 290);
 --bg-deep:oklch(9% 0.02 290);
 --line-dim:oklch(42% 0.06 250);
 --txt:oklch(91% 0.02 250);
 --mut:oklch(64% 0.03 260);
 --panel:oklch(15% 0.03 280 / .96);
 --cyan:oklch(80% 0.14 200);
 --grn:oklch(80% 0.17 160);
 --amb:oklch(83% 0.15 85);
 --red:oklch(70% 0.19 25);
 --vio:oklch(75% 0.14 300);
}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{
 font-family:"Segoe UI",system-ui,sans-serif;color:var(--txt);
 background:
  radial-gradient(1100px 600px at 75% -10%, oklch(22% 0.07 300 / .5), transparent 60%),
  radial-gradient(900px 600px at 10% 110%, oklch(19% 0.06 220 / .5), transparent 60%),
  linear-gradient(var(--bg), var(--bg-deep));
 overflow:hidden;
}
@media(max-width:1020px){body{overflow-y:auto;overflow-x:hidden}}
.mono{font-family:Consolas,"Cascadia Mono",monospace}
button{font-family:inherit}

#hud{position:fixed;top:0;left:0;right:440px;z-index:5;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 24px;pointer-events:none}
#hud h1{font-size:1rem;letter-spacing:.32em;text-transform:uppercase;font-weight:600}
#hud h1 span{color:var(--cyan)}
#hud h1::after{content:"";display:block;width:52px;height:1px;margin-top:6px;background:linear-gradient(90deg,var(--cyan),transparent)}
#meta{font-size:.64rem;color:var(--mut);text-align:right;letter-spacing:.08em;text-transform:uppercase;line-height:1.7}
#meta .src{display:block}
#demo{display:none;position:fixed;top:10px;left:calc((100vw - 440px)/2);transform:translateX(-50%);z-index:6;border:1px solid var(--amb);color:var(--amb);
 background:oklch(20% 0.04 85 / .88);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px}
#legend{position:fixed;left:24px;bottom:10px;z-index:5;display:flex;gap:14px;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);pointer-events:none}
#legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;background:currentColor;box-shadow:0 0 6px currentColor}
@media(max-width:1020px){
 #hud{position:static;padding:12px 16px 0;right:auto;flex-wrap:wrap;gap:6px;align-items:baseline}
 #meta{text-align:left;font-size:.6rem;flex-basis:100%}
 #meta .src{display:inline}
 #meta .src::before{content:" · "}
 #legend{position:static;padding:8px 16px;flex-wrap:wrap;gap:10px;letter-spacing:.06em}
 #demo{position:static;transform:none;margin:8px auto 0;max-width:92%;width:max-content}
}

#stage{position:fixed;inset:0 440px 34px 0;display:grid;place-items:center;padding:54px 14px 6px;z-index:1}
#game{width:min(100%,calc((100vh - 96px)*1.84));aspect-ratio:46/25;image-rendering:pixelated;cursor:pointer;
 filter:drop-shadow(0 20px 50px oklch(5% 0.02 290 / .85))}
@media(max-width:1020px){
 #stage{position:static;display:block;padding:8px 0;overflow-x:auto}
 #game{width:940px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}}

/* ---------- mission control ---------- */
#mc{position:fixed;top:0;right:0;bottom:0;width:440px;z-index:8;background:var(--panel);
 border-left:1px solid var(--line-dim);display:flex;flex-direction:column;overflow:hidden}
#mc::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;
 background:linear-gradient(180deg,var(--cyan),transparent 40%,transparent 60%,var(--cyan))}
#mc header{padding:16px 20px 10px}
#mc header h2{font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;color:var(--cyan)}
#mc header .sub{font-size:.62rem;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
#agents{padding:4px 14px}
.arow{display:grid;grid-template-columns:10px 1fr auto auto;gap:10px;align-items:center;width:100%;
 padding:9px 10px;margin:3px 0;background:none;border:1px solid transparent;color:var(--txt);cursor:pointer;text-align:left}
.arow:hover,.arow:focus-visible{border-color:var(--line-dim);outline:none}
.arow.sel{border-color:oklch(60% 0.1 220 / .6);background:oklch(20% 0.04 250 / .4)}
.arow .dot{width:9px;height:9px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
.arow .nm{font-size:.8rem;letter-spacing:.04em;color:var(--txt)}
.arow .nm small{display:block;font-size:.62rem;color:var(--mut);letter-spacing:.08em;text-transform:uppercase}
.arow .pr{font-size:.66rem;color:var(--mut);font-family:Consolas,monospace}
.runbtn{border:1px solid var(--line-dim);background:none;color:var(--cyan);font-size:.72rem;
 padding:5px 11px;cursor:pointer;letter-spacing:.1em}
.runbtn:hover:not(:disabled),.runbtn:focus-visible{border-color:var(--cyan);background:oklch(30% 0.06 210 / .3);outline:none}
.runbtn:disabled{color:var(--mut);cursor:not-allowed;opacity:.55}
#tabs{display:flex;padding:8px 20px 0;border-bottom:1px solid var(--line-dim)}
#tabs button{flex:1;background:none;border:0;border-bottom:2px solid transparent;color:var(--mut);
 font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;padding:9px 0;cursor:pointer}
#tabs button:hover,#tabs button:focus-visible{color:var(--txt);outline:none}
#tabs button.on{color:var(--cyan);border-bottom-color:var(--cyan)}
#tabbody{flex:1;overflow-y:auto;padding:16px 20px;font-size:.84rem}
.plbl{color:var(--mut);font-size:.64rem;text-transform:uppercase;letter-spacing:.18em;margin:13px 0 4px}
.plbl:first-child{margin-top:0}
.pbar{height:6px;background:oklch(12% 0.02 280);border:1px solid var(--line-dim);overflow:hidden}
.pbar div{height:100%;background:linear-gradient(90deg,var(--cyan),var(--vio));transition:width .6s}
.st{font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;display:inline-block;padding:3px 11px;border:1px solid;margin-bottom:4px}
#tabbody ul{margin:4px 0 0 16px;line-height:1.55}
#tabbody pre{background:oklch(11% 0.02 280);border:1px solid var(--line-dim);padding:10px;font-size:.66rem;
 white-space:pre-wrap;word-break:break-word;color:oklch(78% 0.04 200);line-height:1.5;max-height:52vh;overflow:auto}
#tabbody .hint{color:var(--mut);font-style:italic;font-size:.78rem}
#tabbody code{color:var(--cyan);font-size:.76rem}
.repitem{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:baseline;width:100%;padding:8px 10px;margin:2px 0;
 background:none;border:1px solid transparent;color:var(--txt);cursor:pointer;text-align:left;font-size:.76rem}
.repitem:hover,.repitem:focus-visible{border-color:var(--line-dim);outline:none}
.repitem .d{color:var(--mut);font-size:.62rem;font-family:Consolas,monospace}
.repitem .p{color:var(--mut);font-size:.62rem;font-family:Consolas,monospace;grid-column:1/-1}
.mcounts{display:flex;flex-wrap:wrap;gap:14px;font-size:.72rem;font-family:Consolas,monospace;margin-bottom:6px}
.mcounts i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;box-shadow:0 0 6px currentColor;vertical-align:baseline}
.mflag{font-size:.76rem;border:1px solid;padding:9px 11px;margin:10px 0;line-height:1.55}
.mflag b{letter-spacing:.04em}
.mflag.err{color:var(--red);border-color:oklch(52% 0.14 25/.6);background:oklch(24% 0.07 25/.22)}
.mflag.wait{color:var(--amb);border-color:oklch(56% 0.11 85/.5);background:oklch(24% 0.06 85/.16)}
.mtable{display:flex;flex-direction:column;gap:2px}
.mrow{display:grid;grid-template-columns:9px 1fr auto auto;gap:11px;align-items:center;text-align:left;
 background:oklch(16% 0.02 280/.5);border:1px solid var(--line2, var(--line-dim));
 color:var(--txt);padding:8px 11px;cursor:pointer}
.mrow:hover,.mrow:focus-visible{border-color:var(--cyan);outline:none}
.mrow .mdot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 7px currentColor}
.mrow .mn{font-size:.82rem}
.mrow .mn small{display:block;color:var(--mut);font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.mrow .mp{color:var(--cyan);font-size:.72rem}
.mrow .mnext{color:var(--mut);font-size:.66rem;min-width:64px;text-align:right}
/* ---- Nav-Struktur: Kommando-Button + Flotten-Label ---- */
.navlabel{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mut);padding:12px 12px 2px}
.cmdbtn{display:grid;grid-template-columns:11px 1fr auto;gap:11px;align-items:center;width:calc(100% - 16px);
 margin:10px 8px 2px;padding:12px 13px;cursor:pointer;text-align:left;color:var(--txt);
 background:linear-gradient(90deg,oklch(23% 0.06 330 / .55),oklch(18% 0.03 280 / .35));
 border:1px solid var(--line-dim);transition:box-shadow .16s,border-color .16s}
.cmdbtn:hover,.cmdbtn:focus-visible{border-color:var(--mc);box-shadow:inset 0 0 0 1px var(--mc);outline:none}
.cmdbtn .cdot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 9px currentColor}
.cmdbtn .ctx b{font-size:.84rem;letter-spacing:.05em;display:block}
.cmdbtn .ctx small{display:block;color:var(--mut);font-size:.64rem;margin-top:1px}
.cmdbtn .cgo{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mc);white-space:nowrap}

/* ---- Kommandozentrale-Overlay ---- */
#cmd{position:fixed;inset:0;z-index:40;display:none;overflow-y:auto;padding:26px;
 background:oklch(6% 0.02 290 / .82);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
#cmd.on{display:block}
.cmd-panel{max-width:1120px;margin:0 auto;background:var(--panel);border:1px solid var(--line-dim);
 box-shadow:0 30px 90px oklch(4% 0.02 290 / .75)}
.cmd-top{display:flex;align-items:center;gap:16px;padding:15px 22px;border-bottom:1px solid var(--line-dim);
 position:sticky;top:0;z-index:3;background:var(--panel)}
.cmd-top h2{font-size:.86rem;letter-spacing:.28em;text-transform:uppercase;color:var(--vio);white-space:nowrap}
.cmd-top .up{font-size:.6rem;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.pills{display:flex;gap:7px;flex-wrap:wrap;margin-left:auto}
.pill{font-size:.64rem;font-family:Consolas,monospace;border:1px solid currentColor;padding:3px 9px;letter-spacing:.03em}
.pill i{display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;margin-right:5px;box-shadow:0 0 6px currentColor}
.cmd-close{flex:0 0 auto;background:none;border:1px solid var(--line-dim);color:var(--txt);
 width:34px;height:34px;cursor:pointer;font-size:1.05rem;line-height:1}
.cmd-close:hover,.cmd-close:focus-visible{border-color:var(--red);color:var(--red);outline:none}
.cmd-alert{padding:12px 22px;border-bottom:1px solid var(--line-dim);font-size:.8rem;line-height:1.6}
.cmd-alert.err{color:var(--red);background:oklch(24% 0.07 25 / .2)}
.cmd-alert.wait{color:var(--amb);background:oklch(24% 0.06 85 / .16)}
.cmd-alert b{letter-spacing:.04em}
.cmd-body{display:grid;grid-template-columns:320px 1fr}
.cmd-fleet{padding:18px 20px;border-right:1px solid var(--line-dim)}
.cmd-main{padding:18px 22px;display:flex;flex-direction:column;gap:24px;min-width:0}
.sect h3{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);
 margin-bottom:11px;display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.sect h3 span{color:var(--dim,var(--mut));letter-spacing:.04em;text-transform:none;font-size:.68rem}
.chart{width:100%;height:auto;display:block}
.chart .gl{stroke:var(--line-dim);stroke-width:1;opacity:.45}
.chart .gt,.chart .bv,.chart .thrt{fill:var(--mut);font:10px Consolas,monospace}
.chart .bl{fill:var(--txt);font:11px Consolas,monospace}
.chart .thr{stroke:var(--amb);stroke-dasharray:3 3;stroke-width:1;opacity:.75}
.chart-empty{color:var(--mut);font-size:.78rem;font-style:italic;padding:26px;
 border:1px dashed var(--line-dim);text-align:center}
.legend2{display:flex;gap:16px;flex-wrap:wrap;margin-top:9px;font-size:.66rem;color:var(--mut)}
.legend2 i{display:inline-block;width:12px;height:2px;margin-right:6px;vertical-align:middle}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px}
.tile{border:1px solid var(--line-dim);padding:11px 13px;background:oklch(15% 0.02 280 / .5)}
.tile .tn{font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:7px}
.tile .tn i{width:8px;height:8px;border-radius:50%;box-shadow:0 0 6px currentColor;flex:0 0 auto}
.tile .tm{font-family:Consolas,monospace;font-size:.66rem;color:var(--mut);margin-top:7px;line-height:1.7}
.tile .tm b{color:var(--txt);font-weight:400}
.cmd-tab{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;text-align:left;width:100%;
 background:oklch(16% 0.02 280 / .5);border:1px solid transparent;color:var(--txt);padding:9px 11px;margin-bottom:3px;cursor:pointer}
.cmd-tab:hover,.cmd-tab:focus-visible{border-color:var(--line-dim);outline:none}
.cmd-tab .cn{font-size:.82rem}
.cmd-tab .cn small{display:block;color:var(--mut);font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.cmd-tab .cp{font-family:Consolas,monospace;font-size:.7rem}
.cmd-tab .cnx{font-family:Consolas,monospace;font-size:.64rem;color:var(--mut)}
.cmd-tab .cdt{width:8px;height:8px;border-radius:50%;box-shadow:0 0 6px currentColor}
@media(max-width:820px){
 #cmd{padding:0}
 .cmd-body{grid-template-columns:1fr}
 .cmd-fleet{border-right:0;border-bottom:1px solid var(--line-dim)}
 .cmd-top{flex-wrap:wrap;gap:10px}
 .pills{margin-left:0;order:3;flex-basis:100%}
}
#apibar{padding:8px 20px;border-top:1px solid var(--line-dim);font-size:.6rem;letter-spacing:.12em;
 text-transform:uppercase;color:var(--mut);display:flex;justify-content:space-between}
#apibar b{font-weight:400}
#apibar .on{color:var(--grn)} #apibar .off{color:var(--amb)}
@media(max-width:1020px){
 #mc{position:static;width:auto;border:1px solid var(--line-dim);margin:0 10px 14px;height:auto}
 #tabbody{max-height:50vh}
}
</style>
</head>
<body>
<div id="demo">Demo-Daten – kein status.json geladen</div>
<div id="hud">
 <h1>AGENT <span>HQ</span></h1>
 <div id="meta" class="mono">–</div>
</div>

<div id="stage">
 <canvas id="game" width="1472" height="800" aria-label="Agent-HQ Spielwelt: Raumstation mit Büro, Tresor, Studio, Lounge, Observatorium und Serverraum"></canvas>
</div>

<div id="legend" class="mono"></div>

<aside id="mc" aria-live="polite">
 <header>
  <h2>Mission Control</h2>
  <div class="sub">naschberger hq · agents</div>
 </header>
 <div id="agents"></div>
 <div id="tabs" role="tablist">
  <button data-tab="info" class="on">Übersicht</button>
  <button data-tab="log">Log</button>
  <button data-tab="reports">Reports</button>
 </div>
 <div id="tabbody"><p class="hint">Agent wählen: Klick auf einen Roboter in der Welt oder eine Zeile oben.</p></div>
 <div id="apibar" class="mono">
  <b id="apistate" class="off">API: PRÜFE…</b>
  <b id="foot2">refresh 30 s</b>
 </div>
</aside>

<div id="cmd" role="dialog" aria-modal="true" aria-label="Kommandozentrale" aria-hidden="true"></div>

<script>
'use strict';
/* ================================================================
   AGENT HQ – Pixel-Game-Welt (Canvas) + Mission Control
   ================================================================ */
const COLORS={running:'#53e0ff',ok:'#5df2b4',idle:'#8ea0bd',waiting:'#ffcf5c',error:'#ff7b6b'};
const LABELS={running:'läuft',ok:'fertig',idle:'freizeit',waiting:'wartet auf dein go',error:'fehler'};
const BOT_IDS=['master','wochenreport','belege-buchhaltung','content-recherche','uptime-waechter','seo-audit','rechnungssteller'];
const ROOT_OF={'master':'master','wochenreport':'reports','belege-buchhaltung':'belege','content-recherche':'content',
 'uptime-waechter':'uptime','seo-audit':'seo','rechnungssteller':'rechnungen'};
const NAME_OF={'master':'MASTER','wochenreport':'REPORT','belege-buchhaltung':'FINANZ','content-recherche':'CONTENT',
 'uptime-waechter':'UPTIME','seo-audit':'SEO','rechnungssteller':'RECHNUNG'};
const FLEET_IDS=BOT_IDS.filter(id=>id!=='master'); // die vom Master überwachten Agents

const DEMO={updated:new Date().toISOString(),agents:{
 'wochenreport':{name:'Wochenreport',status:'running',phase:'Analytics laden',progress:45,message:'Umami-Daten für 3 Kunden…',
  last_run:new Date().toISOString(),next_run:'Fr 08:00',details:['Erstellt pro Kunde: Report, PDF, E-Mail-Entwurf, Discord-Post'],outputs:[],log_tail:'kunde2: pageviews ok…'},
 'belege-buchhaltung':{name:'Belege & Buchhaltung',status:'waiting',phase:'Rückfrage offen',progress:80,message:'2 Belege unklar – dein Go?',
  last_run:new Date().toISOString(),next_run:'Mo 09:00',details:['Canva-Beleg: Rechnungsnummer fehlt'],outputs:['belege/dashboard.html'],log_tail:'3 Belege archiviert.'},
 'content-recherche':{name:'Content-Recherche',status:'ok',phase:'Contentplan fertig',progress:100,message:'7 Ideen verifiziert ✓',
  last_run:new Date().toISOString(),next_run:'So 17:00',details:['7-Tage-Plan mit Hooks'],outputs:['content/2026-KW28/contentplan.md'],log_tail:'Fertig ☕'},
 'uptime-waechter':{name:'Uptime-Wächter',status:'running',phase:'Sites prüfen',progress:60,message:'2 Sites gepingt…',
  last_run:new Date().toISOString(),next_run:'alle 15 min',details:['ferienhaus-tirol.at: 200 · 0.4 s','SSL 74 Tage'],outputs:['uptime/status.js'],log_tail:'mueller-gmbh.at: 200 ok'},
 'seo-audit':{name:'SEO-Audit',status:'error',phase:'Crawl',progress:30,message:'Sitemap 404 bei 1 Site',
  last_run:new Date().toISOString(),next_run:'Mi 06:00',details:['mueller-gmbh.at: sitemap.xml fehlt'],outputs:[],log_tail:'ferienhaus-tirol.at: title zu lang'},
 'rechnungssteller':{name:'Rechnungssteller',status:'idle',phase:'Bereit',progress:0,message:'Warte auf Positionen…',
  last_run:null,next_run:'auf Abruf',details:[],outputs:[],log_tail:'(noch kein Lauf)'}
}};

let DATA=null,SEL=null,API=false,TAB='info',REPORTS=null,UPTIME=null,CMD_OPEN=false;

/* Demo-Uptime nur im DEMO-Modus (kein echtes uptime.json geladen) – zeigt, wie die Charts aussehen. */
const DEMO_UPTIME=(()=>{
 const names=['naschberger.info','sicherrestaurant.at','ursulakircher.at'];
 const base={'naschberger.info':15,'sicherrestaurant.at':34,'ursulakircher.at':21};
 const ssl={'naschberger.info':62,'sicherrestaurant.at':35,'ursulakircher.at':41};
 const history=[];
 for(let i=23;i>=0;i--){
  history.push({t:'2026-07-08T'+String((i)%24).padStart(2,'0')+':00:00+02:00',
   p:names.map((n,k)=>{
    const jitter=[7,13,5,11,3,17,9][(i+k)%7]-8; // deterministisch, kein Math.random
    const down=(n==='sicherrestaurant.at'&&i===9);
    return {n,ms:down?null:Math.max(6,base[n]+jitter+(k*2)),ssl:ssl[n]-Math.floor(i/12),up:down?0:1};
   })});
 }
 return {stand:'2026-07-08T08:26:29+02:00',
  sites:names.map(n=>({name:n,url:'https://'+n,state:'ok',http:200,ms:base[n],ssl_days:ssl[n],checked:'2026-07-08T08:26:29+02:00'})),
  history};
})();
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const $=s=>document.querySelector(s);

/* ================= Welt / Karte =================
 Zeichen: '#' Wand, '.' Raumboden, '-' Korridor, 'D' Tür, ' ' Weltraum */
const U=32, MW=46, MH=25;
const ROWS=[
"                                              ",
" ############################################ ",
" #.............#..............#.............# ",
" #.............#..............#.............# ",
" #.............#..............#.............# ",
" #.............#..............#.............# ",
" #.............#..............#.............# ",
" #.............#..............#.............# ",
" #.............#..............#.............# ",
" ######DD#############DD###########DD####### ",
" #------------------------------------------# ",
" #------------------------------------------# ",
" #------------------------------------------# ",
" ########DD###########DD#########DD######### ",
" #................#.........#..............# ",
" #................#.........#..............# ",
" #................#.........#..............# ",
" #................#.........#..............# ",
" #................#.........#..............# ",
" #................#.........#..............# ",
" #................#.........#..............# ",
" #................#.........#..............# ",
" #................#.........#..............# ",
" ############################################ ",
"                                              ",
"                                              "
];
const grid=ROWS.map(r=>r.split(''));
const walk=(x,y)=>y>=0&&y<MH&&x>=0&&x<MW&&'.-D'.includes(grid[y][x]);
const block=(x,y)=>{grid[y][x]='#';}; // Möbel blockieren (aber eigener Look)

/* Räume (für Labels) */

/* ================= BFS-Pfad ================= */
function findPath(sx,sy,tx,ty){
 if(sx===tx&&sy===ty)return[];
 const key=(x,y)=>y*MW+x;
 const prev=new Map();const q=[[sx,sy]];prev.set(key(sx,sy),null);
 while(q.length){
  const [x,y]=q.shift();
  if(x===tx&&y===ty){
   const path=[];let k=key(x,y);
   while(k!==null){path.push([k%MW,Math.floor(k/MW)]);k=prev.get(k);}
   path.reverse();path.shift();return path;
  }
  for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
   const nx=x+dx,ny=y+dy;
   if(!walk(nx,ny)||prev.has(key(nx,ny)))continue;
   prev.set(key(nx,ny),key(x,y));q.push([nx,ny]);
  }
 }
 return null;
}

function makeSprites(accent,accent2){
 const pal={o:'#070a14',b:'#e6eaf4',s:'#a5aec6',v:'#0d1526',e:accent,g:accent,m:'#ffffff',l:'#2b3248'};
 const mk=rows=>{
  const c=document.createElement('canvas');c.width=24;c.height=32;
  const x=c.getContext('2d');
  rows.forEach((row,ry)=>{[...row].forEach((ch,rx)=>{
   if(ch==='.'||ch===' ')return;
   x.fillStyle=pal[ch]||'#f0f';x.fillRect(rx*2,ry*2,2,2);
  });});
  return c;
 };
 const flip=c=>{
  const f=document.createElement('canvas');f.width=c.width;f.height=c.height;
  const x=f.getContext('2d');x.translate(c.width,0);x.scale(-1,1);x.drawImage(c,0,0);return f;
 };
 const right=[mk(SPR_SIDE_A),mk(SPR_SIDE_B)];
 return {
  down:[mk(SPR_DOWN_A),mk(SPR_DOWN_B)],
  up:[mk(SPR_UP_A),mk(SPR_UP_B)],
  right, left:[flip(right[0]),flip(right[1])]
 };
}

function zone(x,y){return ZONES.find(z=>x>=z.x0&&x<=z.x1&&y>=z.y0&&y<=z.y1);}
function hash(x,y){let h=(x*374761393+y*668265263)|0;h=(h^(h>>13))*1274126177;return ((h^(h>>16))>>>0)/4294967295;}
function px(c,x,y,w,h){sx.fillStyle=c;sx.fillRect(x,y,w,h);}

const bots={};
function initBots(){
 BOT_IDS.forEach((id,i)=>{
  bots[id]={id,x:20+i*2,y:11,path:[],dir:'down',frame:0,ft:0,spot:null,plan:null,
   status:null,nextThink:0,moving:false};
 });
}
const taken={};
function claim(b,s){if(b.spot&&taken[b.spot]===b.id)delete taken[b.spot];if(s)taken[s]=b.id;b.spot=s;}
function freeLeisure(b){
 const o=LEISURE.filter(s=>taken[s]===undefined||taken[s]===b.id);
 return o.length?o[Math.floor(Math.random()*o.length)]:LEISURE[Math.floor(Math.random()*LEISURE.length)];
}
function think(b,now){
 const a=DATA&&DATA.agents[b.id];if(!a)return;
 const st=a.status||'idle';
 let s;
 if(b.id==='master')s='command'; // Master bleibt immer an der Kommandostation
 else if(st==='running')s=WORK[b.id];
 else if(st==='waiting')s=WAIT[b.id];
 else if(st==='error')s=WORK[b.id];
 else s=freeLeisure(b);
 if(!b.spawned){ // erster Datenempfang: direkt am Ziel spawnen statt quer laufen
  b.spawned=true;claim(b,s);
  b.x=SPOTS[s].x;b.y=SPOTS[s].y;b.path=[];b.dir=SPOTS[s].face||'down';
 }else if(s!==b.spot||(!b.moving&&(Math.round(b.x)!==SPOTS[s].x||Math.round(b.y)!==SPOTS[s].y))){
  claim(b,s);
  const p=findPath(Math.round(b.x),Math.round(b.y),SPOTS[s].x,SPOTS[s].y);
  if(p)b.path=p;
 }
 b.nextThink=now+((st==='idle'||st==='ok')?(20000+Math.random()*18000):9e9);
}
const BOT_SPEED=3.6; // Kacheln/s
function updateBots(dt,now){
 for(const id of BOT_IDS){
  const b=bots[id];
  const wp=b.path[0];
  if(wp){
   b.moving=true;
   const [tx,ty]=wp;
   const dx=tx-b.x,dy=ty-b.y;
   const dist=Math.hypot(dx,dy);
   const step=BOT_SPEED*dt;
   if(dist<=step){b.x=tx;b.y=ty;b.path.shift();}
   else{b.x+=dx/dist*step;b.y+=dy/dist*step;}
   b.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');
   b.ft+=dt;
   if(b.ft>.14){b.frame=1-b.frame;b.ft=0;}
  }else{
   if(b.moving){b.moving=false;b.frame=0;if(b.spot&&SPOTS[b.spot].face)b.dir=SPOTS[b.spot].face;}
   if(DATA&&now>=b.nextThink)think(b,now);
  }
 }
}

/* Master = Live-Rollup über die Flotte. Immer aktuell, ohne eigenen Lauf.
   Ein echter Master-Eintrag (Kommandant läuft gerade) überschreibt den Rollup. */
function computeMaster(){
 const list=FLEET_IDS.map(id=>DATA.agents[id]).filter(Boolean);
 const cnt={running:0,ok:0,idle:0,waiting:0,error:0};
 list.forEach(a=>{cnt[a.status]=(cnt[a.status]||0)+1;});
 let status='idle';
 if(cnt.error)status='error';else if(cnt.running)status='running';
 else if(cnt.waiting)status='waiting';else if(cnt.ok&&!cnt.idle)status='ok';
 const parts=[];
 if(cnt.running)parts.push(cnt.running+' läuft');
 if(cnt.waiting)parts.push(cnt.waiting+' wartet');
 if(cnt.error)parts.push(cnt.error+' Fehler');
 if(!parts.length)parts.push('alles ruhig');
 const run=list.filter(a=>a.status==='running');
 const progress=run.length?Math.round(run.reduce((s,a)=>s+(a.progress||0),0)/run.length):(status==='ok'?100:0);
 const real=DATA.agents.master||{};
 const synth={name:'Kommandozentrale',status,phase:cnt.running?('koordiniert '+cnt.running+' Lauf'+(cnt.running>1?'e':'')):(cnt.waiting?'wartet auf dein Go':cnt.error?'Fehler im Blick':'Alle im Blick'),
  progress,message:parts.join(' · '),_counts:cnt,
  last_run:real.last_run||null,next_run:real.next_run||'laufend',outputs:real.outputs||[],log_tail:real.log_tail||'(Kommandant noch nicht gelaufen)'};
 if(real.status==='running'){synth.status='running';synth.phase=real.phase||synth.phase;synth.progress=real.progress??synth.progress;synth.message=real.message||synth.message;}
 DATA.agents.master=synth;
}

 computeMaster();
 BOT_IDS.forEach(id=>{
  const b=bots[id];const a=DATA.agents[id]||{};
  const st=a.status||'idle';

 });

}

 document.querySelectorAll('#tabs button').forEach(x=>x.classList.toggle('on',x===b));

function renderMaster(body){
 const chip=(k,label)=>{const n=(DATA.agents.master._counts||{})[k]||0;
  return n?`<span style="color:${COLORS[k]}"><i style="background:${COLORS[k]}"></i>${n} ${label}</span>`:'';};
 const flagged=st=>FLEET_IDS.filter(id=>(DATA.agents[id]||{}).status===st);
 const errs=flagged('error'),waits=flagged('waiting');
 const line=id=>{const a=DATA.agents[id]||{};return esc(a.name||id)+' — '+esc(a.message||a.phase||'');};
 body.innerHTML=`
  <button class="cmdbtn" id="reopencmd" style="--mc:${COLORS[DATA.agents.master.status]||COLORS.idle};margin:0 0 12px;width:100%">
   <span class="cdot" style="color:${COLORS[DATA.agents.master.status]||COLORS.idle}"></span>
   <span class="ctx"><b>Kommandozentrale öffnen</b><small>Vollbild: Flotte, Charts, Uptime</small></span><span class="cgo">▣</span></button>
  <div class="plbl">Flotte · ${FLEET_IDS.length} Agents</div>
  <div class="mcounts">${['running','waiting','error','ok','idle'].map(k=>chip(k,{running:'laufen',waiting:'warten',error:'Fehler',ok:'fertig',idle:'ruhen'}[k])).filter(Boolean).join('')||'–'}</div>
  ${errs.length?`<div class="mflag err"><b>⚠ Fehler</b><br>${errs.map(line).join('<br>')}</div>`:''}
  ${waits.length?`<div class="mflag wait"><b>? Wartet auf dein Go</b><br>${waits.map(line).join('<br>')}</div>`:''}
  <div class="plbl">Alle Agents im Detail</div>
  <div class="mtable">${FLEET_IDS.map(id=>{const a=DATA.agents[id]||{};const c=COLORS[a.status]||COLORS.idle;
    return `<button class="mrow" data-id="${id}">
      <span class="mdot" style="background:${c};color:${c}"></span>
      <span class="mn">${esc(a.name||id)}<small>${LABELS[a.status]||esc(a.status)} · ${esc(a.phase||'–')}</small></span>
      <span class="mp mono">${a.progress!=null?a.progress+'%':''}</span>
      <span class="mnext mono">${esc(a.next_run||'–')}</span>
    </button>`;}).join('')}</div>
  <div class="plbl">Kommandant-Log</div>
  <pre style="max-height:22vh">${esc(DATA.agents.master.log_tail||'–')}</pre>
  <p class="hint">Klick auf eine Zeile öffnet den Agent. „▶ START" oben lässt den Kommandant jetzt koordinieren.</p>`;
 body.querySelectorAll('.mrow').forEach(el=>el.addEventListener('click',()=>select(el.dataset.id)));
 const rc=body.querySelector('#reopencmd');if(rc)rc.addEventListener('click',openCmd);
}
function renderTab(){
 const body=$('#tabbody');
 if(TAB==='reports')return renderReports(body);
 if(SEL==='master'&&TAB==='info')return renderMaster(body);
 if(!SEL){body.innerHTML='<p class="hint">Agent wählen: Klick auf einen Roboter in der Welt oder eine Zeile oben.</p>';return;}
 const a=DATA.agents[SEL];if(!a)return;
 if(TAB==='info'){
  const c=COLORS[a.status]||COLORS.idle;
  body.innerHTML=`
   <span class="st" style="color:${c};border-color:${c}">${LABELS[a.status]||esc(a.status)}</span>
   <div class="plbl">Aktuelle Phase</div><div>${esc(a.phase||'–')}</div>
   <div class="plbl">Fortschritt</div><div class="pbar"><div style="width:${Math.max(0,Math.min(100,a.progress||0))}%"></div></div>
   <div class="plbl">Meldung</div><div>${esc(a.message||'–')}</div>
   <div class="plbl">Was zuletzt passiert ist</div>
   ${(a.details&&a.details.length)?'<ul>'+a.details.map(d=>'<li>'+esc(d)+'</li>').join('')+'</ul>':'<span class="hint">–</span>'}
   <div class="plbl">Ergebnisse</div>
   ${(a.outputs&&a.outputs.length)?'<ul>'+a.outputs.map(o=>'<li><code>'+esc(o)+'</code></li>').join('')+'</ul>':'<span class="hint">noch keine</span>'}
   <div class="plbl">Letzter / Nächster Lauf</div>
   <div class="mono" style="font-size:.76rem">${a.last_run?new Date(a.last_run).toLocaleString('de-AT'):'–'} → ${esc(a.next_run||'–')}</div>`;
 }else if(TAB==='log'){
  body.innerHTML=`<div class="plbl">Log · ${esc(a.name||SEL)}</div><pre id="logpre">${esc(a.log_tail||'(leer)')}</pre>
   ${API?'':'<p class="hint" style="margin-top:8px">Statischer Modus: zeigt log_tail aus status.json. Live-Log nur mit server.js.</p>'}`;
  if(API)pollLog();
 }
}
let logTimer=null;
async function pollLog(){
 clearTimeout(logTimer);
 if(TAB!=='log'||!SEL||!API)return;
 try{
  const r=await fetch('/api/log/'+SEL);const j=await r.json();
  const pre=$('#logpre');
  if(pre){const stick=pre.scrollTop+pre.clientHeight>=pre.scrollHeight-24;
   pre.textContent=j.text||'(leer)';if(stick)pre.scrollTop=pre.scrollHeight;}
 }catch(e){}
 logTimer=setTimeout(pollLog,3000);
}
async function renderReports(body){
 if(!API){body.innerHTML='<p class="hint">Reports sind nur mit laufendem server.js abrufbar (lokal: <code>node dashboard/server.js</code>).</p>';return;}
 if(!REPORTS){
  body.innerHTML='<p class="hint">Lade Reports…</p>';
  try{REPORTS=await (await fetch('/api/reports')).json();}catch(e){REPORTS=[];}
 }
 const root=SEL?ROOT_OF[SEL]:null;
 const list=root?REPORTS.filter(r=>r.root===root):REPORTS;
 body.innerHTML=`<div class="plbl">${SEL?('Reports · '+esc((DATA.agents[SEL]||{}).name||SEL)):'Alle Reports'}</div>`+
  (list.length?list.map(r=>`<button class="repitem" data-p="${esc(r.rel)}">
    <span>${esc(r.name)}</span><span class="d">${new Date(r.mtime).toLocaleDateString('de-AT')}</span>
    <span class="p">${esc(r.rel)}</span></button>`).join('')
   :'<p class="hint">Noch keine Dateien gefunden.</p>')+
  `<p class="hint" style="margin-top:10px">Klick öffnet die Datei in neuem Tab.</p>`;
 body.querySelectorAll('.repitem').forEach(el=>el.addEventListener('click',()=>{
  window.open('/api/file?p='+encodeURIComponent(el.dataset.p),'_blank');
 }));
}

/* ================= Kommandozentrale (Overlay + Charts) ================= */
function openCmd(){CMD_OPEN=true;const el=$('#cmd');el.classList.add('on');el.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';renderCmd();}
function closeCmd(){if(!CMD_OPEN)return;CMD_OPEN=false;const el=$('#cmd');el.classList.remove('on');el.setAttribute('aria-hidden','true');document.body.style.overflow='';}

/* Multi-Linien-Zeitchart (Inline-SVG, self-contained). series:[{name,color,pts:[num|null]}] */
function svgLine(series,o){
 o=o||{};const w=520,h=150,pl=40,pr=12,pt=12,pb=18;
 const n=Math.max(0,...series.map(s=>s.pts.length));
 const vals=series.flatMap(s=>s.pts).filter(v=>v!=null&&!isNaN(v));
 if(n<2||vals.length<2)return `<div class="chart-empty">Sammelt Daten – Liniengrafik ab 2 Messpunkten.</div>`;
 let max=Math.max(...vals),min=o.zero?0:Math.min(...vals);
 if(max<=min)max=min+1;
 const X=i=>pl+(i/(n-1))*(w-pl-pr), Y=v=>pt+(1-(v-min)/(max-min))*(h-pt-pb);
 const grid=[max,(max+min)/2,min].map(v=>`<line class="gl" x1="${pl}" y1="${Y(v).toFixed(1)}" x2="${w-pr}" y2="${Y(v).toFixed(1)}"/><text class="gt" x="2" y="${(Y(v)+3).toFixed(1)}">${Math.round(v)}</text>`).join('');
 const lines=series.map(s=>{let d='',pen=false;s.pts.forEach((v,i)=>{if(v==null||isNaN(v)){pen=false;return;}d+=(pen?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ';pen=true;});return d?`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="1.6" stroke-linejoin="round"/>`:'';}).join('');
 const dots=series.map(s=>{for(let i=s.pts.length-1;i>=0;i--){const v=s.pts[i];if(v!=null&&!isNaN(v))return `<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.6" fill="${s.color}"/>`;}return '';}).join('');
 return `<svg viewBox="0 0 ${w} ${h}" class="chart" role="img" aria-label="${esc(o.aria||'Verlauf')}">${grid}${lines}${dots}</svg>`;
}
/* Horizontale Balken mit Warnschwelle. rows:[{label,value}] */
function svgBars(rows,o){
 o=o||{};const w=520,pl=132,pr=48,rh=30,tp=6,thr=o.threshold||21;
 const h=tp*2+rows.length*rh;
 const max=Math.max(thr*1.25,...rows.map(r=>r.value||0),1);
 const X=v=>pl+(v/max)*(w-pl-pr);
 const bars=rows.map((r,i)=>{const y=tp+i*rh+5,v=r.value;
   const col=v==null?'var(--mut)':(v<thr?'var(--red)':(v<thr*2?'var(--amb)':'var(--grn)'));
   const bw=Math.max(2,X(v||0)-pl);
   return `<text class="bl" x="0" y="${y+13}">${esc(r.label)}</text><rect x="${pl}" y="${y}" width="${bw.toFixed(1)}" height="16" rx="2" fill="${col}"/><text class="bv" x="${(X(v||0)+6).toFixed(1)}" y="${y+13}">${v==null?'?':v+'d'}</text>`;}).join('');
 const tx=X(thr).toFixed(1);
 return `<svg viewBox="0 0 ${w} ${h}" class="chart" role="img" aria-label="${esc(o.aria||'Balken')}"><line class="thr" x1="${tx}" y1="2" x2="${tx}" y2="${h-2}"/><text class="thrt" x="${(X(thr)+3).toFixed(1)}" y="12">${thr}d</text>${bars}</svg>`;
}
function renderCmd(){
 if(!CMD_OPEN||!DATA)return;
 const m=DATA.agents.master||{},cnt=m._counts||{};
 const pills=[['running','läuft'],['waiting','wartet'],['error','Fehler'],['ok','fertig'],['idle','ruht']]
  .filter(([k])=>cnt[k]).map(([k,l])=>`<span class="pill" style="color:${COLORS[k]}"><i></i>${cnt[k]} ${l}</span>`).join('')
  ||`<span class="pill" style="color:var(--mut)">alles ruhig</span>`;
 const al=(ids,cls,label)=>ids.length?`<div class="cmd-alert ${cls}"><b>${label}</b> · ${ids.map(id=>{const a=DATA.agents[id]||{};return esc(a.name||id)+' ('+esc(a.message||a.phase||'')+')';}).join(' · ')}</div>`:'';
 const errs=FLEET_IDS.filter(id=>(DATA.agents[id]||{}).status==='error');
 const waits=FLEET_IDS.filter(id=>(DATA.agents[id]||{}).status==='waiting');
 const fleet=FLEET_IDS.map(id=>{const a=DATA.agents[id]||{},c=COLORS[a.status]||COLORS.idle;
   return `<button class="cmd-tab" data-go="${id}"><span class="cn">${esc(a.name||id)}<small>${LABELS[a.status]||esc(a.status)} · ${esc(a.phase||'–')}</small></span><span class="cp mono" style="color:${c}">${a.progress!=null?a.progress+'%':''}</span><span class="cnx">${esc(a.next_run||'–')}</span></button>`;}).join('');
 const up=UPTIME,sites=(up&&up.sites)||[],hist=(up&&up.history)||[];
 const pal=['#53e0ff','#5df2b4','#ff9d5c','#c99cff','#ffcf5c','#ff5ca8'];
 const series=sites.map((s,i)=>({name:s.name,color:pal[i%pal.length],
   pts:hist.map(ptn=>{const q=(ptn.p||[]).find(x=>x.n===s.name);return q?q.ms:null;})}));
 const legend=series.map(s=>`<span><i style="background:${s.color}"></i>${esc(s.name)}</span>`).join('');
 const avail=name=>{const rel=hist.map(ptn=>(ptn.p||[]).find(x=>x.n===name)).filter(Boolean);return rel.length?Math.round(rel.filter(x=>x.up===1).length/rel.length*100):null;};
 const tiles=sites.map(s=>{const c=COLORS[s.state==='ok'?'ok':s.state==='slow'?'waiting':'error']||COLORS.idle,av=avail(s.name);
   return `<div class="tile"><div class="tn" style="color:${c}"><i></i>${esc(s.name)}</div><div class="tm"><b>HTTP ${s.http||'–'}</b> · <b>${s.ms!=null?s.ms+' ms':'–'}</b><br>SSL <b>${s.ssl_days!=null?s.ssl_days+' Tage':'?'}</b>${s.ssl_days!=null&&s.ssl_days<21?' ⚠':''}<br>Verfügbar <b>${av!=null?av+' %':'–'}</b>${s.reason?'<br><span style="color:var(--red)">'+esc(s.reason)+'</span>':''}</div></div>`;}).join('');
 const chartResp=series.length?svgLine(series,{zero:true,aria:'Antwortzeit-Verlauf je Website'}):`<div class="chart-empty">Noch keine Uptime-Daten. Starte den uptime-waechter.</div>`;
 const chartSsl=sites.length?svgBars(sites.map(s=>({label:s.name,value:s.ssl_days})),{threshold:21,aria:'SSL-Restlaufzeit je Website'}):`<div class="chart-empty">Noch keine SSL-Daten.</div>`;
 const upNote=up?`Stand ${new Date(up.stand).toLocaleString('de-AT')} · ${hist.length} Messpunkte`:'keine Daten';
 $('#cmd').innerHTML=`<div class="cmd-panel">
   <div class="cmd-top"><h2>Kommandozentrale</h2>
    <span class="up">${DATA.updated?new Date(DATA.updated).toLocaleString('de-AT'):'–'} · ${DATA.demo?'DEMO':'LIVE'}</span>
    <div class="pills">${pills}</div>
    <button class="runbtn" id="cmdrun" ${!API?'disabled':''} title="${API?'Kommandant jetzt koordinieren lassen':'Nur mit laufendem server.js'}">▶ KOORDINIEREN</button>
    <button class="cmd-close" aria-label="Kommandozentrale schließen">✕</button></div>
   ${al(errs,'err','⚠ Fehler')}${al(waits,'wait','? Wartet auf dein Go')}
   <div class="cmd-body">
    <div class="cmd-fleet"><div class="sect"><h3>Flotte <span>${FLEET_IDS.length} Agents</span></h3>${fleet}</div></div>
    <div class="cmd-main">
     <div class="sect"><h3>Antwortzeit <span>ms · je Website</span></h3>${chartResp}<div class="legend2">${legend}</div></div>
     <div class="sect"><h3>SSL-Restlaufzeit <span>Tage bis Ablauf · Warnschwelle 21</span></h3>${chartSsl}</div>
     <div class="sect"><h3>Websites <span>${esc(upNote)}</span></h3><div class="tiles">${tiles||'<div class="chart-empty">Keine Sites.</div>'}</div></div>
    </div>
   </div></div>`;
 $('#cmd').querySelector('.cmd-close').addEventListener('click',closeCmd);
 $('#cmd').querySelectorAll('.cmd-tab').forEach(el=>el.addEventListener('click',()=>select(el.dataset.go)));
 const rb=$('#cmdrun');
 if(rb)rb.addEventListener('click',async()=>{rb.disabled=true;rb.textContent='…';
  try{const r=await fetch('/api/run/master',{method:'POST'});const j=await r.json();if(!r.ok)throw new Error(j.error||r.status);
   if(DATA.agents.master){DATA.agents.master.status='running';DATA.agents.master.message='Ich koordiniere…';}applyData();
  }catch(err){rb.textContent=String(err.message||'').includes('läuft')?'LÄUFT SCHON':'FEHLER';setTimeout(renderCmd,2200);}});
}
/* Backdrop-Klick + ESC schließen */
$('#cmd').addEventListener('click',e=>{if(e.target.id==='cmd')closeCmd();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCmd();});

/* ================= Laden ================= */
(function legend(){
 $('#legend').innerHTML=Object.keys(LABELS).map(k=>`<span style="color:${COLORS[k]}"><i></i>${LABELS[k]}</span>`).join('');
})();
async function load(){
 try{
  const r=await fetch('status.json?ts='+Date.now(),{cache:'no-store'});
  if(!r.ok)throw 0;
  DATA=await r.json();DATA.demo=false;
  $('#demo').style.display='none';
 }catch(e){
  DATA=DEMO;DATA.demo=true;
  $('#demo').style.display='block';
 }
 /* Uptime-Daten (vom Wrapper nach httpdocs gespiegelt) – best effort */
 try{const ur=await fetch('uptime.json?ts='+Date.now(),{cache:'no-store'});UPTIME=ur.ok?await ur.json():null;}catch(e){UPTIME=null;}
 if(!UPTIME&&DATA.demo)UPTIME=DEMO_UPTIME;
 applyData();
 const anyRunning=Object.values(DATA.agents||{}).some(a=>a.status==='running');
 $('#foot2').textContent='refresh '+(anyRunning?'5 s':'30 s');
 clearTimeout(load.t);load.t=setTimeout(load,anyRunning?5000:30000);
}
async function detectApi(){
 try{const r=await fetch('/api/ping');API=r.ok&&(await r.json()).api===true;}catch(e){API=false;}
 const el=$('#apistate');
 el.textContent=API?'API: VERBUNDEN':'API: STATISCH';
 el.className=API?'on':'off';
 if(API)REPORTS=null;
 if(DATA)applyData();
}
initBots();
requestAnimationFrame(t=>{lastT=t;requestAnimationFrame(loop);});
detectApi().then(load);
</script>
