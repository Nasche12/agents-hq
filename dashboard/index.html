<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent HQ – naschberger.info</title>
<style>
/* ================= Design-Tokens ================= */
:root{
 --bg:oklch(13% 0.028 268);
 --bg-deep:oklch(8% 0.022 268);
 --ink:oklch(94% 0.012 255);
 --mut:oklch(71% 0.025 258);
 --hair:oklch(100% 0 0 / .08);
 --hair2:oklch(100% 0 0 / .14);
 --panel:oklch(15% 0.026 268 / .92);
 --field:oklch(100% 0 0 / .05);
 --cyan:#53e0ff; --grn:#5df2b4; --amb:#ffcf5c; --red:#ff7b6b; --vio:#c99cff; --pink:#ff5ca8;
 --r1:8px; --r2:12px; --r3:18px;
 --z-board:5; --z-panel:8; --z-modal:40; --z-toast:60;
 --tfast:.16s cubic-bezier(.2,.7,.3,1);
 --tmed:.26s cubic-bezier(.16,.84,.3,1);
}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{
 font-family:system-ui,"Segoe UI",sans-serif;color:var(--ink);
 background:
  radial-gradient(1100px 620px at 78% -12%, oklch(21% 0.06 300 / .5), transparent 60%),
  radial-gradient(900px 620px at 8% 112%, oklch(19% 0.055 225 / .5), transparent 60%),
  linear-gradient(var(--bg), var(--bg-deep));
 overflow:hidden;
}
@media(max-width:1020px){body{overflow-y:auto;overflow-x:hidden}}
.mono{font-family:ui-monospace,Consolas,"Cascadia Mono",monospace}
button{font-family:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

/* Buttons: eine Vokabel für alles */
.btn{border:1px solid var(--hair2);border-radius:9px;background:var(--field);color:var(--ink);
 font-size:.74rem;padding:6px 12px;cursor:pointer;transition:background var(--tfast),border-color var(--tfast),color var(--tfast);white-space:nowrap}
.btn:hover:not(:disabled){background:oklch(100% 0 0 / .1)}
.btn:disabled{color:var(--mut);cursor:not-allowed;opacity:.55}
.btn.prime{background:oklch(65% 0.12 215 / .16);border-color:oklch(75% 0.12 210 / .45);color:var(--cyan);font-weight:600}
.btn.prime:hover:not(:disabled){background:oklch(65% 0.12 215 / .28)}

/* ================= Linke Kommandospalte ================= */
#side{position:fixed;top:0;left:0;bottom:0;width:360px;z-index:var(--z-panel);
 background:var(--panel);-webkit-backdrop-filter:blur(18px) saturate(140%);backdrop-filter:blur(18px) saturate(140%);
 border-right:1px solid var(--hair);display:flex;flex-direction:column;overflow:hidden}
#side .shead{padding:15px 18px 13px;border-bottom:1px solid var(--hair);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex:0 0 auto}
#side .shead h1{font-size:1rem;letter-spacing:.24em;text-transform:uppercase;font-weight:600}
#side .shead h1 span{color:var(--cyan)}
#side .shead h1::after{content:"";display:block;width:46px;height:1px;margin-top:6px;background:linear-gradient(90deg,var(--cyan),transparent)}
#meta{font-size:.6rem;color:var(--mut);text-align:right;letter-spacing:.05em;text-transform:uppercase;line-height:1.65}
#meta .src{display:block}
#sidescroll{flex:1;overflow-y:auto;padding:13px 14px 8px;display:flex;flex-direction:column;gap:13px}
#sidescroll>*{flex:0 0 auto}
#sidescroll::-webkit-scrollbar{width:8px}
#sidescroll::-webkit-scrollbar-thumb{background:oklch(100% 0 0 / .12);border-radius:8px}
.seclbl{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin:2px 2px -2px}

/* Abflugtafel */
#board{border:1px solid var(--hair);border-radius:var(--r2);overflow:hidden;background:oklch(100% 0 0 / .02)}
#board .bhead{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--hair)}
#board .bttl{font-size:.62rem;letter-spacing:.18em;color:var(--amb);text-transform:uppercase;display:flex;align-items:center;gap:7px}
#board .bttl::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--amb);box-shadow:0 0 7px var(--amb)}
#board .bclock{font-size:.64rem;color:var(--mut);letter-spacing:.1em;font-family:ui-monospace,Consolas,monospace}
#board .brows{padding:5px 6px;display:flex;flex-direction:column;gap:1px}
.brow{display:grid;grid-template-columns:9px 1fr auto;gap:10px;align-items:center;width:100%;
 padding:7px 9px;border:1px solid transparent;background:none;color:var(--ink);cursor:pointer;text-align:left;border-radius:var(--r1);
 font-family:ui-monospace,Consolas,monospace;transition:background var(--tfast),border-color var(--tfast)}
.brow:hover,.brow:focus-visible{background:oklch(24% 0.04 250 / .5)}
.brow.sel{background:oklch(26% 0.05 250 / .6);border-color:oklch(60% 0.1 220 / .5)}
.brow .bdot{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 7px currentColor}
.brow .bnm{font-size:.74rem;letter-spacing:.03em;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow .bst{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;text-align:right;white-space:nowrap;color:currentColor}
.brow .bnx{grid-column:2/-1;font-size:.58rem;color:var(--mut);letter-spacing:.06em;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@keyframes flap{0%{transform:rotateX(0);filter:brightness(1)}45%{transform:rotateX(-88deg);filter:brightness(.5)}55%{transform:rotateX(88deg);filter:brightness(.5)}100%{transform:rotateX(0);filter:brightness(1)}}
.brow .bst.flip{animation:flap .5s cubic-bezier(.4,0,.2,1);transform-origin:center;display:inline-block}

/* Graphen unter der Abflugtafel */
#charts{display:flex;flex-direction:column;gap:12px}
.gcard{border:1px solid var(--hair);border-radius:var(--r2);padding:12px 13px;background:oklch(100% 0 0 / .02)}
.gcard h4{font-size:.64rem;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:10px;
 display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.gcard h4 span{color:var(--mut);opacity:.7;font-weight:400;text-transform:none;letter-spacing:0;font-size:.62rem;white-space:nowrap}
.gcard .chart{margin:-2px 0}
.statbar{display:flex;height:14px;border-radius:999px;overflow:hidden;background:oklch(100% 0 0 / .05);gap:2px}
.statbar span{min-width:3px;transition:flex-grow .55s cubic-bezier(.2,.7,.3,1)}
.statbar span:first-child{border-radius:999px 0 0 999px}
.statbar span:last-child{border-radius:0 999px 999px 0}
.statleg{display:flex;flex-wrap:wrap;gap:7px 13px;margin-top:10px;font-size:.64rem;color:var(--mut)}
.statleg b{color:var(--ink);font-weight:600}
.statleg i{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}
.gtiles{display:flex;flex-direction:column;gap:6px}
.gtile{display:grid;grid-template-columns:9px 1fr auto;gap:9px;align-items:center;font-size:.72rem;
 padding:7px 9px;border:1px solid var(--hair);border-radius:var(--r1);background:oklch(100% 0 0 / .02)}
.gtile .gd{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor}
.gtile .gn{color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtile .gv{font-family:ui-monospace,Consolas,monospace;font-size:.66rem;color:var(--mut);text-align:right;white-space:nowrap}
.gtile .gv b{color:var(--ink);font-weight:500}

/* Demo-Banner / Fehler-Toast / Legende (über der Karte) */
#demo{display:none;position:fixed;top:12px;left:calc((100vw + 360px)/2);transform:translateX(-50%);z-index:6;border:1px solid var(--amb);color:var(--amb);
 background:oklch(20% 0.04 85 / .9);border-radius:9px;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;padding:5px 14px}
#errtoast{display:none;position:fixed;bottom:14px;right:16px;z-index:var(--z-toast);max-width:440px;
 background:oklch(24% 0.08 25 / .95);border:1px solid var(--red);border-radius:var(--r2);color:var(--red);
 font-size:.74rem;padding:9px 13px;line-height:1.5}
#legend{position:fixed;left:376px;bottom:12px;z-index:var(--z-board);display:flex;gap:14px;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);pointer-events:none}
#legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;background:currentColor;box-shadow:0 0 6px currentColor}

/* ================= Bühne (Canvas-Welt) ================= */
#stage{position:fixed;inset:0 0 0 360px;display:grid;padding:8px;z-index:1}
#game{width:100%;height:100%;cursor:grab;touch-action:none}
#game:active{cursor:grabbing}

/* ================= Agent-Detail (Popup-Drawer, default zu) ================= */
#dscrim{position:fixed;inset:0 0 0 360px;z-index:calc(var(--z-modal) - 1);background:oklch(4% 0.02 268 / .32);
 opacity:0;visibility:hidden;transition:opacity var(--tmed),visibility var(--tmed)}
#dscrim.on{opacity:1;visibility:visible}
#drawer{position:fixed;top:0;right:0;bottom:0;width:min(440px,94vw);z-index:var(--z-modal);
 background:var(--panel);-webkit-backdrop-filter:blur(20px) saturate(140%);backdrop-filter:blur(20px) saturate(140%);
 border-left:1px solid var(--hair2);display:flex;flex-direction:column;overflow:hidden;
 transform:translateX(102%);transition:transform var(--tmed);box-shadow:-34px 0 90px oklch(0% 0 0 / .55)}
#drawer.open{transform:translateX(0)}
#drawer .dhead{padding:14px 18px 12px;border-bottom:1px solid var(--hair);display:flex;align-items:center;gap:11px;flex:0 0 auto}
#drawer .ddot{width:11px;height:11px;border-radius:50%;background:currentColor;box-shadow:0 0 9px currentColor;flex:0 0 auto}
#drawer .dtt{flex:1;min-width:0}
#drawer .dtt b{font-size:.92rem;display:block;color:var(--ink);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#drawer .dtt small{display:block;font-size:.62rem;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
#drawer .dclose{flex:0 0 auto;background:var(--field);border:1px solid var(--hair);color:var(--mut);
 width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem;line-height:1;display:grid;place-items:center;transition:background var(--tfast),color var(--tfast)}
#drawer .dclose:hover,#drawer .dclose:focus-visible{background:oklch(100% 0 0 / .13);color:var(--ink)}

/* Master-Karte */
.mcard{border:1px solid var(--hair2);border-radius:var(--r2);padding:13px 14px;margin:2px 2px 10px;
 background:linear-gradient(135deg, color-mix(in oklab, var(--mc) 14%, transparent), oklch(100% 0 0 / .03) 55%);
 box-shadow:inset 0 1px 0 oklch(100% 0 0 / .06)}
.mcard .mhead{display:flex;align-items:center;gap:10px}
.mcard .mdot{width:10px;height:10px;border-radius:50%;background:var(--mc);box-shadow:0 0 10px var(--mc);flex:0 0 auto}
.mcard .mtt{min-width:0;flex:1}
.mcard .mtt b{font-size:.9rem;letter-spacing:.03em;display:block}
.mcard .mtt small{display:block;color:var(--mut);font-size:.66rem;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcard .mstate{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mc);border:1px solid color-mix(in oklab,var(--mc) 55%,transparent);border-radius:999px;padding:3px 9px;white-space:nowrap}
.mcard .mmsg{font-size:.76rem;color:var(--ink);margin:9px 0 8px;line-height:1.45}
.mcard .mchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}
.chip{font-size:.66rem;font-family:ui-monospace,Consolas,monospace;border:1px solid var(--hair);border-radius:999px;padding:2px 9px;color:currentColor;background:oklch(100% 0 0 / .03)}
.chip i{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:5px;box-shadow:0 0 5px currentColor;vertical-align:middle}
.chip.mutc{color:var(--mut)}
.mcard .mact{display:flex;gap:8px}
.mcard .mact .btn{flex:1;text-align:center;padding:8px 10px}

/* Flotten-Liste */
.navlabel{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);padding:4px 4px 5px}
.arow{display:grid;grid-template-columns:10px 1fr auto auto;gap:10px;align-items:center;width:100%;
 padding:8px 10px;margin:2px 0;background:none;border:1px solid transparent;border-radius:var(--r1);color:var(--ink);cursor:pointer;text-align:left;
 transition:background var(--tfast),border-color var(--tfast)}
.arow:hover,.arow:focus-within{background:oklch(100% 0 0 / .04);border-color:var(--hair)}
.arow .nmbtn{background:none;border:0;padding:0;margin:0;text-align:left;color:inherit;cursor:pointer;min-width:0;font:inherit}
.arow.sel{border-color:oklch(60% 0.1 220 / .6);background:oklch(20% 0.04 250 / .45)}
.arow .dot{width:9px;height:9px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
.arow .nm{font-size:.8rem;letter-spacing:.02em;color:var(--ink);min-width:0}
.arow .nm small{display:block;font-size:.63rem;color:var(--mut);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arow .pr{font-size:.68rem;color:var(--mut);font-family:ui-monospace,Consolas,monospace}

/* Tabs + Detailpanel */
#tabs{display:flex;padding:6px 20px 0;border-bottom:1px solid var(--hair)}
#tabs button{flex:1;background:none;border:0;border-bottom:2px solid transparent;color:var(--mut);
 font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;padding:9px 0;cursor:pointer;transition:color var(--tfast)}
#tabs button:hover,#tabs button:focus-visible{color:var(--ink)}
#tabs button.on{color:var(--cyan);border-bottom-color:var(--cyan)}
#tabbody{flex:1;overflow-y:auto;padding:16px 20px;font-size:.84rem}
#tabbody::-webkit-scrollbar{width:8px}
#tabbody::-webkit-scrollbar-thumb{background:oklch(100% 0 0 / .12);border-radius:8px}
.plbl{color:var(--mut);font-size:.64rem;text-transform:uppercase;letter-spacing:.14em;margin:14px 0 4px}
.plbl:first-child{margin-top:0}
.pbar{height:6px;background:oklch(11% 0.02 280);border:1px solid var(--hair);border-radius:999px;overflow:hidden}
.pbar div{height:100%;width:100%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--vio));
 transform-origin:left;transition:transform .6s cubic-bezier(.2,.7,.3,1)}
.st{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;display:inline-block;padding:3px 11px;border:1px solid;border-radius:999px;margin-bottom:4px}
#tabbody ul{margin:4px 0 0 16px;line-height:1.55}
#tabbody pre{background:oklch(10% 0.02 280);border:1px solid var(--hair);border-radius:var(--r1);padding:10px;font-size:.66rem;
 white-space:pre-wrap;word-break:break-word;color:oklch(80% 0.04 200);line-height:1.5;max-height:52vh;overflow:auto}
#tabbody .hint{color:var(--mut);font-style:italic;font-size:.78rem}
#tabbody code{color:var(--cyan);font-size:.76rem}
.orow{display:flex;gap:8px;margin-top:4px}
.orow input{flex:1}
.cin{background:var(--field);border:1px solid var(--hair2);border-radius:var(--r1);color:var(--ink);
 font-family:ui-monospace,Consolas,monospace;font-size:.72rem;padding:6px 9px;min-width:0;transition:border-color var(--tfast)}
.cin:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px oklch(80% 0.14 200 / .18)}
.cin::placeholder{color:oklch(58% 0.02 258)}
.repitem{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:baseline;width:100%;padding:8px 10px;margin:2px 0;border-radius:var(--r1);
 background:none;border:1px solid transparent;color:var(--ink);cursor:pointer;text-align:left;font-size:.76rem;transition:background var(--tfast),border-color var(--tfast)}
.repitem:hover,.repitem:focus-visible{border-color:var(--hair);background:oklch(100% 0 0 / .03)}
.repitem .d{color:var(--mut);font-size:.62rem;font-family:ui-monospace,Consolas,monospace}
.repitem .p{color:var(--mut);font-size:.62rem;font-family:ui-monospace,Consolas,monospace;grid-column:1/-1}
/* Lauf-Historie (Log-Tab) */
.runlist{display:flex;flex-direction:column;gap:3px;max-height:34vh;overflow-y:auto}
.runlist::-webkit-scrollbar{width:8px}
.runlist::-webkit-scrollbar-thumb{background:oklch(100% 0 0 / .12);border-radius:8px}
.runitem{display:grid;grid-template-columns:9px 1fr auto;gap:9px;align-items:center;width:100%;text-align:left;border-radius:var(--r1);
 background:oklch(100% 0 0 / .03);border:1px solid transparent;color:var(--ink);padding:7px 9px;cursor:pointer;
 transition:background var(--tfast),border-color var(--tfast)}
.runitem:hover,.runitem:focus-visible{background:oklch(100% 0 0 / .07);border-color:var(--hair);outline:none}
.runitem.sel{border-color:oklch(60% 0.1 220 / .55);background:oklch(20% 0.04 250 / .4)}
.runitem .rd{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor}
.runitem .rt{font-size:.74rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.runitem .rm{font-size:.62rem;color:var(--mut);font-family:ui-monospace,Consolas,monospace;white-space:nowrap}
.mflag{font-size:.76rem;border:1px solid;border-radius:var(--r1);padding:9px 11px;margin:10px 0;line-height:1.55}
.mflag b{letter-spacing:.03em}
.mflag.err{color:var(--red);border-color:oklch(52% 0.14 25/.6);background:oklch(24% 0.07 25/.22)}
.mflag.wait{color:var(--amb);border-color:oklch(56% 0.11 85/.5);background:oklch(24% 0.06 85/.16)}
.mtable{display:flex;flex-direction:column;gap:3px}
.mrow{display:grid;grid-template-columns:9px 1fr auto auto;gap:11px;align-items:center;text-align:left;border-radius:var(--r1);
 background:oklch(100% 0 0 / .03);border:1px solid transparent;color:var(--ink);padding:8px 11px;cursor:pointer;
 transition:background var(--tfast),border-color var(--tfast)}
.mrow:hover,.mrow:focus-visible{border-color:var(--hair2);background:oklch(100% 0 0 / .06)}
.mrow .mdot2{width:9px;height:9px;border-radius:50%;box-shadow:0 0 7px currentColor;background:currentColor}
.mrow .mn{font-size:.82rem;min-width:0}
.mrow .mn small{display:block;color:var(--mut);font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrow .mp{color:var(--cyan);font-size:.72rem}
.mrow .mnext{color:var(--mut);font-size:.66rem;min-width:64px;text-align:right}
#apibar{padding:8px 18px;border-top:1px solid var(--hair);font-size:.62rem;letter-spacing:.1em;
 text-transform:uppercase;color:var(--mut);display:flex;justify-content:space-between;flex:0 0 auto}
#apibar b{font-weight:400}
#apibar .on{color:var(--grn)} #apibar .off{color:var(--amb)}
@media(max-width:1020px){
 #side{position:static;width:auto;border-right:0;border-bottom:1px solid var(--hair)}
 #sidescroll{max-height:none;overflow:visible}
 #stage{position:static;display:block;padding:8px 0;overflow-x:auto;height:520px}
 #game{width:940px;height:100%}
 #legend{position:static;padding:8px 16px;flex-wrap:wrap;gap:10px;letter-spacing:.05em}
 #demo{position:static;transform:none;margin:8px auto 0;max-width:92%;width:max-content}
 #errtoast{right:12px;left:12px;max-width:none}
 #dscrim{inset:0}
 #drawer{width:100%;max-width:none;transform:translateY(102%)}
 #drawer.open{transform:translateY(0)}
 #tabbody{max-height:60vh}
}

/* ================= Kommandozentrale (Overlay) ================= */
#cmd{position:fixed;inset:0;z-index:var(--z-modal);display:none;place-items:center;padding:24px;
 background:oklch(0% 0 0 / .55);-webkit-backdrop-filter:blur(20px) saturate(130%);backdrop-filter:blur(20px) saturate(130%)}
#cmd.on{display:grid}
@keyframes cmdin{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
.cmd-panel{width:min(1180px,100%);max-height:calc(100dvh - 48px);display:flex;flex-direction:column;overflow:hidden;
 background:oklch(11% 0.022 268 / .97);border:1px solid var(--hair2);border-radius:var(--r3);
 box-shadow:0 40px 120px oklch(0% 0 0 / .7), inset 0 1px 0 oklch(100% 0 0 / .07);
 animation:cmdin .26s cubic-bezier(.16,.84,.3,1)}
.cmd-top{display:flex;align-items:center;gap:14px;padding:15px 20px;border-bottom:1px solid var(--hair);flex:0 0 auto}
.cmd-top h2{font-size:.96rem;letter-spacing:.02em;font-weight:600;color:var(--ink);white-space:nowrap}
.cmd-top .up{font-size:.68rem;color:var(--mut);white-space:nowrap}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.cmd-close{flex:0 0 auto;background:var(--field);border:1px solid var(--hair);color:var(--mut);
 width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem;line-height:1;display:grid;place-items:center;
 transition:background var(--tfast),color var(--tfast)}
.cmd-close:hover,.cmd-close:focus-visible{background:oklch(100% 0 0 / .13);color:var(--ink)}
.cmd-alert{padding:10px 20px;border-bottom:1px solid var(--hair);font-size:.8rem;line-height:1.55;flex:0 0 auto}
.cmd-alert.err{color:var(--red);background:oklch(30% 0.1 25 / .16)}
.cmd-alert.wait{color:var(--amb);background:oklch(30% 0.09 85 / .14)}

<script>
'use strict';
/* ================================================================
   AGENT HQ – Orbital-Station (Canvas) + Mission Control
   ================================================================ */
const COLORS={running:'#53e0ff',ok:'#5df2b4',idle:'#8ea0bd',waiting:'#ffcf5c',error:'#ff7b6b'};
const LABELS={running:'läuft',ok:'fertig',idle:'freizeit',waiting:'wartet auf dein go',error:'fehler'};
const RM=matchMedia('(prefers-reduced-motion:reduce)').matches;

/* ===== Quelle der Wahrheit: Kategorien + Agents =====
   Die ganze Welt (Pods, Arbeitsplätze, Möbel, Farben, Wege) wird hieraus
   GENERIERT. Neuer Agent = eine Zeile in AGENTS_CFG, die Welt wächst mit.
   Damit er wirklich läuft: Prompt in server.js (AGENTS) + status.json-Eintrag. */
const CATEGORIES=[
 {id:'monitoring',label:'MONITORING',    accent:'#5df2b4',tint:'#233b45',light:'rgba(110,240,220,.09)'},
 {id:'content',   label:'CONTENT-STUDIO',accent:'#c99cff',tint:'#332f52',light:'rgba(200,150,255,.10)'},
 {id:'finance',   label:'FINANZEN',      accent:'#ffcf5c',tint:'#3b3550',light:'rgba(255,205,110,.09)'}
];
const AGENTS_CFG=[
 {id:'wochenreport',      name:'Wochenreport',        short:'REPORT',  cat:'content',   accent:'#53e0ff',root:'reports'},
 {id:'content-recherche', name:'Content-Recherche',   short:'CONTENT', cat:'content',   accent:'#c99cff',root:'content'},
 {id:'belege-buchhaltung',name:'Belege & Buchhaltung',short:'FINANZ',  cat:'finance',   accent:'#ffcf5c',root:'belege'},
 {id:'rechnungssteller',  name:'Rechnungssteller',    short:'RECHNUNG',cat:'finance',   accent:'#ffd24a',root:'rechnungen'},
 {id:'uptime-waechter',   name:'Uptime-Wächter',      short:'UPTIME',  cat:'monitoring',accent:'#5df2b4',root:'uptime'},
 {id:'seo-audit',         name:'SEO-Audit',           short:'SEO',     cat:'monitoring',accent:'#ff9d5c',root:'seo'}
];
const MASTER_ACCENT='#ff5ca8';
const FLEET_IDS=AGENTS_CFG.map(a=>a.id);
const BOT_IDS=['master',...FLEET_IDS];
const NAME_OF=Object.fromEntries([['master','MASTER'],...AGENTS_CFG.map(a=>[a.id,a.short])]);
const ROOT_OF=Object.fromEntries([['master','master'],...AGENTS_CFG.map(a=>[a.id,a.root])]);

const DEMO={updated:new Date().toISOString(),agents:{
 'wochenreport':{name:'Wochenreport',status:'running',phase:'Analytics laden',progress:45,message:'Umami-Daten für 3 Kunden…',
  last_run:new Date().toISOString(),next_run:'Fr 08:00',details:['Erstellt pro Kunde: Report, PDF, E-Mail-Entwurf, Discord-Post'],outputs:[],log_tail:'kunde2: pageviews ok…'},
 'belege-buchhaltung':{name:'Belege & Buchhaltung',status:'waiting',phase:'Rückfrage offen',progress:80,message:'2 Belege unklar – dein Go?',
  last_run:new Date().toISOString(),next_run:'Mo 09:00',details:['Canva-Beleg: Rechnungsnummer fehlt'],outputs:['belege/dashboard.html'],log_tail:'3 Belege archiviert.'},
 'content-recherche':{name:'Content-Recherche',status:'ok',phase:'Contentplan fertig',progress:100,message:'7 Ideen verifiziert ✓',
  last_run:new Date().toISOString(),next_run:'So 17:00',details:['7-Tage-Plan mit Hooks'],outputs:['content/2026-KW28/contentplan.md'],log_tail:'Fertig ☕'},
 'uptime-waechter':{name:'Uptime-Wächter',status:'running',phase:'Sites prüfen',progress:60,message:'2 Sites gepingt…',
  last_run:new Date().toISOString(),next_run:'alle 15 min',details:['ferienhaus-tirol.at: 200 · 0.4 s','SSL 74 Tage'],outputs:['uptime/status.js'],log_tail:'mueller-gmbh.at: 200 ok'},
 'seo-audit':{name:'SEO-Audit',status:'error',phase:'Crawl',progress:30,message:'Sitemap 404 bei 1 Site',
  last_run:new Date().toISOString(),next_run:'Mi 06:00',details:['mueller-gmbh.at: sitemap.xml fehlt'],outputs:[],log_tail:'ferienhaus-tirol.at: title zu lang'},
 'rechnungssteller':{name:'Rechnungssteller',status:'idle',phase:'Bereit',progress:0,message:'Warte auf Positionen…',
  last_run:null,next_run:'auf Abruf',details:[],outputs:[],log_tail:'(noch kein Lauf)'}
}};

let DATA=null,SEL=null,API=false,TAB='info',REPORTS=null,UPTIME=null,CMD_OPEN=false,SCHEDULE=null;
let booted=false,theatreOn=false;
const MOBILE=matchMedia('(max-width:1020px)').matches;
const FORCE_DEMO=/[?&]demo\b/.test(location.search);   // ?demo = lebendiger Vorschaumodus (echte Läufe bleiben aus)

/* Demo-Uptime nur im DEMO-Modus – zeigt, wie die Charts aussehen. */
const DEMO_UPTIME=(()=>{
 const names=['naschberger.info','sicherrestaurant.at','ursulakircher.at'];
 const base={'naschberger.info':15,'sicherrestaurant.at':34,'ursulakircher.at':21};
 const ssl={'naschberger.info':62,'sicherrestaurant.at':35,'ursulakircher.at':41};
 const history=[];
 for(let i=23;i>=0;i--){
  history.push({t:'2026-07-08T'+String((i)%24).padStart(2,'0')+':00:00+02:00',
   p:names.map((n,k)=>{
    const jitter=[7,13,5,11,3,17,9][(i+k)%7]-8; // deterministisch, kein Math.random
    const down=(n==='sicherrestaurant.at'&&i===9);
    return {n,ms:down?null:Math.max(6,base[n]+jitter+(k*2)),ssl:ssl[n]-Math.floor(i/12),up:down?0:1};
   })});
 }
 return {stand:'2026-07-08T08:26:29+02:00',
  sites:names.map(n=>({name:n,url:'https://'+n,state:'ok',http:200,ms:base[n],ssl_days:ssl[n],checked:'2026-07-08T08:26:29+02:00'})),
  history};
})();
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
/* Detail-Eintrag robust zu Text machen (Agent schreibt manchmal Objekte statt Strings) */
const dstr=d=>typeof d==='string'?d:(d&&typeof d==='object'
 ?Object.entries(d).map(([k,v])=>k+': '+(v==null?'–':(typeof v==='object'?JSON.stringify(v):v))).join(', ')
 :String(d));
const $=s=>document.querySelector(s);
function showErr(msg){const t=$('#errtoast');if(t){t.textContent='Dashboard-Fehler: '+msg;t.style.display='block';}}
window.addEventListener('error',ev=>showErr(ev.message||'unbekannt'));
window.addEventListener('unhandledrejection',ev=>{const r=ev.reason;showErr((r&&(r.stack||r.message))||String(r));});

/* ================= Welt prozedural generieren =================
 Aus CATEGORIES + AGENTS_CFG: pro Kategorie ein Themen-Pod (Größe wächst mit der
 Agent-Zahl), dazu Kommandodeck (Master) + Lounge. ROWS/SPOTS/FURN/ZONES/Labels
 fallen alle aus dem Generator.
 Zeichen: '#' Wand, '.' Podboden, '-' Korridor, 'D' Schleuse, ' ' Weltraum */
const U=32;
const WS_COLS=4;            // Arbeitsplätze pro Reihe in einem Themen-Pod
const CELL_W=4, CELL_H=3;   // Kachel-Fußabdruck eines Arbeitsplatzes
const GAP=1, MARGIN=1, CORR=3;

function darken(hex,d){const n=parseInt(hex.slice(1),16);
 const r=Math.max(0,(n>>16)-d),g=Math.max(0,((n>>8)&255)-d),b=Math.max(0,(n&255)-d);
 return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function roomDims(n){
 const cols=Math.min(WS_COLS,Math.max(1,n)), rows=Math.ceil(Math.max(1,n)/cols);
 const iw=Math.max(6,cols*CELL_W), ih=2+rows*CELL_H+1; // +2 Feature-Screen, +1 Puffer
 return {cols,rows,iw,ih,ow:iw+2,oh:ih+2};
}

const rooms=[];
for(const c of CATEGORIES){
 const agents=AGENTS_CFG.filter(a=>a.cat===c.id);
 if(!agents.length)continue;
 rooms.push({kind:'cat',label:c.label,tint:c.tint,accent:c.accent,light:c.light,agents,band:'top',...roomDims(agents.length)});
}
rooms.push({kind:'command',label:'KOMMANDO',tint:'#2c2a46',accent:MASTER_ACCENT,light:'rgba(255,120,190,.09)',
 agents:[{id:'master'}],band:'bottom',...roomDims(1)});
{const n=FLEET_IDS.length, cols=Math.min(6,Math.max(3,Math.ceil(Math.sqrt(n))+1)), rows2=Math.ceil(n/cols);
 const iw=Math.max(10,cols*3), ih=Math.max(6,rows2*2+4);
 rooms.push({kind:'lounge',label:'LOUNGE · CAFÉ',tint:'#3e3441',accent:'#ff9d5c',light:'rgba(255,170,120,.09)',
  loungeCols:cols,band:'bottom',cols,rows:rows2,iw,ih,ow:iw+2,oh:ih+2});}

/* Zwei Bänder: oben Kategorien, unten Kommando + Lounge, dazwischen Korridor */
const topBand=rooms.filter(r=>r.band==='top'), botBand=rooms.filter(r=>r.band==='bottom');
const packW=list=>list.reduce((s,r,i)=>s+r.ow+(i?GAP:0),0);
const topH=Math.max(0,...topBand.map(r=>r.oh)), botH=Math.max(0,...botBand.map(r=>r.oh));
const bandW=Math.max(packW(topBand),packW(botBand),12);
const MW=MARGIN*2+bandW, MH=1+topH+CORR+botH+1;
const corrY0=1+topH, corrY1=corrY0+CORR-1;
function placeBand(list,alignTop,anchorRow){
 let x=MARGIN+Math.max(0,Math.floor((bandW-packW(list))/2));
 for(const r of list){r.x=x; r.y=alignTop?anchorRow:anchorRow-r.oh+1; x+=r.ow+GAP;}
}
placeBand(topBand,false,corrY0-1);   // top: Unterwand am Korridor
placeBand(botBand,true, corrY1+1);   // bottom: Oberwand am Korridor

/* Kachelgitter */
const ROWS=[];
for(let y=0;y<MH;y++)ROWS.push(new Array(MW).fill(' '));
for(const r of rooms){
 for(let y=r.y;y<r.y+r.oh;y++)for(let x=r.x;x<r.x+r.ow;x++)
  ROWS[y][x]=(x===r.x||x===r.x+r.ow-1||y===r.y||y===r.y+r.oh-1)?'#':'.';
 const dx=r.x+Math.floor(r.ow/2)-1, dy=(r.band==='top')?r.y+r.oh-1:r.y;
 ROWS[dy][dx]='D';ROWS[dy][dx+1]='D';
 r.doorX=dx; r.doorY=dy;
}
for(let y=corrY0;y<=corrY1;y++){
 for(let x=MARGIN;x<MARGIN+bandW;x++)ROWS[y][x]='-';
 ROWS[y][MARGIN-1]='#';ROWS[y][MARGIN+bandW]='#';
}
const grid=ROWS.map(r=>r.slice());
const walk=(x,y)=>y>=0&&y<MH&&x>=0&&x<MW&&'.-D'.includes(grid[y][x]);
const block=(x,y)=>{grid[y][x]='#';};

/* Zonen, Labels, Spots, Möbel – alles aus den Pods */
const ROOM_LABELS=[], SPOTS={}, FURN=[], WORK={}, WAIT={}, LEISURE=[];
for(const r of rooms){
 ROOM_LABELS.push({t:r.label,x:r.x+r.ow/2,y:r.y+.3,accent:r.accent});
 FURN.push({t:'screen',x:r.x+1,y:r.y+1,w:r.iw,accent:r.accent}); // Feature-Screen (nicht blockierend)
 if(r.kind==='command'){
  const cx=r.x+Math.floor(r.ow/2), cy=r.y+r.oh-2;
  SPOTS.command={x:cx,y:cy,face:'up'};
  FURN.push({t:'console',x:cx-1,y:cy-1,w:3,accent:r.accent,nb:true});
  WORK.master='command'; WAIT.master='command';
 }else if(r.kind==='lounge'){
  for(let i=0;i<FLEET_IDS.length;i++){
   const cx=r.x+2+(i%r.loungeCols)*2, cy=r.y+2+Math.floor(i/r.loungeCols)*2, nm='leisure'+i;
   SPOTS[nm]={x:cx,y:cy,face:'down'};
   LEISURE.push(nm);
  }
  FURN.push({t:'coffeemachine',x:r.x+1,y:r.y+1});
  FURN.push({t:'arcademachine',x:r.x+r.ow-3,y:r.y+1,w:2});
  FURN.push({t:'couch',x:r.x+2,y:r.y+r.oh-2,w:4});
  FURN.push({t:'plant',x:r.x+1,y:r.y+r.oh-2}); FURN.push({t:'plant',x:r.x+r.ow-2,y:r.y+r.oh-2});
 }else{
  const gx0=r.x+1, gy0=r.y+3; // eine Reihe unter dem Feature-Screen
  r.agents.forEach((a,i)=>{
   const cx=gx0+(i%r.cols)*CELL_W, cy=gy0+Math.floor(i/r.cols)*CELL_H, nm='ws_'+a.id;
   SPOTS[nm]={x:cx+1,y:cy+1,face:'up'};
   FURN.push({t:'desk',x:cx,y:cy,w:3,accent:a.accent,agent:a.id});
   WORK[a.id]=nm; WAIT[a.id]=nm;
  });
 }
}
for(const f of FURN){
 if(f.nb||f.t==='screen')continue;
 for(let dx=0;dx<(f.w||1);dx++)for(let dy=0;dy<(f.h||1);dy++)
  if(walk(f.x+dx,f.y+dy))block(f.x+dx,f.y+dy);
}

/* ================= BFS-Pfad ================= */
function findPath(sx0,sy0,tx,ty){
 if(sx0===tx&&sy0===ty)return[];
 const key=(x,y)=>y*MW+x;
 const prev=new Map();const q=[[sx0,sy0]];prev.set(key(sx0,sy0),null);
 while(q.length){
  const [x,y]=q.shift();
  if(x===tx&&y===ty){
   const path=[];let k=key(x,y);
   while(k!==null){path.push([k%MW,Math.floor(k/MW)]);k=prev.get(k);}
   path.reverse();path.shift();return path;
  }
  for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
   const nx=x+dx,ny=y+dy;
   if(!walk(nx,ny)||prev.has(key(nx,ny)))continue;
   prev.set(key(nx,ny),key(x,y));q.push([nx,ny]);
  }
 }
 return null;
}
/* Kachelpfad -> geglättete Punktfolge (abgerundete Ecken = flüssige Wege) */
function smoothPath(tiles,start){
 const pts=[[start.x,start.y],...tiles];
 if(pts.length<3)return tiles.map(p=>({x:p[0],y:p[1]}));
 const out=[];
 for(let i=1;i<pts.length-1;i++){
  const p0=pts[i-1],p1=pts[i],p2=pts[i+1];
  const d1=[p1[0]-p0[0],p1[1]-p0[1]], d2=[p2[0]-p1[0],p2[1]-p1[1]];
  if(d1[0]===d2[0]&&d1[1]===d2[1]){out.push({x:p1[0],y:p1[1]});continue;}
  const a={x:p1[0]-d1[0]*.42,y:p1[1]-d1[1]*.42}, b={x:p1[0]+d2[0]*.42,y:p1[1]+d2[1]*.42};
  out.push(a);
  for(const t of [.3,.5,.7]){
   out.push({x:(1-t)*(1-t)*a.x+2*(1-t)*t*p1[0]+t*t*b.x,
             y:(1-t)*(1-t)*a.y+2*(1-t)*t*p1[1]+t*t*b.y});
  }
  out.push(b);
 }
 out.push({x:pts[pts.length-1][0],y:pts[pts.length-1][1]});
 return out;
}

const WORLD_W=MW*U, WORLD_H=MH*U;
function P(cx,cy){return [cx*U,cy*U];}
function isoC(tx,ty){return [tx*U+U/2,ty*U+U/2];}  // Kachelzentrum
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}

/* ================= Canvas + Kamera (weich geführt) ================= */
const cv=$('#game'),ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
const staticCv=document.createElement('canvas');staticCv.width=WORLD_W;staticCv.height=WORLD_H;
const sx=staticCv.getContext('2d');sx.imageSmoothingEnabled=true;

let camMin=Math.min(cv.width/WORLD_W,cv.height/WORLD_H);
const cam={x:WORLD_W/2,y:WORLD_H/2,scale:Math.max(camMin,1),tx:0,ty:0};
const camT={x:cam.x,y:cam.y,scale:cam.scale};   // Ziel – Kamera gleitet hin
/* Canvas füllt die Bühne; Auflösung folgt der Anzeigegröße (scharf via DPR) */
function fitCanvas(){
 const r=cv.getBoundingClientRect();
 if(!r.width||!r.height)return;
 const dpr=Math.min(1.5,window.devicePixelRatio||1);
 const w=Math.round(r.width*dpr), h=Math.round(r.height*dpr);
 if(cv.width===w&&cv.height===h)return;
 cv.width=w;cv.height=h;
 ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
 camMin=Math.min(cv.width/WORLD_W,cv.height/WORLD_H);
 clampObj(camT);clampCam();
}
function clampObj(c){
 c.scale=Math.max(camMin,Math.min(3.5,c.scale));
 const vw=cv.width/c.scale, vh=cv.height/c.scale;
 c.x=vw>=WORLD_W?WORLD_W/2:Math.max(vw/2,Math.min(WORLD_W-vw/2,c.x));
 c.y=vh>=WORLD_H?WORLD_H/2:Math.max(vh/2,Math.min(WORLD_H-vh/2,c.y));
}
function clampCam(){
 clampObj(cam);
 cam.tx=cv.width/2-cam.x*cam.scale; cam.ty=cv.height/2-cam.y*cam.scale;
}
function camTick(dt){
 const k=RM?1:Math.min(1,1-Math.exp(-dt*7));
 cam.scale+=(camT.scale-cam.scale)*k;
 cam.x+=(camT.x-cam.x)*k; cam.y+=(camT.y-cam.y)*k;
 clampCam();
}
function camFit(){camT.scale=camMin;camT.x=WORLD_W/2;camT.y=WORLD_H/2;clampObj(camT);}

const PAL={space:'#05060e',cyan:'#53e0ff',green:'#5df2b4',amber:'#ffcf5c',red:'#ff7b6b',violet:'#c99cff'};
function hexA(h,a){const n=parseInt(h.slice(1),16);return 'rgba('+(n>>16)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
function lite(h,d){const n=parseInt(h.slice(1),16);
 const r=Math.min(255,(n>>16)+d),g=Math.min(255,((n>>8)&255)+d),b=Math.min(255,(n&255)+d);
 return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function hash(x,y){let h=(x*374761393+y*668265263)|0;h=(h^(h>>13))*1274126177;return ((h^(h>>16))>>>0)/4294967295;}
function isFloor(x,y){return ROWS[y]&&'.-D'.includes(ROWS[y][x]);}
function grad(c,x0,y0,x1,y1,stops){const g=c.createLinearGradient(x0,y0,x1,y1);for(const[o,cc]of stops)g.addColorStop(o,cc);return g;}
function softShadow(cx,cy,rx,ry,a){const g=sx.createRadialGradient(cx,cy,1,cx,cy,Math.max(rx,ry));
 g.addColorStop(0,'rgba(2,3,8,'+(a||.5)+')');g.addColorStop(1,'rgba(2,3,8,0)');
 sx.fillStyle=g;sx.beginPath();sx.ellipse(cx,cy,rx,ry,0,0,7);sx.fill();}
function furnCenter(f){return P(f.x+(f.w||1)/2,f.y+(f.h||1)/2);}

 // --- Korridor-Röhre ---
 {const X0=MARGIN*U+3,Y0=corrY0*U+3,W=bandW*U-6,H=CORR*U-6;

 }

 // --- Pods (Räume) ---
 for(const r of rooms){

  sx.fillStyle=grad(sx,px0,py0,px0+pw*.8,py0+ph*.8,[[0,'rgba(255,255,255,.05)'],[.5,'rgba(255,255,255,0)']]);
  sx.fillRect(px0,py0,pw,ph);

function initBots(){
 const c=SPOTS.command||{x:Math.floor(MW/2),y:corrY0+1};
 BOT_IDS.forEach((id)=>{bots[id]={id,x:c.x,y:c.y,path:[],dir:'down',spot:null,spotName:null,moveT:0,
  act:'idle',emote:null,dwell:2000,faceAt:null,status:null,nextThink:0,moving:false};});
}
const taken={};
function freeLeisure(b){
 const o=LEISURE.filter(s=>taken[s]===undefined||taken[s]===b.id);
 const pick=o.length?o[Math.floor(Math.random()*o.length)]:LEISURE[Math.floor(Math.random()*LEISURE.length)];
 for(const k in taken)if(taken[k]===b.id)delete taken[k]; taken[pick]=b.id; return pick;
}
/* Freies Leben: [zielX, zielY, blickrichtung, aktivität, emote] */
function freeLife(b){
 const r=Math.random();
 if(r<.52){const sp=freeLeisure(b),S=SPOTS[sp];b.spotName=sp;
  const o=[['coffee','☕'],['nap','💤'],['gaze','✦'],['relax','🎧'],['relax','😌'],['relax','🎵']][Math.floor(Math.random()*6)];
  return [S.x,S.y,S.face,o[0],o[1]];}
 if(r<.72){const other=FLEET_IDS[Math.floor(Math.random()*FLEET_IDS.length)],S=SPOTS[WORK[other]]||SPOTS.command;
  const ty=isFloor(S.x,S.y+1)?S.y+1:S.y; return [S.x,ty,'up','visit','👀'];}
 if(r<.86){const tx=MARGIN+1+Math.floor(Math.random()*Math.max(1,bandW-2)); return [tx,corrY0+1,'down','patrol','📡'];}
 for(let k=0;k<8;k++){const rm=rooms[Math.floor(Math.random()*rooms.length)];
  const tx=rm.x+1+Math.floor(Math.random()*(rm.ow-2)),ty=rm.y+1+Math.floor(Math.random()*(rm.oh-2));
  if(walk(tx,ty))return [tx,ty,'down','wander','🎵'];}
 const sp=freeLeisure(b),S=SPOTS[sp];return [S.x,S.y,S.face,'relax','😌'];
}
function think(b,now){
 if(!DATA)return;
 const a=DATA.agents[b.id]||{status:'idle'}, st=a.status||'idle'; b.st=st;
 let tx,ty,face,act,emote,dwell;
 if(b.id==='master'){const S=SPOTS.command;tx=S.x;ty=S.y;face=S.face;act='oversee';emote='📊';dwell=9e9;}
 else if(st==='running'){const S=SPOTS[WORK[b.id]];tx=S.x;ty=S.y;face=S.face;act='work';emote='⌨';dwell=9e9;}
 else if(st==='waiting'){const S=SPOTS[WAIT[b.id]];tx=S.x;ty=S.y;face=S.face;act='wait';emote=null;dwell=9e9;}
 else if(st==='error'){const S=SPOTS[WORK[b.id]];tx=S.x;ty=S.y;face=S.face;act='error';emote=null;dwell=9e9;}
 else {[tx,ty,face,act,emote]=freeLife(b);dwell=3500+Math.random()*6000;}
 b.act=act;b.emote=emote;b.dwell=dwell;b.faceAt=face;
 if(!b.spawned){b.spawned=true;b.x=tx;b.y=ty;b.path=[];b.dir=face||'down';b.nextThink=now+dwell;return;}
 if(Math.round(b.x)===tx&&Math.round(b.y)===ty&&Math.hypot(b.x-tx,b.y-ty)<.2){b.path=[];if(face)b.dir=face;b.nextThink=now+dwell;return;}
 const p=findPath(Math.round(b.x),Math.round(b.y),tx,ty);
 if(p&&p.length){b.path=smoothPath(p,b);b.moveT=0;b.nextThink=9e9;}else{b.nextThink=now+dwell;}
}
const BOT_SPEED=3.2; // Kacheln/s
function updateBots(dt,now){
 for(const id of BOT_IDS){
  const b=bots[id];
  if(b.path.length){
   b.moving=true;b.moveT+=dt;
   // sanft anfahren + vor dem Ziel abbremsen
   let rem=0,px=b.x,py=b.y;
   for(const p of b.path){rem+=Math.hypot(p.x-px,p.y-py);px=p.x;py=p.y;}
   const v=RM?BOT_SPEED:BOT_SPEED*Math.min(1,.3+b.moveT*2.4)*Math.min(1,.35+rem/1.3);
   let step=v*dt;
   while(step>0&&b.path.length){
    const p=b.path[0],dx=p.x-b.x,dy=p.y-b.y,d=Math.hypot(dx,dy);
    if(d<=step){b.x=p.x;b.y=p.y;step-=d;b.path.shift();}
    else{b.x+=dx/d*step;b.y+=dy/d*step;
     b.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');step=0;}
   }
  }else{
   if(b.moving){b.moving=false;b.moveT=0;if(b.faceAt)b.dir=b.faceAt;b.nextThink=now+(b.dwell||3000);}
   if(DATA&&now>=b.nextThink)think(b,now);
  }
 }
 // „Quatschen": zwei freie, stehende Bots nah beieinander -> zueinander drehen
 for(const id of BOT_IDS){const b=bots[id];b.chat=false;
  if(b.moving||['work','wait','error','oversee'].includes(b.act))continue;
  for(const id2 of BOT_IDS){if(id2===id)continue;const o=bots[id2];
   if(o.moving||['work','wait','error','oversee'].includes(o.act))continue;
   if(Math.hypot(b.x-o.x,b.y-o.y)<1.8){b.chat=true;
    b.dir=Math.abs(o.x-b.x)>Math.abs(o.y-b.y)?(o.x>b.x?'right':'left'):(o.y>b.y?'down':'up');break;}}
 }
}

/* ================= Partikel ================= */
const parts=[];
function spawnParts(){
 if(RM)return;
 if(parts.length>(MOBILE?45:150))return;
 const cm=FURN.find(f=>f.t==='coffeemachine');
 if(cm&&Math.random()<.06){const [cx,cy]=furnCenter(cm);
  parts.push({x:cx,y:cy-16,vx:(Math.random()-.5)*3,vy:-9-Math.random()*5,life:1.6,c:'rgba(220,230,245,.5)',s:2.4});}
 if(Math.random()<.02){const [cx,cy]=isoC(MARGIN+Math.floor(Math.random()*bandW),corrY0+Math.floor(Math.random()*CORR));
  parts.push({x:cx,y:cy,vx:2,vy:-1.5,life:4,c:'rgba(160,180,220,.25)',s:2});}
 for(const id of BOT_IDS){const b=bots[id],a=DATA&&DATA.agents[id];
  if(a&&a.status==='error'&&!b.moving&&Math.random()<.15){const [cx,cy]=isoC(b.x,b.y);
   parts.push({x:cx+(Math.random()-.5)*14,y:cy-14,vx:(Math.random()-.5)*30,vy:-20,life:.4,c:'#ffcf5c',s:2.4});}
  if(b.act==='nap'&&!b.moving&&Math.random()<.025){const [cx,cy]=isoC(b.x,b.y);
   parts.push({x:cx+7,y:cy-24,vx:3,vy:-5,life:1.5,c:'rgba(180,205,245,.6)',s:2});}}
}
function updateParts(dt){
 for(let i=parts.length-1;i>=0;i--){
  const p=parts[i];p.life-=dt;
  if(p.life<=0){parts.splice(i,1);continue;}
  p.x+=p.vx*dt*U/16;p.y+=p.vy*dt*U/16;
 }
}

/* ================= Shuttles: Abflug / Landung =================
 Statuswechsel eines Agenten schickt ein Shuttle: -> running = Abflug,
 running -> ok/idle = Landung, -> error = roter Abbruch. Rein dekorativ. */
const planes=[];
const EO=t=>1-Math.pow(1-t,3);
function stationXY(id){const sp=SPOTS[WORK[id]]||SPOTS.command||{x:MW/2,y:MH/2};return isoC(sp.x,sp.y);}
function spawnPlane(kind,id){
 if(RM)return;
 if(planes.length>(MOBILE?3:7))return;
 const o=stationXY(id), up=[o[0]+250,-3*U];
 const seg = kind==='land' ? {a:up,b:o} : {a:[o[0],o[1]],b:up};
 const ang=Math.atan2(seg.b[1]-seg.a[1],seg.b[0]-seg.a[0]);
 planes.push({kind,id,t:0,dur:kind==='land'?2.4:kind==='abort'?1.8:2.6,seg,ang,accent:ACCENT[id]||COLORS.running});
}
function onStatusChange(id,prev,st){
 if(st==='running')spawnPlane('takeoff',id);
 else if(prev==='running'&&(st==='ok'||st==='idle'))spawnPlane('land',id);
 else if(st==='error')spawnPlane('abort',id);
}
function updatePlanes(dt){
 for(let i=planes.length-1;i>=0;i--){const p=planes[i];p.t+=dt;
  if(p.t>=p.dur){
   if(p.kind==='land'){const o=stationXY(p.id);              // Touchdown-Staub
    for(let k=0;k<6;k++)parts.push({x:o[0]+(hash(k,p.t*7|0)-.5)*14,y:o[1]-6,vx:(hash(k,3)-.5)*20,vy:-8-hash(k,5)*6,life:.5,c:hexA(p.accent,.7),s:2});}
   planes.splice(i,1);}
 }
}
function drawPlanes(s){
 for(const p of planes){
  const t=Math.min(1,p.t/p.dur), e=EO(t), a=p.seg.a, b=p.seg.b;
  const x=a[0]+(b[0]-a[0])*e, y=a[1]+(b[1]-a[1])*e;
  let sc,al;
  if(p.kind==='land'){sc=.32+.68*e; al=t<.15?t/.15:1;}
  else{sc=1-.7*e; al=(t<.08?t/.08:1)*(t>.72?Math.max(0,(1-t)/.28):1);}
  if(p.kind==='abort'&&t>.5)al*=Math.max(0,1-(t-.5)/.5);
  al=Math.max(0,Math.min(1,al)); if(al<=0)continue;
  const col=p.kind==='abort'?COLORS.error:p.accent;
  ctx.save();ctx.globalAlpha=al;ctx.translate(x,y);ctx.rotate(p.ang);ctx.scale(sc,sc);
  const tg=ctx.createLinearGradient(-42,0,-6,0);tg.addColorStop(0,hexA(col,0));tg.addColorStop(1,hexA(col,.55));
  ctx.fillStyle=tg;ctx.beginPath();ctx.moveTo(-42,0);ctx.lineTo(-8,-2.6);ctx.lineTo(-8,2.6);ctx.closePath();ctx.fill();
  ctx.shadowColor=col;ctx.shadowBlur=10;
  ctx.fillStyle=hexA(col,.9);ctx.beginPath();
  ctx.moveTo(2,0);ctx.lineTo(-8,-9);ctx.lineTo(-4,-1);ctx.closePath();
  ctx.moveTo(2,0);ctx.lineTo(-8,9);ctx.lineTo(-4,1);ctx.closePath();ctx.fill();
  ctx.fillStyle='#eef3fb';ctx.beginPath();
  ctx.moveTo(14,0);ctx.lineTo(-7,-3.4);ctx.lineTo(-10,-1.8);ctx.lineTo(-10,1.8);ctx.lineTo(-7,3.4);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle=col;ctx.beginPath();ctx.arc(-9,0,2.1+Math.sin(s*22)*.5,0,7);ctx.fill();
  ctx.restore();
 }
}

/* ================= Render-Loop ================= */
function shootStar(s){return {t:Math.floor(s/11)*11, x:(hash(Math.floor(s/11),8))*WORLD_W*.8, y:(hash(Math.floor(s/11),9))*WORLD_H*.4};}
/* Animierte Zusätze pro Möbel (über der statischen Basis) */
function furnAnim(f,s){
 const A=f.accent||PAL.cyan, X=f.x*U, Y=f.y*U, W=(f.w||1)*U, [cx]=furnCenter(f);
 if(f.t==='screen'){
  const n=Math.max(4,Math.floor(W/20));
  ctx.save();ctx.beginPath();ctx.rect(X,Y+5,W,U-14);ctx.clip();
  for(let i=0;i<n;i++){const h=5+Math.abs(Math.sin(s*1.4+i*1.7+f.x))*11, bx=X+5+i*(W-8)/n;
   ctx.fillStyle=i%3?hexA(A,.3):hexA(A,.8);rr(ctx,bx,Y+U-12-h,(W-8)/n-2,h,1.5);ctx.fill();}
  ctx.restore();
  ctx.fillStyle=hexA(A,.1);ctx.fillRect(X,Y+5+((s*18)%(U-16)),W,2);
 }else if(f.t==='desk'){
  // Holo-Display nur, wenn der Agent wirklich etwas zeigt (Zustand, keine Deko)
  const st=(DATA&&DATA.agents[f.agent]&&DATA.agents[f.agent].status)||'idle';
  if(st==='running'){
   const mx=cx,my=Y-19+Math.sin(s*1.6+f.x)*1.4, pw=Math.min(26,W-4);
   ctx.fillStyle=hexA(A,.07);ctx.beginPath();ctx.moveTo(cx-3,Y+4);ctx.lineTo(mx-pw/2,my+13);ctx.lineTo(mx+pw/2,my+13);ctx.lineTo(cx+3,Y+4);ctx.closePath();ctx.fill();
   rr(ctx,mx-pw/2,my,pw,13,2);ctx.fillStyle=hexA(A,.14);ctx.fill();ctx.strokeStyle=hexA(A,.6);ctx.lineWidth=1;ctx.stroke();
   ctx.strokeStyle=A;ctx.beginPath();
   for(let i=0;i<=pw-6;i+=3){const yy=my+6.5+Math.sin(s*4+i*.3+f.x)*3.5;i?ctx.lineTo(mx-pw/2+3+i,yy):ctx.moveTo(mx-pw/2+3+i,yy);}ctx.stroke();
  }else if(st==='waiting'){
   ctx.fillStyle=hexA(COLORS.waiting,.35+Math.abs(Math.sin(s*2.4))*.5);
   ctx.font='700 12px system-ui,sans-serif';ctx.textAlign='center';ctx.fillText('?',cx,Y-6);ctx.textAlign='left';
  }else if(st==='error'){
   ctx.fillStyle=hexA(COLORS.error,Math.sin(s*8)>0?.8:.25);
   ctx.font='700 11px system-ui,sans-serif';ctx.textAlign='center';ctx.fillText('!',cx,Y-6);ctx.textAlign='left';
  }
 }else if(f.t==='console'){
  const mst=(DATA&&DATA.agents.master&&DATA.agents.master.status)||'idle',col=COLORS[mst]||COLORS.idle,hy=Y-8;
  ctx.save();ctx.strokeStyle=col;ctx.shadowColor=col;ctx.shadowBlur=8;ctx.lineWidth=1.3;ctx.globalAlpha=.85;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.ellipse(cx,hy,16-i*3,8-i*2,s*(1.1+i*.4),0,7);ctx.stroke();}
  ctx.shadowBlur=0;const oa=s*2;ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx+Math.cos(oa)*15,hy+Math.sin(oa)*6,1.9,0,7);ctx.fill();ctx.restore();
 }else if(f.t==='arcademachine'){
  const on=Object.values(bots).some(b=>!b.moving&&['relax','coffee','gaze','nap'].includes(b.act));
  const c=['#c99cff','#53e0ff','#5df2b4'][Math.floor(s*(on?6:1.6))%3];
  ctx.fillStyle=hexA(c,on?.8:.4);rr(ctx,X+8,Y-9,W-16,19,3);ctx.fill();
 }else if(f.t==='coffeemachine'){
  ctx.fillStyle=Math.sin(s*2.4)>0?'#5df2b4':'#1f4a38';ctx.beginPath();ctx.arc(X+11,Y-9,1.6,0,7);ctx.fill();
 }
}
function drawBotFull(id,b,s){
 const a=DATA&&DATA.agents[id]||{}, st=a.status||'idle';
 const [cx,cy]=isoC(b.x,b.y), seed=BOT_IDS.indexOf(id), bob=RM?0:Math.sin(s*1.6+seed)*.5;
 const act=b.chat?'chat':b.act;
 ctx.save();ctx.translate(cx,cy);ctx.scale(1.12,1.12);ctx.translate(-cx,-cy);
 drawBot(id,cx,cy,b.dir,b.moving,st,SEL===id,s,act);
 ctx.restore();
 ctx.font='600 10px system-ui,sans-serif';ctx.textAlign='center';
 ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillText(NAME_OF[id],cx,cy+22.5);
 ctx.fillStyle=hexA(COLORS[st]||COLORS.idle,.95);ctx.fillText(NAME_OF[id],cx,cy+22);
 let tag=null;
 if(st==='running')tag={t:(a.progress||0)+'%',c:COLORS.running};
 else if(st==='waiting')tag={t:'dein go?',c:COLORS.waiting,blink:true};
 else if(st==='error')tag={t:'fehler',c:COLORS.error};
 else if(b.chat)tag={t:'💬',c:'#aeb8d0',big:true};
 else if(b.emote&&!b.moving)tag={t:b.emote,c:'#aeb8d0',big:true};
 if(tag&&!(tag.blink&&Math.sin(s*5)<0&&!RM)){
  ctx.font=(tag.big?'13px ':'600 10px ')+'system-ui,sans-serif';
  const tw=ctx.measureText(tag.t).width+(tag.big?12:14), bx=cx-tw/2, by=cy-33+bob;
  rr(ctx,bx,by-13,tw,17,8);ctx.fillStyle='rgba(9,12,22,.9)';ctx.fill();
  ctx.strokeStyle=hexA(tag.c,.8);ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#eef2fb';ctx.fillText(tag.t,cx,by-1);
 }
 ctx.textAlign='left';
}
const NEBULAS=[[.22,.14,'rgba(64,42,118,.20)'],[.82,.3,'rgba(28,90,130,.16)'],[.5,.94,'rgba(82,42,110,.15)']];
function draw(t){
 const s=t/1000;
 // --- Weltraum full-bleed (Screen-Space; ferne Sterne bewegen sich nicht mit) ---
 ctx.setTransform(1,0,0,1,0,0);
 ctx.fillStyle=PAL.space;ctx.fillRect(0,0,cv.width,cv.height);
 for(const [nx,ny,nc] of NEBULAS){
  const g=ctx.createRadialGradient(nx*cv.width,ny*cv.height,10,nx*cv.width,ny*cv.height,cv.width*.42);
  g.addColorStop(0,nc);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,cv.width,cv.height);}
 const starN=Math.min(420,Math.round(cv.width*cv.height/5600));
 for(let i=0;i<starN;i++){
  const x=hash(i,1)*cv.width,y=hash(i,2)*cv.height,r=hash(i,5)>.93?1.6:.8;
  const tw=RM?1:(.72+Math.sin(s*1.2+i)*.28);
  ctx.globalAlpha=(.28+hash(i,3)*.55)*tw;
  ctx.fillStyle=hash(i,4)>.85?'#bfe0ff':'#eef3ff';ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();}
 ctx.globalAlpha=1;
 if(!RM){const st2=shootStar(s),k=(s-st2.t)/1.2;
  if(k<1){const sxp=st2.x/WORLD_W*cv.width,syp=st2.y/WORLD_H*cv.height;
   ctx.strokeStyle=`rgba(200,225,255,${(1-k)*.9})`;ctx.lineWidth=1.5;
   ctx.beginPath();ctx.moveTo(sxp+k*160,syp+k*70);ctx.lineTo(sxp+k*160-22,syp+k*70-10);ctx.stroke();}}
 // --- Welt ---
 ctx.setTransform(cam.scale,0,0,cam.scale,cam.tx,cam.ty);ctx.imageSmoothingEnabled=true;
 ctx.drawImage(staticCv,0,0);
 if(!RM){
  // Datenstrom im Korridor
  ctx.fillStyle=hexA(PAL.cyan,.7);ctx.shadowColor=PAL.cyan;ctx.shadowBlur=6;
  for(let i=0;i<Math.max(8,bandW);i++){const [px,py]=isoC(MARGIN+((s*3+i*1.7)%bandW),corrY0+CORR/2-.5);
   ctx.globalAlpha=.3+Math.sin(s*3+i)*.25;ctx.beginPath();ctx.arc(px,py,1.8,0,7);ctx.fill();}
  ctx.shadowBlur=0;ctx.globalAlpha=1;
 }
 // Möbel-Animationen
 for(const f of FURN)furnAnim(f,s);
 // Bots nach y sortiert (untere verdecken obere)
 const order=[...BOT_IDS].sort((a,b2)=>bots[a].y-bots[b2].y);
 for(const id of order)drawBotFull(id,bots[id],s);
 // Partikel + Shuttles
 for(const p of parts){ctx.globalAlpha=Math.max(0,Math.min(1,p.life));ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.s*.7,0,7);ctx.fill();}
 ctx.globalAlpha=1;
 drawPlanes(s);
 // Nachricht des gewählten Agenten
 if(SEL&&DATA){const a=DATA.agents[SEL],b=bots[SEL];if(a&&a.message&&b){const [X,Y]=isoC(b.x,b.y);
  ctx.font='12px ui-monospace,Consolas,monospace';ctx.textAlign='left';
  const msg=a.message.length>42?a.message.slice(0,41)+'…':a.message, tw=ctx.measureText(msg).width+16;
  const bx=Math.max(6,Math.min(WORLD_W-tw-6,X-tw/2)), by=Y-54;
  rr(ctx,bx,by-16,tw,22,5);ctx.fillStyle='rgba(10,13,24,.93)';ctx.fill();ctx.strokeStyle='#4b5b8a';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#e8edf7';ctx.fillText(msg,bx+8,by-1);
  ctx.fillStyle='rgba(10,13,24,.93)';ctx.beginPath();ctx.moveTo(X-5,by+6);ctx.lineTo(X+5,by+6);ctx.lineTo(X,by+13);ctx.fill();}}
 // --- Vignette (Screen-Space, fokussiert die Mitte) ---
 ctx.setTransform(1,0,0,1,0,0);
 const vg=ctx.createRadialGradient(cv.width/2,cv.height/2,Math.min(cv.width,cv.height)*.42,cv.width/2,cv.height/2,Math.max(cv.width,cv.height)*.78);
 vg.addColorStop(0,'rgba(3,5,12,0)');vg.addColorStop(1,'rgba(3,5,12,.5)');
 ctx.fillStyle=vg;ctx.fillRect(0,0,cv.width,cv.height);
}

let lastT=0;
function loop(t){
 const dt=Math.min(.06,(t-lastT)/1000);lastT=t;
 camTick(dt);
 updateBots(dt,performance.now());
 spawnParts();updateParts(dt);updatePlanes(dt);
 draw(t);
 requestAnimationFrame(loop);
}

/* ================= Kamera-Steuerung =================
 Ziehen schwenkt (direkt), Rad zoomt weich auf den Cursor, Doppelklick zeigt
 alles, Klick ohne Ziehen wählt den nächsten Bot. Pointer-Events = Maus+Touch. */
function canvasXY(e){const r=cv.getBoundingClientRect();
 return {mx:(e.clientX-r.left)*cv.width/r.width, my:(e.clientY-r.top)*cv.height/r.height, rw:cv.width/r.width};}
function toWorld(e){const {mx,my}=canvasXY(e);return {mx,my,wx:(mx-cam.tx)/cam.scale,wy:(my-cam.ty)/cam.scale};}
let drag=null;
cv.addEventListener('pointerdown',e=>{drag={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y,moved:false};
 try{cv.setPointerCapture(e.pointerId);}catch(_){}});
cv.addEventListener('pointermove',e=>{if(!drag)return;
 const {rw}=canvasXY(e), dx=e.clientX-drag.x, dy=e.clientY-drag.y;
 if(Math.abs(dx)+Math.abs(dy)>4)drag.moved=true;
 cam.x=drag.cx-dx*rw/cam.scale; cam.y=drag.cy-dy*rw/cam.scale;
 camT.x=cam.x;camT.y=cam.y;clampObj(camT);clampCam();});
cv.addEventListener('pointerup',e=>{if(drag&&!drag.moved)pickBot(e); drag=null;});
cv.addEventListener('pointercancel',()=>{drag=null;});
cv.addEventListener('wheel',e=>{e.preventDefault();
 const {mx,my}=canvasXY(e);

 camT.scale=Math.max(camMin,Math.min(3.5,camT.scale*(e.deltaY<0?1.16:1/1.16)));
 camT.x=wx-(mx-cv.width/2)/camT.scale;
 camT.y=wy-(my-cv.height/2)/camT.scale;
 clampObj(camT);
},{passive:false});

function pickBot(e){const {wx,wy}=toWorld(e);
 let best=null,bd=1e9;
 for(const id of BOT_IDS){const b=bots[id];const [px,py]=isoC(b.x,b.y);const d=Math.hypot(px-wx,(py-8)-wy);if(d<26&&d<bd){bd=d;best=id;}}
 if(best){select(best);centerOn(best);}}

async function apiPost(url,body){
 const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
 const j=await r.json().catch(()=>({}));
 if(!r.ok)throw new Error(j.error||r.status);
 return j;
}
function flash(el,txt,ok){if(!el)return;el.textContent=txt;el.style.color=ok?'var(--grn)':'var(--red)';setTimeout(()=>{if(el)el.textContent='';},3200);}
async function startRun(id,btn,prompt){
 if(FORCE_DEMO){ // Vorschau: Lauf nur simulieren, nie echte Agents starten
  const a=DATA.agents[id];
  if(a&&a.status!=='running'){a.status='running';a.phase='Gestartet (Demo)';a.progress=5;a.message='Simulierter Lauf…';applyData();}
  return;
 }
 const t=btn.textContent;btn.disabled=true;btn.textContent='…';
 try{
  await apiPost('/api/run/'+id,prompt?{prompt}:undefined);
  const a=DATA.agents[id];if(a){a.status='running';a.phase='Gestartet';a.progress=2;a.message='Ich lege los…';}
 }catch(err){
  btn.textContent=String(err.message||'').includes('läuft')?'LÄUFT SCHON':'FEHLER';
  await new Promise(r=>setTimeout(r,1600));
 }
 btn.textContent=t;btn.disabled=!API;   // Button zurücksetzen; Panels leiten ihren Zustand neu ab
 applyData();
}

/* ================= Mission Control ================= */
/* Master = Live-Rollup über die Flotte. Ein echter Master-Eintrag
   (Kommandant läuft gerade) überschreibt den Rollup. */
function computeMaster(){
 const list=FLEET_IDS.map(id=>DATA.agents[id]).filter(Boolean);
 const cnt={running:0,ok:0,idle:0,waiting:0,error:0};
 list.forEach(a=>{cnt[a.status]=(cnt[a.status]||0)+1;});
 let status='idle';
 if(cnt.error)status='error';else if(cnt.running)status='running';
 else if(cnt.waiting)status='waiting';else if(cnt.ok&&!cnt.idle)status='ok';
 const parts2=[];
 if(cnt.running)parts2.push(cnt.running+' läuft');
 if(cnt.waiting)parts2.push(cnt.waiting+' wartet');
 if(cnt.error)parts2.push(cnt.error+' Fehler');
 if(!parts2.length)parts2.push('alles ruhig');
 const run=list.filter(a=>a.status==='running');
 const progress=run.length?Math.round(run.reduce((s,a)=>s+(a.progress||0),0)/run.length):(status==='ok'?100:0);
 const real=DATA.agents.master||{};
 const synth={name:'Kommandant',status,phase:cnt.running?('koordiniert '+cnt.running+' Lauf'+(cnt.running>1?'e':'')):(cnt.waiting?'wartet auf dein Go':cnt.error?'Fehler im Blick':'Alle im Blick'),
  progress,message:parts2.join(' · '),_counts:cnt,
  last_run:real.last_run||null,next_run:real.next_run||'laufend',outputs:real.outputs||[],log_tail:real.log_tail||'(Kommandant noch nicht gelaufen)'};
 if(real.status==='running'){synth.status='running';synth.phase=real.phase||synth.phase;synth.progress=real.progress??synth.progress;synth.message=real.message||synth.message;}
 DATA.agents.master=synth;
}

}

function renderCharts(){
 const el=$('#charts');if(!el)return;
 const cnt=(DATA.agents.master&&DATA.agents.master._counts)||{};
 const order=[['running','laufen'],['ok','fertig'],['waiting','warten'],['error','Fehler'],['idle','ruhen']];
 const active=order.filter(([k])=>cnt[k]);
 const segs=active.map(([k])=>`<span style="flex:${cnt[k]} 1 0;background:${COLORS[k]}"></span>`).join('')
  ||`<span style="flex:1;background:oklch(45% 0.02 258)"></span>`;
 const leg=active.map(([k,l])=>`<span><i style="background:${COLORS[k]}"></i><b>${cnt[k]}</b> ${l}</span>`).join('')
  ||'<span>alles ruhig</span>';
 let html=`<div class="gcard"><h4>Flotten-Status <span>${FLEET_IDS.length} Agents</span></h4>
   <div class="statbar" role="img" aria-label="Statusverteilung der Flotte">${segs}</div>
   <div class="statleg">${leg}</div></div>`;
 const up=UPTIME,sites=(up&&up.sites)||[],hist=(up&&up.history)||[];
 if(sites.length){
  const pal=['#53e0ff','#5df2b4','#ff9d5c','#c99cff','#ffcf5c','#ff5ca8'];
  const series=sites.map((s,i)=>({name:s.name,color:pal[i%pal.length],
    pts:hist.map(ptn=>{const q=(ptn.p||[]).find(x=>x.n===s.name);return q?q.ms:null;})}));
  const avail=name=>{const rel=hist.map(ptn=>(ptn.p||[]).find(x=>x.n===name)).filter(Boolean);return rel.length?Math.round(rel.filter(x=>x.up===1).length/rel.length*100):null;};
  html+=`<div class="gcard"><h4>Antwortzeit <span>ms · ${hist.length} Punkte</span></h4>
    ${svgLine(series,{zero:true,aria:'Antwortzeit je Website'})}
    <div class="legend2">${series.map(s=>`<span><i style="background:${s.color};height:8px;border-radius:2px"></i>${esc(s.name)}</span>`).join('')}</div></div>`;
  html+=`<div class="gcard"><h4>SSL-Restlaufzeit <span>Tage · Schwelle 21</span></h4>
    ${svgBars(sites.map(s=>({label:s.name,value:s.ssl_days})),{threshold:21,aria:'SSL-Restlaufzeit'})}</div>`;
  const tiles=sites.map(s=>{const c=COLORS[s.state==='ok'?'ok':s.state==='slow'?'waiting':'error']||COLORS.idle,av=avail(s.name);
    return `<div class="gtile" style="color:${c}"><span class="gd"></span><span class="gn">${esc(s.name)}</span>
      <span class="gv"><b>${s.ms!=null?s.ms+' ms':'–'}</b> · ${av!=null?av+' %':'–'}${s.ssl_days!=null&&s.ssl_days<21?' ⚠':''}</span></div>`;}).join('');
  html+=`<div class="gcard"><h4>Websites <span>Antwort · Verfügbar</span></h4><div class="gtiles">${tiles}</div></div>`;
 }else{
  html+=`<div class="gcard"><h4>Uptime</h4><div class="chart-empty">Noch keine Uptime-Daten. Starte den Uptime-Wächter.</div></div>`;
 }
 el.innerHTML=html;
}

/* Multi-Linien-Zeitchart (Inline-SVG). series:[{name,color,pts:[num|null]}] */
function svgLine(series,o){
 o=o||{};const w=560,h=150,pl=40,pr=12,pt=12,pb=18;
 const n=Math.max(0,...series.map(s=>s.pts.length));
 const vals=series.flatMap(s=>s.pts).filter(v=>v!=null&&!isNaN(v));
 if(n<2||vals.length<2)return `<div class="chart-empty">Sammelt Daten – Liniengrafik ab 2 Messpunkten.</div>`;
 let max=Math.max(...vals),min=o.zero?0:Math.min(...vals);
 if(max<=min)max=min+1;
 const X=i=>pl+(i/(n-1))*(w-pl-pr), Y=v=>pt+(1-(v-min)/(max-min))*(h-pt-pb);
 const grid2=[max,(max+min)/2,min].map(v=>`<line class="gl" x1="${pl}" y1="${Y(v).toFixed(1)}" x2="${w-pr}" y2="${Y(v).toFixed(1)}"/><text class="gt" x="2" y="${(Y(v)+3).toFixed(1)}">${Math.round(v)}</text>`).join('');
 const lines=series.map(s=>{let d='',pen=false;s.pts.forEach((v,i)=>{if(v==null||isNaN(v)){pen=false;return;}d+=(pen?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ';pen=true;});return d?`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="1.6" stroke-linejoin="round"/>`:'';}).join('');
 const dots=series.map(s=>{for(let i=s.pts.length-1;i>=0;i--){const v=s.pts[i];if(v!=null&&!isNaN(v))return `<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.6" fill="${s.color}"/>`;}return '';}).join('');
 return `<svg viewBox="0 0 ${w} ${h}" class="chart" role="img" aria-label="${esc(o.aria||'Verlauf')}">${grid2}${lines}${dots}</svg>`;
}
/* Horizontale Balken mit Warnschwelle. rows:[{label,value}] */
function svgBars(rows,o){
 o=o||{};const w=560,pl=132,pr=48,rh=30,tp=6,thr=o.threshold||21;
 const h=tp*2+rows.length*rh;
 const max=Math.max(thr*1.25,...rows.map(r=>r.value||0),1);
 const X=v=>pl+(v/max)*(w-pl-pr);
 const bars=rows.map((r,i)=>{const y=tp+i*rh+5,v=r.value;
   const col=v==null?'var(--mut)':(v<thr?'var(--red)':(v<thr*2?'var(--amb)':'var(--grn)'));
   const bw=Math.max(2,X(v||0)-pl);
   return `<text class="bl" x="0" y="${y+13}">${esc(r.label)}</text><rect x="${pl}" y="${y}" width="${bw.toFixed(1)}" height="16" rx="3" fill="${col}"/><text class="bv" x="${(X(v||0)+6).toFixed(1)}" y="${y+13}">${v==null?'?':v+'d'}</text>`;}).join('');
 const tx=X(thr).toFixed(1);
 return `<svg viewBox="0 0 ${w} ${h}" class="chart" role="img" aria-label="${esc(o.aria||'Balken')}"><line class="thr" x1="${tx}" y1="2" x2="${tx}" y2="${h-2}"/><text class="thrt" x="${(X(thr)+3).toFixed(1)}" y="12">${thr}d</text>${bars}</svg>`;
}
async function loadSchedule(){try{const r=await fetch('/api/schedule?ts='+Date.now(),{cache:'no-store'});SCHEDULE=r.ok?await r.json():null;}catch(e){SCHEDULE=null;}}
/* Uptime-Charts + Tiles – im Overlay UND im Uptime-Agent-Panel verwendet */
function uptimeBlock(){
 const up=UPTIME,sites=(up&&up.sites)||[],hist=(up&&up.history)||[];
 if(!sites.length)return '<div class="chart-empty">Noch keine Uptime-Daten. Starte den uptime-waechter.</div>';
 const pal=['#53e0ff','#5df2b4','#ff9d5c','#c99cff','#ffcf5c','#ff5ca8'];
 const series=sites.map((s,i)=>({name:s.name,color:pal[i%pal.length],
   pts:hist.map(ptn=>{const q=(ptn.p||[]).find(x=>x.n===s.name);return q?q.ms:null;})}));
 const legend=series.map(s=>`<span><i style="background:${s.color}"></i>${esc(s.name)}</span>`).join('');
 const avail=name=>{const rel=hist.map(ptn=>(ptn.p||[]).find(x=>x.n===name)).filter(Boolean);return rel.length?Math.round(rel.filter(x=>x.up===1).length/rel.length*100):null;};
 const tiles=sites.map(s=>{const c=COLORS[s.state==='ok'?'ok':s.state==='slow'?'waiting':'error']||COLORS.idle,av=avail(s.name);
   return `<div class="tile"><div class="tn" style="color:${c}"><i></i>${esc(s.name)}</div><div class="tm"><b>HTTP ${s.http||'–'}</b> · <b>${s.ms!=null?s.ms+' ms':'–'}</b><br>SSL <b>${s.ssl_days!=null?s.ssl_days+' Tage':'?'}</b>${s.ssl_days!=null&&s.ssl_days<21?' ⚠':''}<br>Verfügbar <b>${av!=null?av+' %':'–'}</b>${s.reason?'<br><span style="color:var(--red)">'+esc(s.reason)+'</span>':''}</div></div>`;}).join('');
 const upNote=up?`${hist.length} Messpunkte · Stand ${new Date(up.stand).toLocaleString('de-AT')}`:'';
 return `<div class="sect"><h3>Antwortzeit <span>ms · je Website</span></h3>${svgLine(series,{zero:true,aria:'Antwortzeit-Verlauf'})}<div class="legend2">${legend}</div></div>
  <div class="sect"><h3>SSL-Restlaufzeit <span>Tage · Warnschwelle 21</span></h3>${svgBars(sites.map(s=>({label:s.name,value:s.ssl_days})),{threshold:21,aria:'SSL'})}</div>
  <div class="sect"><h3>Websites <span>${esc(upNote)}</span></h3><div class="tiles">${tiles}</div></div>`;
}
/* Steuerung: pro Agent aktiv / Zeitplan / Rückfrage / leise / Kanal / Run
   + freies Auftragsfeld an den Kommandant (braucht server.js) */
function controlsBlock(){
 const sa=(SCHEDULE&&SCHEDULE.agents)||{};
 const head=`<div class="ctlhead"><span>Agent</span><span>aktiv</span><span>Zeitplan</span><span title="Vor dem Auto-Start in Discord nachfragen">Frage</span><span title="Routine-Erfolge nicht posten">leise</span><span>Kanal</span><span></span></div>`;
 const rows=FLEET_IDS.map(id=>{const a=DATA.agents[id]||{},s=sa[id]||{};
  return `<div class="ctlrow" data-id="${id}">
   <span class="cn" title="${esc(a.name||id)}">${esc(a.name||id)}</span>
   <label class="sw" title="Agent im Zeitplan aktiv"><input type="checkbox" class="cen" ${s.enabled!==false?'checked':''} ${API?'':'disabled'} aria-label="${esc(a.name||id)} aktiv"><i></i></label>
   <input class="cin cad" value="${esc(s.cadence!=null?s.cadence:(a.next_run||''))}" placeholder="Fr 08:00 · alle 60 min · auf Abruf" ${API?'':'disabled'} aria-label="Zeitplan ${esc(a.name||id)}">
   <label class="ck" title="Vor dem Auto-Start in Discord nachfragen (/ja · /nein)"><input type="checkbox" class="csw" ${s.schwer?'checked':''} ${API?'':'disabled'} aria-label="${esc(a.name||id)} Rückfrage vor Start"><i></i></label>
   <label class="ck" title="Routine-Erfolge nicht nach Discord posten"><input type="checkbox" class="cqt" ${s.quiet?'checked':''} ${API?'':'disabled'} aria-label="${esc(a.name||id)} leise"><i></i></label>
   <input class="cin cch" value="${esc(s.channel||'')}" placeholder="agent-logs" ${API?'':'disabled'} aria-label="Discord-Kanal ${esc(a.name||id)}">
   <button class="btn crun" title="Jetzt starten" ${API?'':'disabled'}>▶</button>
  </div>`;}).join('');
 const meta2=SCHEDULE?`Zeitzone ${esc(SCHEDULE.zeitzone||'Europe/Vienna')} · Nachholfenster ${SCHEDULE.catchup_minuten||120} min`:(API?'Zeitplan wird geladen…':'nur mit server.js');
 return `<div class="sect"><h3>Steuerung <span>${esc(meta2)}</span></h3>
   <div class="ctltable">${head}${rows}</div>
   <div class="ctlbar"><button class="btn prime" id="schedsave" ${API?'':'disabled'}>Zeitplan speichern</button><span id="schedmsg" class="ctlmsg" role="status"></span></div>
   ${API?'':'<p class="hint" style="margin-top:8px;color:var(--mut);font-size:.72rem">Einstellen &amp; koordinieren braucht den laufenden <code style="color:var(--cyan)">server.js</code>. Statisch ist alles nur Anzeige.</p>'}</div>
  <div class="sect"><h3>Auftrag an den Kommandant <span>frei formuliert · nichts geht ohne dein Go raus</span></h3>
   <textarea id="cmdinput" class="cmdinput" rows="2" ${API?'':'disabled'} placeholder="${API?'z. B. Starte seo-audit, danach wochenreport. Melde mir SSL unter 30 Tagen.':'Nur mit laufendem server.js'}"></textarea>
   <div class="ctlbar"><button class="btn prime" id="cmdsend" ${API?'':'disabled'}>▶ An Kommandant senden</button><span id="cmdmsg" class="ctlmsg" role="status"></span></div></div>`;
}
/* Kommandozentrale: EINMAL beim Öffnen das Gerüst bauen (Formulare, Handler),
   danach nur noch die Live-Werte per updateCmd() nachziehen. So bleibt Scroll-
   Position UND getippter Text beim 30-Sekunden-Refresh erhalten. */
function renderCmd(){
 if(!CMD_OPEN||!DATA)return;
 $('#cmd').innerHTML=`<div class="cmd-panel">
   <div class="cmd-top"><h2>Kommandozentrale</h2>
    <span class="up" id="cmdup"></span>
    <div class="pills" id="cmdpills"></div>
    <button class="btn prime" id="cmdrun" ${!API?'disabled':''} title="${API?'Kommandant koordiniert die Flotte':'Nur mit laufendem server.js'}">▶ Koordinieren</button>
    <button class="cmd-close" aria-label="Kommandozentrale schließen">✕</button></div>
   <div id="cmdalerts"></div>
   <div class="cmd-body">
    <div class="cmd-fleet">
     <div class="sect"><h3>Flotte <span>${FLEET_IDS.length} Agents</span></h3><div id="cmdfleet"></div></div>
     <div class="sect"><h3>Kommandant-Log</h3><pre id="cmdlog" style="max-height:26vh;background:oklch(8% 0.02 280);border:1px solid var(--hair);border-radius:8px;padding:10px;font-size:.64rem;white-space:pre-wrap;word-break:break-word;color:oklch(80% 0.04 200);line-height:1.5;overflow:auto"></pre></div>
    </div>
    <div class="cmd-main">
     ${controlsBlock()}
     <div id="cmduptime"></div>
    </div>
   </div></div>`;
 $('#cmd').querySelector('.cmd-close').addEventListener('click',closeCmd);
 const rb=$('#cmdrun');if(rb)rb.addEventListener('click',()=>startRun('master',rb));
 $('#cmd').querySelectorAll('.ctlrow .crun').forEach(btn=>btn.addEventListener('click',()=>startRun(btn.closest('.ctlrow').dataset.id,btn)));
 const save=$('#schedsave');
 if(save)save.addEventListener('click',async()=>{
   if(FORCE_DEMO){flash($('#schedmsg'),'Vorschau-Modus: nichts gespeichert.',false);return;}
   save.disabled=true;
   const agents={};
   $('#cmd').querySelectorAll('.ctlrow').forEach(row=>{
    agents[row.dataset.id]={
     enabled:row.querySelector('.cen').checked,
     cadence:row.querySelector('.cad').value.trim(),
     schwer:row.querySelector('.csw').checked,
     quiet:row.querySelector('.cqt').checked,
     channel:row.querySelector('.cch').value.trim()
    };});
   try{const j=await apiPost('/api/schedule',{agents});SCHEDULE=j.schedule||SCHEDULE;flash($('#schedmsg'),'Zeitplan gespeichert ✓',true);}
   catch(err){flash($('#schedmsg'),'Fehler: '+err.message,false);}finally{save.disabled=!API;}});
 const send=$('#cmdsend'),inp=$('#cmdinput');
 if(send)send.addEventListener('click',async()=>{const txt=(inp.value||'').trim();if(!txt){flash($('#cmdmsg'),'Bitte einen Auftrag eintippen.',false);return;}
   if(FORCE_DEMO){flash($('#cmdmsg'),'Vorschau-Modus: kein echter Lauf gestartet.',false);return;}
   send.disabled=true;send.textContent='…';
   try{await apiPost('/api/run/master',{prompt:'Nutze den Subagent kommandant. Sebastians Auftrag für diesen Lauf: '+txt+' — koordiniere entsprechend, halte dich an deine Regeln, sende nichts nach außen ohne Go.'});
     if(DATA.agents.master){DATA.agents.master.status='running';DATA.agents.master.message='Auftrag läuft…';}inp.value='';flash($('#cmdmsg'),'An Kommandant übergeben ✓',true);applyData();}
   catch(err){flash($('#cmdmsg'),String(err.message||'').includes('läuft')?'Kommandant läuft schon':'Fehler: '+err.message,false);}
   finally{send.disabled=!API;send.textContent='▶ An Kommandant senden';}});
 updateCmd();
}
/* Nur die Live-Regionen der Zentrale nachziehen – Gerüst, Formulare und
   Scroll-Position bleiben unangetastet. */
function updateCmd(){
 if(!CMD_OPEN||!DATA||!$('#cmdpills'))return;
 const m=DATA.agents.master||{},cnt=m._counts||{};
 const up=$('#cmdup');if(up)up.textContent=(DATA.updated?new Date(DATA.updated).toLocaleString('de-AT'):'–')+' · '+(DATA.demo?'DEMO':(API?'LIVE · API':'LIVE · statisch'));
 const pl=$('#cmdpills');if(pl)pl.innerHTML=statusChips(cnt);
 const al=(ids,cls,label)=>ids.length?`<div class="cmd-alert ${cls}"><b>${label}</b> · ${ids.map(id=>{const a=DATA.agents[id]||{};return esc(a.name||id)+' ('+esc(a.message||a.phase||'')+')';}).join(' · ')}</div>`:'';
 const errs=FLEET_IDS.filter(id=>(DATA.agents[id]||{}).status==='error');
 const waits=FLEET_IDS.filter(id=>(DATA.agents[id]||{}).status==='waiting');
 const alx=$('#cmdalerts');if(alx)alx.innerHTML=al(errs,'err','⚠ Fehler')+al(waits,'wait','? Wartet auf dein Go');
 const fl=$('#cmdfleet');
 if(fl){fl.innerHTML=FLEET_IDS.map(id=>{const a=DATA.agents[id]||{},c=COLORS[a.status]||COLORS.idle;
    return `<button class="cmd-tab" data-go="${id}"><span class="cn2">${esc(a.name||id)}<small>${LABELS[a.status]||esc(a.status)} · ${esc(a.phase||'–')}</small></span><span class="cp mono" style="color:${c}">${a.progress!=null?a.progress+'%':''}</span><span class="cnx">${esc(a.next_run||'–')}</span></button>`;}).join('');
   fl.querySelectorAll('.cmd-tab').forEach(el=>el.addEventListener('click',()=>{closeCmd();select(el.dataset.go);}));}
 const lg=$('#cmdlog');if(lg)lg.textContent=m.log_tail||'–';
 const uc=$('#cmduptime');if(uc)uc.innerHTML=uptimeBlock();
}
/* Backdrop-Klick + ESC schließen (Zentrale UND Detail-Drawer) */
$('#cmd').addEventListener('click',e=>{if(e.target.id==='cmd')closeCmd();});
$('#dscrim').addEventListener('click',closeDrawer);
$('#dclose').addEventListener('click',closeDrawer);
$('#drun').addEventListener('click',()=>{if(SEL&&SEL!=='master')startRun(SEL,$('#drun'));});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(CMD_OPEN)closeCmd();else if(DRAWER_OPEN)closeDrawer();}});

/* ================= Laden ================= */
(function legend(){
 $('#legend').innerHTML=Object.keys(LABELS).map(k=>`<span style="color:${COLORS[k]}"><i></i>${LABELS[k]}</span>`).join('');
})();
async function load(){
 if(FORCE_DEMO){
  DATA=DEMO;DATA.demo=true;$('#demo').textContent='Vorschau-Modus (?demo) – simulierte Läufe, kein echter Agent gestartet';$('#demo').style.display='block';
 }else try{
  const r=await fetch('status.json?ts='+Date.now(),{cache:'no-store'});
  if(!r.ok)throw 0;
  DATA=await r.json();DATA.demo=false;
  $('#demo').style.display='none';
 }catch(e){
  DATA=DEMO;DATA.demo=true;
  $('#demo').style.display='block';
 }
 /* Uptime-Daten (vom Wrapper nach httpdocs gespiegelt) – best effort */
 try{const ur=await fetch('uptime.json?ts='+Date.now(),{cache:'no-store'});UPTIME=ur.ok?await ur.json():null;}catch(e){UPTIME=null;}
 if((!UPTIME||!(UPTIME.sites||[]).length)&&DATA.demo)UPTIME=DEMO_UPTIME;
 applyData();
 const anyRunning=Object.values(DATA.agents||{}).some(a=>a.status==='running');
 $('#foot2').textContent=FORCE_DEMO?'vorschau':'refresh '+(anyRunning?'5 s':'30 s');
 if(FORCE_DEMO)startTheatre();
 else{clearTimeout(load.t);load.t=setTimeout(load,anyRunning?5000:30000);}
}
/* Vorschau-Choreografie: kippt reihum Status, damit Abflüge/Landungen sichtbar werden. */
function startTheatre(){
 if(theatreOn)return; theatreOn=true;
 const seq=[...FLEET_IDS]; let i=0;
 setInterval(()=>{
  const id=seq[i%seq.length]; i++;
  const a=DATA.agents[id]; if(!a)return;
  if(a.status==='running'){a.status='ok';a.progress=100;a.message='Fertig ✓';a.phase='Abgeschlossen';}
  else{a.status='running';a.progress=8;a.message='läuft…';a.phase='Gestartet';}
  DATA.updated=new Date().toISOString();
  applyData();
 },3600);
}
async function detectApi(){
 try{const r=await fetch('/api/ping');API=r.ok&&(await r.json()).api===true;}catch(e){API=false;}
 const el=$('#apistate');
 el.textContent=API?'API: VERBUNDEN':'API: STATISCH';
 el.className=API?'on':'off';
 if(API){REPORTS=null;loadSchedule();}
 if(DATA)applyData();
}
initBots();
requestAnimationFrame(t=>{lastT=t;requestAnimationFrame(loop);});
detectApi().then(load);
</script>
