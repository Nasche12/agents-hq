<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent HQ – naschberger.info</title>
<style>
:root{
 --bg:oklch(14% 0.03 290);
 --bg-deep:oklch(9% 0.02 290);
 --line-dim:oklch(42% 0.06 250);
 --txt:oklch(91% 0.02 250);
 --mut:oklch(64% 0.03 260);
 --panel:oklch(15% 0.03 280 / .96);
 --cyan:oklch(80% 0.14 200);
 --grn:oklch(80% 0.17 160);
 --amb:oklch(83% 0.15 85);
 --red:oklch(70% 0.19 25);
 --vio:oklch(75% 0.14 300);
}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{
 font-family:"Segoe UI",system-ui,sans-serif;color:var(--txt);
 background:
  radial-gradient(1100px 600px at 75% -10%, oklch(22% 0.07 300 / .5), transparent 60%),
  radial-gradient(900px 600px at 10% 110%, oklch(19% 0.06 220 / .5), transparent 60%),
  linear-gradient(var(--bg), var(--bg-deep));
 overflow:hidden;
}
@media(max-width:1020px){body{overflow-y:auto;overflow-x:hidden}}
.mono{font-family:Consolas,"Cascadia Mono",monospace}
button{font-family:inherit}

#hud{position:fixed;top:0;left:0;right:440px;z-index:5;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 24px;pointer-events:none}
#hud h1{font-size:1rem;letter-spacing:.32em;text-transform:uppercase;font-weight:600}
#hud h1 span{color:var(--cyan)}
#hud h1::after{content:"";display:block;width:52px;height:1px;margin-top:6px;background:linear-gradient(90deg,var(--cyan),transparent)}
#meta{font-size:.64rem;color:var(--mut);text-align:right;letter-spacing:.08em;text-transform:uppercase;line-height:1.7}
#meta .src{display:block}
#demo{display:none;position:fixed;top:10px;left:calc((100vw - 440px)/2);transform:translateX(-50%);z-index:6;border:1px solid var(--amb);color:var(--amb);
 background:oklch(20% 0.04 85 / .88);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px}
#legend{position:fixed;left:24px;bottom:10px;z-index:5;display:flex;gap:14px;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);pointer-events:none}
#legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;background:currentColor;box-shadow:0 0 6px currentColor}
@media(max-width:1020px){
 #hud{position:static;padding:12px 16px 0;right:auto;flex-wrap:wrap;gap:6px;align-items:baseline}
 #meta{text-align:left;font-size:.6rem;flex-basis:100%}
 #meta .src{display:inline}
 #meta .src::before{content:" · "}
 #legend{position:static;padding:8px 16px;flex-wrap:wrap;gap:10px;letter-spacing:.06em}
 #demo{position:static;transform:none;margin:8px auto 0;max-width:92%;width:max-content}
}

#stage{position:fixed;inset:0 440px 34px 0;display:grid;place-items:center;padding:54px 14px 6px;z-index:1}
#game{width:min(100%,calc((100vh - 96px)*1.84));aspect-ratio:46/25;cursor:grab;touch-action:none;
 filter:drop-shadow(0 20px 50px oklch(5% 0.02 290 / .85))}
@media(max-width:1020px){
 #stage{position:static;display:block;padding:8px 0;overflow-x:auto}
 #game{width:940px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}}

/* ---------- mission control ---------- */
#mc{position:fixed;top:0;right:0;bottom:0;width:440px;z-index:8;background:var(--panel);
 border-left:1px solid var(--line-dim);display:flex;flex-direction:column;overflow:hidden}
#mc::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;
 background:linear-gradient(180deg,var(--cyan),transparent 40%,transparent 60%,var(--cyan))}
#mc header{padding:16px 20px 10px}
#mc header h2{font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;color:var(--cyan)}
#mc header .sub{font-size:.62rem;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
#agents{padding:4px 14px}
.arow{display:grid;grid-template-columns:10px 1fr auto auto;gap:10px;align-items:center;width:100%;
 padding:9px 10px;margin:3px 0;background:none;border:1px solid transparent;color:var(--txt);cursor:pointer;text-align:left}
.arow:hover,.arow:focus-visible{border-color:var(--line-dim);outline:none}
.arow.sel{border-color:oklch(60% 0.1 220 / .6);background:oklch(20% 0.04 250 / .4)}
.arow .dot{width:9px;height:9px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
.arow .nm{font-size:.8rem;letter-spacing:.04em;color:var(--txt)}
.arow .nm small{display:block;font-size:.62rem;color:var(--mut);letter-spacing:.08em;text-transform:uppercase}
.arow .pr{font-size:.66rem;color:var(--mut);font-family:Consolas,monospace}
.runbtn{border:1px solid var(--line-dim);background:none;color:var(--cyan);font-size:.72rem;
 padding:5px 11px;cursor:pointer;letter-spacing:.1em}
.runbtn:hover:not(:disabled),.runbtn:focus-visible{border-color:var(--cyan);background:oklch(30% 0.06 210 / .3);outline:none}
.runbtn:disabled{color:var(--mut);cursor:not-allowed;opacity:.55}
#tabs{display:flex;padding:8px 20px 0;border-bottom:1px solid var(--line-dim)}
#tabs button{flex:1;background:none;border:0;border-bottom:2px solid transparent;color:var(--mut);
 font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;padding:9px 0;cursor:pointer}
#tabs button:hover,#tabs button:focus-visible{color:var(--txt);outline:none}
#tabs button.on{color:var(--cyan);border-bottom-color:var(--cyan)}
#tabbody{flex:1;overflow-y:auto;padding:16px 20px;font-size:.84rem}
.plbl{color:var(--mut);font-size:.64rem;text-transform:uppercase;letter-spacing:.18em;margin:13px 0 4px}
.plbl:first-child{margin-top:0}
.pbar{height:6px;background:oklch(12% 0.02 280);border:1px solid var(--line-dim);overflow:hidden}
.pbar div{height:100%;background:linear-gradient(90deg,var(--cyan),var(--vio));transition:width .6s}
.st{font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;display:inline-block;padding:3px 11px;border:1px solid;margin-bottom:4px}
#tabbody ul{margin:4px 0 0 16px;line-height:1.55}
#tabbody pre{background:oklch(11% 0.02 280);border:1px solid var(--line-dim);padding:10px;font-size:.66rem;
 white-space:pre-wrap;word-break:break-word;color:oklch(78% 0.04 200);line-height:1.5;max-height:52vh;overflow:auto}
#tabbody .hint{color:var(--mut);font-style:italic;font-size:.78rem}
#tabbody code{color:var(--cyan);font-size:.76rem}
.repitem{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:baseline;width:100%;padding:8px 10px;margin:2px 0;
 background:none;border:1px solid transparent;color:var(--txt);cursor:pointer;text-align:left;font-size:.76rem}
.repitem:hover,.repitem:focus-visible{border-color:var(--line-dim);outline:none}
.repitem .d{color:var(--mut);font-size:.62rem;font-family:Consolas,monospace}
.repitem .p{color:var(--mut);font-size:.62rem;font-family:Consolas,monospace;grid-column:1/-1}
.mcounts{display:flex;flex-wrap:wrap;gap:14px;font-size:.72rem;font-family:Consolas,monospace;margin-bottom:6px}
.mcounts i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;box-shadow:0 0 6px currentColor;vertical-align:baseline}
.mflag{font-size:.76rem;border:1px solid;padding:9px 11px;margin:10px 0;line-height:1.55}
.mflag b{letter-spacing:.04em}
.mflag.err{color:var(--red);border-color:oklch(52% 0.14 25/.6);background:oklch(24% 0.07 25/.22)}
.mflag.wait{color:var(--amb);border-color:oklch(56% 0.11 85/.5);background:oklch(24% 0.06 85/.16)}
.mtable{display:flex;flex-direction:column;gap:2px}
.mrow{display:grid;grid-template-columns:9px 1fr auto auto;gap:11px;align-items:center;text-align:left;
 background:oklch(16% 0.02 280/.5);border:1px solid var(--line2, var(--line-dim));
 color:var(--txt);padding:8px 11px;cursor:pointer}
.mrow:hover,.mrow:focus-visible{border-color:var(--cyan);outline:none}
.mrow .mdot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 7px currentColor}
.mrow .mn{font-size:.82rem}
.mrow .mn small{display:block;color:var(--mut);font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.mrow .mp{color:var(--cyan);font-size:.72rem}
.mrow .mnext{color:var(--mut);font-size:.66rem;min-width:64px;text-align:right}
/* ---- Nav-Struktur: Kommando-Button + Flotten-Label ---- */
.navlabel{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mut);padding:12px 12px 2px}
.cmdbtn{display:grid;grid-template-columns:11px 1fr auto;gap:11px;align-items:center;width:calc(100% - 16px);
 margin:10px 8px 2px;padding:12px 13px;cursor:pointer;text-align:left;color:var(--txt);
 background:linear-gradient(90deg,oklch(23% 0.06 330 / .55),oklch(18% 0.03 280 / .35));
 border:1px solid var(--line-dim);transition:box-shadow .16s,border-color .16s}
.cmdbtn:hover,.cmdbtn:focus-visible{border-color:var(--mc);box-shadow:inset 0 0 0 1px var(--mc);outline:none}
.cmdbtn .cdot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 9px currentColor}
.cmdbtn .ctx b{font-size:.84rem;letter-spacing:.05em;display:block}
.cmdbtn .ctx small{display:block;color:var(--mut);font-size:.64rem;margin-top:1px}
.cmdbtn .cgo{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mc);white-space:nowrap}

/* ---- Kommandozentrale-Overlay · schwarz/clean/Apple ---- */
#cmd{position:fixed;inset:0;z-index:40;display:none;place-items:center;padding:24px;
 background:oklch(0% 0 0 / .6);-webkit-backdrop-filter:blur(24px) saturate(130%);backdrop-filter:blur(24px) saturate(130%)}
#cmd.on{display:grid}
.cmd-panel{--hair:oklch(100% 0 0 / .09);--hair2:oklch(100% 0 0 / .055);--acc:oklch(64% 0.16 255);--sec:oklch(68% 0.008 260);
 font-family:-apple-system,"SF Pro Display","SF Pro Text",system-ui,"Segoe UI",sans-serif;
 width:min(1120px,100%);max-height:calc(100dvh - 48px);display:flex;flex-direction:column;overflow:hidden;
 background:oklch(6.5% 0.004 280);border:1px solid var(--hair);border-radius:22px;
 box-shadow:0 40px 120px oklch(0% 0 0 / .7), inset 0 1px 0 oklch(100% 0 0 / .06)}
.cmd-top{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--hair);flex:0 0 auto}
.cmd-top h2{font-size:.98rem;letter-spacing:-.01em;text-transform:none;font-weight:600;color:var(--txt);white-space:nowrap}
.cmd-top .up{font-size:.68rem;color:var(--sec);text-transform:none;letter-spacing:0;white-space:nowrap}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.pill{font-size:.7rem;font-family:inherit;border:1px solid var(--hair);border-radius:999px;padding:3px 10px;letter-spacing:0;
 color:var(--sec);background:oklch(100% 0 0 / .03)}
.pill i{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:6px;box-shadow:none;vertical-align:middle}
.cmd-close{flex:0 0 auto;background:oklch(100% 0 0 / .06);border:1px solid var(--hair);color:var(--sec);
 width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem;line-height:1;display:grid;place-items:center;transition:.15s}
.cmd-close:hover,.cmd-close:focus-visible{background:oklch(100% 0 0 / .13);color:var(--txt);border-color:transparent;outline:none}
.cmd-panel .runbtn{border:1px solid var(--hair);border-radius:8px;background:oklch(100% 0 0 / .05);color:var(--txt);
 font-size:.72rem;letter-spacing:0;padding:6px 12px;transition:.15s}
.cmd-panel .runbtn:hover:not(:disabled),.cmd-panel .runbtn:focus-visible{background:oklch(100% 0 0 / .1);border-color:var(--hair);outline:none}
#cmdrun,#cmdsend{background:var(--acc);border-color:transparent;color:#fff;font-weight:600}
#cmdrun:hover:not(:disabled),#cmdsend:hover:not(:disabled){background:oklch(69% 0.16 255)}
.cmd-alert{padding:11px 20px;border-bottom:1px solid var(--hair);font-size:.8rem;line-height:1.55;flex:0 0 auto}
.cmd-alert.err{color:var(--red);background:oklch(30% 0.1 25 / .16)}
.cmd-alert.wait{color:var(--amb);background:oklch(30% 0.09 85 / .14)}
.cmd-alert b{letter-spacing:0}
.cmd-body{display:grid;grid-template-columns:340px 1fr;min-height:0;flex:1 1 auto;overflow:hidden}
.cmd-fleet{padding:16px 18px;border-right:1px solid var(--hair);overflow-y:auto;display:flex;flex-direction:column;gap:20px}
.cmd-main{padding:16px 20px;display:flex;flex-direction:column;gap:20px;min-width:0;overflow-y:auto}
.cmd-fleet::-webkit-scrollbar,.cmd-main::-webkit-scrollbar{width:8px}
.cmd-fleet::-webkit-scrollbar-thumb,.cmd-main::-webkit-scrollbar-thumb{background:oklch(100% 0 0 / .12);border-radius:8px}
.cmd-panel .plbl{text-transform:none;letter-spacing:.01em;color:var(--sec);font-size:.72rem;font-weight:600}
.sect h3{font-size:.74rem;letter-spacing:.01em;text-transform:none;color:var(--sec);font-weight:600;
 margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.sect h3 span{color:var(--sec);opacity:.7;letter-spacing:0;text-transform:none;font-size:.7rem;font-weight:400}
.chart{width:100%;height:auto;display:block}
.chart .gl{stroke:oklch(100% 0 0 / .1);stroke-width:1;opacity:1}
.chart .gt,.chart .bv,.chart .thrt{fill:var(--sec);font:10px ui-monospace,"SF Mono",Consolas,monospace}
.chart .bl{fill:var(--txt);font:11px -apple-system,ui-monospace,Consolas,monospace}
.chart .thr{stroke:var(--amb);stroke-dasharray:3 3;stroke-width:1;opacity:.75}
.chart-empty{color:var(--sec);font-size:.78rem;padding:26px;
 border:1px dashed var(--hair);border-radius:12px;text-align:center}
.legend2{display:flex;gap:16px;flex-wrap:wrap;margin-top:9px;font-size:.66rem;color:var(--sec)}
.legend2 i{display:inline-block;width:12px;height:2px;margin-right:6px;vertical-align:middle}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:9px}
.tile{border:1px solid var(--hair2);border-radius:12px;padding:12px 13px;background:oklch(100% 0 0 / .03)}
.tile .tn{font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:7px}
.tile .tn i{width:7px;height:7px;border-radius:50%;box-shadow:none;flex:0 0 auto}
.tile .tm{font-family:ui-monospace,"SF Mono",Consolas,monospace;font-size:.66rem;color:var(--sec);margin-top:7px;line-height:1.7}
.tile .tm b{color:var(--txt);font-weight:500}
.cmd-tab{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;text-align:left;width:100%;
 background:oklch(100% 0 0 / .03);border:1px solid transparent;border-radius:10px;color:var(--txt);padding:9px 11px;margin-bottom:4px;cursor:pointer;transition:.14s}
.cmd-tab:hover,.cmd-tab:focus-visible{background:oklch(100% 0 0 / .07);border-color:var(--hair);outline:none}
.cmd-tab .cn{font-size:.82rem}
.cmd-tab .cn small{display:block;color:var(--sec);font-size:.64rem;text-transform:none;letter-spacing:0;margin-top:2px}
.cmd-tab .cp{font-family:ui-monospace,Consolas,monospace;font-size:.72rem}
.cmd-tab .cnx{font-family:ui-monospace,Consolas,monospace;font-size:.64rem;color:var(--sec)}
/* Steuerung */
.ctltable{display:flex;flex-direction:column;gap:6px}
.ctlrow{display:grid;grid-template-columns:1fr auto 92px 34px;gap:9px;align-items:center;
 padding:7px 9px;background:oklch(100% 0 0 / .03);border:1px solid var(--hair2);border-radius:10px}
.ctlrow .cn{font-size:.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tgl{display:flex;align-items:center;gap:5px;font-size:.64rem;color:var(--sec);text-transform:none;letter-spacing:0;cursor:pointer}
.tgl input{accent-color:var(--acc);cursor:pointer}
.cad,.cmdinput{background:oklch(100% 0 0 / .05);border:1px solid var(--hair);border-radius:8px;color:var(--txt);
 font-family:ui-monospace,Consolas,monospace;font-size:.72rem;padding:6px 8px;width:100%}
.cad:focus,.cmdinput:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px oklch(64% 0.16 255 / .25)}
.ctlrow .crun{padding:5px 0;text-align:center}
.ctlbar{display:flex;align-items:center;gap:12px;margin-top:9px;flex-wrap:wrap}
.cmdinput{resize:vertical;line-height:1.5}
.ctlmsg{font-size:.7rem;color:var(--sec)}
@media(max-width:820px){
 #cmd{padding:0}
 .cmd-panel{max-height:100dvh;border-radius:0;border:0}
 .cmd-body{grid-template-columns:1fr;overflow-y:auto}
 .cmd-fleet,.cmd-main{overflow-y:visible}
 .cmd-fleet{border-right:0;border-bottom:1px solid var(--hair)}
 .cmd-top{flex-wrap:wrap;gap:10px}
 .pills{margin-left:0;order:3;flex-basis:100%}
}
#apibar{padding:8px 20px;border-top:1px solid var(--line-dim);font-size:.6rem;letter-spacing:.12em;
 text-transform:uppercase;color:var(--mut);display:flex;justify-content:space-between}
#apibar b{font-weight:400}
#apibar .on{color:var(--grn)} #apibar .off{color:var(--amb)}
@media(max-width:1020px){
 #mc{position:static;width:auto;border:1px solid var(--line-dim);margin:0 10px 14px;height:auto}
 #tabbody{max-height:50vh}
}
</style>
</head>
<body>
<div id="demo">Demo-Daten – kein status.json geladen</div>
<div id="hud">
 <h1>AGENT <span>HQ</span></h1>
 <div id="meta" class="mono">–</div>
</div>

<div id="stage">
 <canvas id="game" width="1840" height="1000" aria-label="Agent-HQ Spielwelt: Raumstation mit Themen-Zonen je Agent-Kategorie, Kommandoraum und Lounge. Ziehen zum Schwenken, Mausrad zum Zoomen, Klick wählt einen Agenten."></canvas>
</div>

<div id="legend" class="mono"></div>

<aside id="mc" aria-live="polite">
 <header>
  <h2>Mission Control</h2>
  <div class="sub">naschberger hq · agents</div>
 </header>
 <div id="agents"></div>
 <div id="tabs" role="tablist">
  <button data-tab="info" class="on">Übersicht</button>
  <button data-tab="log">Log</button>
  <button data-tab="reports">Reports</button>
 </div>
 <div id="tabbody"><p class="hint">Agent wählen: Klick auf einen Roboter in der Welt oder eine Zeile oben.</p></div>
 <div id="apibar" class="mono">
  <b id="apistate" class="off">API: PRÜFE…</b>
  <b id="foot2">refresh 30 s</b>
 </div>
</aside>

<div id="cmd" role="dialog" aria-modal="true" aria-label="Kommandozentrale" aria-hidden="true"></div>

<script>
'use strict';
/* ================================================================
   AGENT HQ – Pixel-Game-Welt (Canvas) + Mission Control
   ================================================================ */
const COLORS={running:'#53e0ff',ok:'#5df2b4',idle:'#8ea0bd',waiting:'#ffcf5c',error:'#ff7b6b'};
const LABELS={running:'läuft',ok:'fertig',idle:'freizeit',waiting:'wartet auf dein go',error:'fehler'};

/* ===== Quelle der Wahrheit: Kategorien + Agents =====
   Die ganze Welt (Räume, Arbeitsplätze, Möbel, Farben, Wege) wird hieraus
   GENERIERT – nichts ist mehr hart verdrahtet. Neuer Agent = eine Zeile in
   AGENTS_CFG, die Welt wächst automatisch. Damit er wirklich läuft, braucht er
   zusätzlich einen Prompt in server.js (AGENTS) und einen status.json-Eintrag. */
const CATEGORIES=[
 {id:'monitoring',label:'MONITORING',   accent:'#5df2b4',tint:'#2b3f4c',light:'rgba(110,240,220,.09)'},
 {id:'content',   label:'CONTENT-STUDIO',accent:'#c99cff',tint:'#3d3758',light:'rgba(200,150,255,.10)'},
 {id:'finance',   label:'FINANZEN',     accent:'#ffcf5c',tint:'#423d56',light:'rgba(255,205,110,.09)'}
];
const AGENTS_CFG=[
 {id:'wochenreport',      name:'Wochenreport',        short:'REPORT',  cat:'content',   accent:'#53e0ff',root:'reports'},
 {id:'content-recherche', name:'Content-Recherche',   short:'CONTENT', cat:'content',   accent:'#c99cff',root:'content'},
 {id:'belege-buchhaltung',name:'Belege & Buchhaltung',short:'FINANZ',  cat:'finance',   accent:'#ffcf5c',root:'belege'},
 {id:'rechnungssteller',  name:'Rechnungssteller',    short:'RECHNUNG',cat:'finance',   accent:'#ffd24a',root:'rechnungen'},
 {id:'uptime-waechter',   name:'Uptime-Wächter',      short:'UPTIME',  cat:'monitoring',accent:'#5df2b4',root:'uptime'},
 {id:'seo-audit',         name:'SEO-Audit',           short:'SEO',     cat:'monitoring',accent:'#ff9d5c',root:'seo'}
];
const MASTER_ACCENT='#ff5ca8';
const FLEET_IDS=AGENTS_CFG.map(a=>a.id);
const BOT_IDS=['master',...FLEET_IDS];
const NAME_OF=Object.fromEntries([['master','MASTER'],...AGENTS_CFG.map(a=>[a.id,a.short])]);
const ROOT_OF=Object.fromEntries([['master','master'],...AGENTS_CFG.map(a=>[a.id,a.root])]);

const DEMO={updated:new Date().toISOString(),agents:{

/* ================= Welt prozedural generieren =================
 Aus CATEGORIES + AGENTS_CFG: pro Kategorie ein Themenraum (Größe wächst mit der
 Agent-Zahl), dazu Kommandoraum (Master) + Lounge. ROWS/SPOTS/FURN/ZONES/Labels
 fallen alle aus dem Generator – nichts ist mehr hart verdrahtet.
 Zeichen: '#' Wand, '.' Raumboden, '-' Korridor, 'D' Tür, ' ' Weltraum */
const U=32;
const WS_COLS=4;            // Arbeitsplätze pro Reihe in einem Themenraum
const CELL_W=4, CELL_H=3;   // Kachel-Fußabdruck eines Arbeitsplatzes (Schreibtisch + Standplatz)
const GAP=1, MARGIN=1, CORR=3;

function darken(hex,d){const n=parseInt(hex.slice(1),16);
 const r=Math.max(0,(n>>16)-d),g=Math.max(0,((n>>8)&255)-d),b=Math.max(0,(n&255)-d);
 return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function roomDims(n){
 const cols=Math.min(WS_COLS,Math.max(1,n)), rows=Math.ceil(Math.max(1,n)/cols);
 const iw=Math.max(6,cols*CELL_W), ih=2+rows*CELL_H+1; // +2 Feature-Screen, +1 Puffer
 return {cols,rows,iw,ih,ow:iw+2,oh:ih+2};
}

/* Raum-Definitionen (Position folgt beim Packen) */
const rooms=[];
for(const c of CATEGORIES){
 const agents=AGENTS_CFG.filter(a=>a.cat===c.id);
 if(!agents.length)continue;
 rooms.push({kind:'cat',label:c.label,tint:c.tint,accent:c.accent,light:c.light,agents,band:'top',...roomDims(agents.length)});
}
rooms.push({kind:'command',label:'KOMMANDO',tint:'#33324f',accent:MASTER_ACCENT,light:'rgba(255,120,190,.09)',
 agents:[{id:'master'}],band:'bottom',...roomDims(1)});
{const n=FLEET_IDS.length, cols=Math.min(6,Math.max(3,Math.ceil(Math.sqrt(n))+1)), rows=Math.ceil(n/cols);
 const iw=Math.max(10,cols*3), ih=Math.max(6,rows*2+4);
 rooms.push({kind:'lounge',label:'LOUNGE · CAFÉ',tint:'#493d4a',accent:'#ff9d5c',light:'rgba(255,170,120,.09)',
  loungeCols:cols,band:'bottom',cols,rows,iw,ih,ow:iw+2,oh:ih+2});}

/* Zwei Bänder: oben Kategorien, unten Kommando + Lounge, dazwischen Korridor */
const topBand=rooms.filter(r=>r.band==='top'), botBand=rooms.filter(r=>r.band==='bottom');
const packW=list=>list.reduce((s,r,i)=>s+r.ow+(i?GAP:0),0);
const topH=Math.max(0,...topBand.map(r=>r.oh)), botH=Math.max(0,...botBand.map(r=>r.oh));
const bandW=Math.max(packW(topBand),packW(botBand),12);
const MW=MARGIN*2+bandW, MH=1+topH+CORR+botH+1;
const corrY0=1+topH, corrY1=corrY0+CORR-1;
function placeBand(list,alignTop,anchorRow){
 let x=MARGIN+Math.max(0,Math.floor((bandW-packW(list))/2));
 for(const r of list){r.x=x; r.y=alignTop?anchorRow:anchorRow-r.oh+1; x+=r.ow+GAP;}
}
placeBand(topBand,false,corrY0-1);   // top: Unterwand am Korridor
placeBand(botBand,true, corrY1+1);   // bottom: Oberwand am Korridor

/* Kachelgitter */
const ROWS=[];
for(let y=0;y<MH;y++)ROWS.push(new Array(MW).fill(' '));
for(const r of rooms){
 for(let y=r.y;y<r.y+r.oh;y++)for(let x=r.x;x<r.x+r.ow;x++)
  ROWS[y][x]=(x===r.x||x===r.x+r.ow-1||y===r.y||y===r.y+r.oh-1)?'#':'.';
 const dx=r.x+Math.floor(r.ow/2)-1, dy=(r.band==='top')?r.y+r.oh-1:r.y;
 ROWS[dy][dx]='D';ROWS[dy][dx+1]='D';
}
for(let y=corrY0;y<=corrY1;y++){
 for(let x=MARGIN;x<MARGIN+bandW;x++)ROWS[y][x]='-';
 ROWS[y][MARGIN-1]='#';ROWS[y][MARGIN+bandW]='#';
}
const grid=ROWS.map(r=>r.slice());
const walk=(x,y)=>y>=0&&y<MH&&x>=0&&x<MW&&'.-D'.includes(grid[y][x]);
const block=(x,y)=>{grid[y][x]='#';};

/* Zonen (Boden + Licht), Labels, Spots, Möbel – alles aus den Räumen */
const ROOM_LABELS=[], ZONES=[], SPOTS={}, FURN=[], WORK={}, WAIT={}, LEISURE=[];
for(const r of rooms){
 ZONES.push({x0:r.x,x1:r.x+r.ow-1,y0:r.y,y1:r.y+r.oh-1,a:r.tint,b:darken(r.tint,8),light:r.light,
  cx:r.x+r.ow/2,cy:r.y+r.oh/2});
 ROOM_LABELS.push({t:r.label,x:r.x+r.ow/2,y:r.y+0.1});
 FURN.push({t:'screen',x:r.x+1,y:r.y+1,w:r.iw,accent:r.accent}); // Feature-Screen (nicht blockierend)
 if(r.kind==='command'){
  const cx=r.x+Math.floor(r.ow/2), cy=r.y+r.oh-2;
  SPOTS.command={x:cx,y:cy,face:'up'};
  FURN.push({t:'console',x:cx-1,y:cy-1,w:3,accent:r.accent,nb:true});
  WORK.master='command'; WAIT.master='command';
 }else if(r.kind==='lounge'){
  const chips=['☕ kaffee','🕹 arcade','✦ sterne','⏾ chillen','☕ pause'];
  for(let i=0;i<FLEET_IDS.length;i++){
   const cx=r.x+2+(i%r.loungeCols)*2, cy=r.y+2+Math.floor(i/r.loungeCols)*2, nm='leisure'+i;
   SPOTS[nm]={x:cx,y:cy,face:'down',chip:i<chips.length?chips[i]:undefined};
   LEISURE.push(nm);
  }
  FURN.push({t:'coffeemachine',x:r.x+1,y:r.y+1});
  FURN.push({t:'arcademachine',x:r.x+r.ow-3,y:r.y+1,w:2});
  FURN.push({t:'couch',x:r.x+2,y:r.y+r.oh-2,w:4});
  FURN.push({t:'plant',x:r.x+1,y:r.y+r.oh-2}); FURN.push({t:'plant',x:r.x+r.ow-2,y:r.y+r.oh-2});
 }else{
  const gx0=r.x+1, gy0=r.y+3; // eine Reihe unter dem Feature-Screen
  r.agents.forEach((a,i)=>{
   const cx=gx0+(i%r.cols)*CELL_W, cy=gy0+Math.floor(i/r.cols)*CELL_H, nm='ws_'+a.id;
   SPOTS[nm]={x:cx+1,y:cy+1,face:'up'};
   FURN.push({t:'desk',x:cx,y:cy,w:3,accent:a.accent});
   WORK[a.id]=nm; WAIT[a.id]=nm;
  });
 }
}
for(const f of FURN){
 if(f.nb||f.t==='screen')continue;
 for(let dx=0;dx<(f.w||1);dx++)for(let dy=0;dy<(f.h||1);dy++)
  if(walk(f.x+dx,f.y+dy))block(f.x+dx,f.y+dy);
}

/* ================= BFS-Pfad ================= */
function findPath(sx,sy,tx,ty){
 if(sx===tx&&sy===ty)return[];
 const key=(x,y)=>y*MW+x;
 const prev=new Map();const q=[[sx,sy]];prev.set(key(sx,sy),null);
 while(q.length){
  const [x,y]=q.shift();
  if(x===tx&&y===ty){
   const path=[];let k=key(x,y);
   while(k!==null){path.push([k%MW,Math.floor(k/MW)]);k=prev.get(k);}
   path.reverse();path.shift();return path;
  }
  for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
   const nx=x+dx,ny=y+dy;
   if(!walk(nx,ny)||prev.has(key(nx,ny)))continue;
   prev.set(key(nx,ny),key(x,y));q.push([nx,ny]);
  }
 }
 return null;
}

/* ================= Projektion (Top-down, leicht schief) =================
 Vogelperspektive: Kachel -> Bildschirm 1:1. Tiefe entsteht durch Wandhöhe
 (WALL_H) beim Zeichnen, nicht durch die Projektion. */
const WALL_H=14;
const WORLD_W=MW*U, WORLD_H=MH*U;
function P(cx,cy){return [cx*U,cy*U];}
function isoC(tx,ty){return [tx*U+U/2,ty*U+U/2];}  // Kachelzentrum (Bodenpunkt)
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}

/* ================= Roboter: Mascot-Droiden =================
 Freundlicher schwebender Droide: Verlaufskörper, Glanz-Visier, glühende Augen
 (blinzeln + Blickrichtung), Antenne, Thruster, Bodenschatten + Status-Ring.
 `act` steuert die Pose: work (Arme tippen), nap (Augen zu, sinkt), coffee
 (Tasse), gaze (Blick nach oben), chat (gestikuliert). */
const ACCENT={master:MASTER_ACCENT};
for(const a of AGENTS_CFG)ACCENT[a.id]=a.accent;
function drawBot(id,cx,cy,dir,moving,st,sel,s,act){
 const acc=ACCENT[id]||'#8ea0bd', sc=COLORS[st]||COLORS.idle, seed=BOT_IDS.indexOf(id);
 const nap=act==='nap', work=act==='work'||act==='oversee', chat=act==='chat', gaze=act==='gaze';
 const hov=nap?0:(Math.sin(s*2+seed*1.7)*1.6+(moving?Math.sin(s*12+seed)*1.2:0));
 const floorY=cy+13, by=floorY-10+hov+(nap?4:0);
 ctx.save();
 // Bodenschatten
 ctx.globalAlpha=.4;ctx.fillStyle='#03040a';ctx.beginPath();ctx.ellipse(cx,floorY+3,11-hov*.2,4,0,0,7);ctx.fill();ctx.globalAlpha=1;
 // Status-Ring (pulsiert)
 ctx.strokeStyle=sc;ctx.lineWidth=sel?2.6:1.7;ctx.shadowColor=sc;ctx.shadowBlur=sel?15:8;
 ctx.globalAlpha=sel?.95:(.5+Math.sin(s*2.5+seed)*.18);
 ctx.beginPath();ctx.ellipse(cx,floorY+1,13,5,0,0,7);ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;
 // Thruster-Glow (nicht beim Schlafen)
 if(!nap){const tg=ctx.createRadialGradient(cx,by+9,1,cx,by+9,10);tg.addColorStop(0,acc+'cc');tg.addColorStop(1,acc+'00');
  ctx.globalAlpha=.5+Math.sin(s*16+seed)*.2;ctx.fillStyle=tg;ctx.beginPath();ctx.ellipse(cx,by+10,7,3.5,0,0,7);ctx.fill();ctx.globalAlpha=1;}
 // Arme
 const sw=work?Math.abs(Math.sin(s*7+seed))*3:chat?Math.sin(s*4+seed)*3:moving?Math.sin(s*12+seed)*2.2:Math.sin(s*2+seed);
 for(const sgn of [-1,1]){ctx.fillStyle='#c3ccde';
  const ay=by+2+(work?-sw:sgn*sw);ctx.beginPath();ctx.arc(cx+sgn*10,ay,2.6,0,7);ctx.fill();}
 if(act==='coffee'){ctx.fillStyle='#eef2fb';rr(ctx,cx+8,by-1,5,5,1);ctx.fill();ctx.strokeStyle='#9fb0cf';ctx.lineWidth=1;ctx.stroke();}
 // Torso
 const tw=16,th=15,tx0=cx-tw/2,ty0=by-2;
 const bg=ctx.createLinearGradient(0,ty0,0,ty0+th);bg.addColorStop(0,'#eef1f8');bg.addColorStop(.5,'#b9c2d6');bg.addColorStop(1,'#7c88a4');
 rr(ctx,tx0,ty0,tw,th,5);ctx.fillStyle=bg;ctx.fill();
 ctx.strokeStyle=acc;ctx.globalAlpha=.6;ctx.lineWidth=1.4;rr(ctx,tx0+.7,ty0+.7,tw-1.4,th-1.4,4.3);ctx.stroke();ctx.globalAlpha=1;
 ctx.fillStyle=sc;ctx.shadowColor=sc;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(cx,ty0+th-5,2.1,0,7);ctx.fill();ctx.shadowBlur=0;
 // Kopf / Visier
 const hw=19,hh=13,hx=cx-hw/2,hy=by-16;
 rr(ctx,hx,hy,hw,hh,5.5);const hg=ctx.createLinearGradient(0,hy,0,hy+hh);hg.addColorStop(0,'#20293e');hg.addColorStop(1,'#0b1120');ctx.fillStyle=hg;ctx.fill();
 rr(ctx,hx+2.5,hy+2.5,hw-5,hh-5,3.5);ctx.fillStyle='#05070f';ctx.fill();
 ctx.globalAlpha=.5;ctx.strokeStyle='#aeb9d6';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(cx-2,hy+4.5,4,Math.PI*1.1,Math.PI*1.7);ctx.stroke();ctx.globalAlpha=1;
 // Augen
 const blink=Math.max(0,(Math.sin(s*1.3+seed*2.1)-0.93)/0.07), open=nap?0:1-Math.min(1,blink);
 const eoff=dir==='left'?-2.2:dir==='right'?2.2:0, ey=(dir==='up'||gaze)?-1.6:0, ea=dir==='up'?.5:1, ex=2.9;
 if(nap){ctx.strokeStyle=acc;ctx.lineWidth=1.4;ctx.globalAlpha=.85;
  for(const sgn of[-1,1]){ctx.beginPath();ctx.moveTo(cx+sgn*ex-2,hy+hh/2);ctx.lineTo(cx+sgn*ex+2,hy+hh/2);ctx.stroke();}ctx.globalAlpha=1;}
 else{ctx.fillStyle=acc;ctx.shadowColor=acc;ctx.shadowBlur=7;
  for(const sgn of[-1,1]){ctx.globalAlpha=ea;ctx.beginPath();ctx.ellipse(cx+eoff+sgn*ex,hy+hh/2+ey,1.7,1.7*open+.2,0,0,7);ctx.fill();}
  ctx.shadowBlur=0;ctx.globalAlpha=1;}
 // Antenne mit pulsierender Spitze
 ctx.strokeStyle='#9fb0cf';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx,hy);ctx.lineTo(cx,hy-5);ctx.stroke();
 ctx.fillStyle=acc;ctx.shadowColor=acc;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(cx,hy-6,1.6+Math.sin(s*5+seed)*.4,0,7);ctx.fill();ctx.shadowBlur=0;
 ctx.restore();
}

/* ================= Statische Ebene + Kamera (Top-down) ================= */
const cv=$('#game'),ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
const staticCv=document.createElement('canvas');staticCv.width=WORLD_W;staticCv.height=WORLD_H;
const sx=staticCv.getContext('2d');sx.imageSmoothingEnabled=true;
const lightCv=document.createElement('canvas');lightCv.width=WORLD_W;lightCv.height=WORLD_H;

const camMin=Math.min(cv.width/WORLD_W,cv.height/WORLD_H);
const cam={x:WORLD_W/2,y:WORLD_H/2,scale:Math.max(camMin,1),tx:0,ty:0};
function clampCam(){
 cam.scale=Math.max(camMin,Math.min(3.5,cam.scale));
 const vw=cv.width/cam.scale, vh=cv.height/cam.scale;
 cam.x=vw>=WORLD_W?WORLD_W/2:Math.max(vw/2,Math.min(WORLD_W-vw/2,cam.x));
 cam.y=vh>=WORLD_H?WORLD_H/2:Math.max(vh/2,Math.min(WORLD_H-vh/2,cam.y));
 cam.tx=cv.width/2-cam.x*cam.scale; cam.ty=cv.height/2-cam.y*cam.scale;
}
function camFit(){cam.scale=Math.max(camMin,1);cam.x=WORLD_W/2;cam.y=WORLD_H/2;clampCam();}

const PAL={space:'#05060e',cyan:'#53e0ff',green:'#5df2b4',amber:'#ffcf5c',red:'#ff7b6b',violet:'#c99cff'};
function hexA(h,a){const n=parseInt(h.slice(1),16);return 'rgba('+(n>>16)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
function lite(h,d){const n=parseInt(h.slice(1),16);
 const r=Math.min(255,(n>>16)+d),g=Math.min(255,((n>>8)&255)+d),b=Math.min(255,(n&255)+d);
 return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function hash(x,y){let h=(x*374761393+y*668265263)|0;h=(h^(h>>13))*1274126177;return ((h^(h>>16))>>>0)/4294967295;}
function isFloor(x,y){return ROWS[y]&&'.-D'.includes(ROWS[y][x]);}
function roomAt(x,y){return rooms.find(r=>x>=r.x&&x<r.x+r.ow&&y>=r.y&&y<r.y+r.oh);}
function grad(x0,y0,x1,y1,stops){const g=sx.createLinearGradient(x0,y0,x1,y1);for(const[o,c]of stops)g.addColorStop(o,c);return g;}
function softShadow(cx,cy,rx,ry,a){const g=sx.createRadialGradient(cx,cy,1,cx,cy,Math.max(rx,ry));
 g.addColorStop(0,'rgba(2,3,8,'+(a||.5)+')');g.addColorStop(1,'rgba(2,3,8,0)');
 sx.fillStyle=g;sx.beginPath();sx.ellipse(cx,cy,rx,ry,0,0,7);sx.fill();}
function furnCenter(f){return P(f.x+(f.w||1)/2,f.y+(f.h||1)/2);}

function drawStatic(){
 sx.imageSmoothingEnabled=true;sx.textAlign='left';
 sx.fillStyle=PAL.space;sx.fillRect(0,0,WORLD_W,WORLD_H);
 for(const [nx,ny,nc] of [[.22,.16,'rgba(66,42,120,.22)'],[.8,.3,'rgba(30,92,132,.17)'],[.5,.92,'rgba(84,42,112,.16)']]){
  const g=sx.createRadialGradient(nx*WORLD_W,ny*WORLD_H,10,nx*WORLD_W,ny*WORLD_H,WORLD_W*.42);
  g.addColorStop(0,nc);g.addColorStop(1,'rgba(0,0,0,0)');sx.fillStyle=g;sx.fillRect(0,0,WORLD_W,WORLD_H);}
 const stars=Math.round(WORLD_W*WORLD_H/5200);
 for(let i=0;i<stars;i++){const x=hash(i,1)*WORLD_W,y=hash(i,2)*WORLD_H,r=hash(i,5)>.92?1.7:.9;
  sx.globalAlpha=.3+hash(i,3)*.6;sx.fillStyle=hash(i,4)>.85?'#bfe0ff':'#eef3ff';sx.beginPath();sx.arc(x,y,r,0,7);sx.fill();}
 sx.globalAlpha=1;

 // ---- Böden ----
 for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
  const ch=ROWS[y][x]; if(!'.-D'.includes(ch))continue;
  const X=x*U,Y=y*U, rm=roomAt(x,y), chk=(x+y)&1;
  let base = rm?(chk?lite(rm.tint,22):lite(rm.tint,4)) : (ch==='-'?(chk?'#262e4c':'#1d2440'):'#20263c');
  sx.fillStyle=base;sx.fillRect(X,Y,U,U);
  sx.fillStyle='rgba(0,0,0,.16)';sx.fillRect(X,Y,U,1);sx.fillRect(X,Y,1,U);
  sx.fillStyle='rgba(255,255,255,.03)';sx.fillRect(X+1,Y+1,U-1,1);

/* ================= Bots: Spiel-Logik + Verhaltens-Engine =================
 Läuft ein Task -> Bot arbeitet an der Station. Wartet -> steht dort. Fehler ->
 Funken. Sonst lebt der Bot 24/7 eine Aktivitäts-Schleife: Kaffee, Nap, Sterne
 gucken, Kollegen besuchen, patrouillieren, wandern, quatschen. */
const bots={};
function initBots(){
 const c=SPOTS.command||{x:Math.floor(MW/2),y:corrY0+1};
 BOT_IDS.forEach((id)=>{bots[id]={id,x:c.x,y:c.y,path:[],dir:'down',frame:0,ft:0,spot:null,spotName:null,
  act:'idle',emote:null,dwell:2000,faceAt:null,status:null,nextThink:0,moving:false};});
}
const taken={};
function freeLeisure(b){
 const o=LEISURE.filter(s=>taken[s]===undefined||taken[s]===b.id);
 const pick=o.length?o[Math.floor(Math.random()*o.length)]:LEISURE[Math.floor(Math.random()*LEISURE.length)];
 for(const k in taken)if(taken[k]===b.id)delete taken[k]; taken[pick]=b.id; return pick;
}
/* Freies Leben: [zielX, zielY, blickrichtung, aktivität, emote] */
function freeLife(b){
 const r=Math.random();
 if(r<.52){const sp=freeLeisure(b),S=SPOTS[sp];b.spotName=sp;
  const o=[['coffee','☕'],['nap','💤'],['gaze','✦'],['relax','🎧'],['relax','😌'],['relax','🎵']][Math.floor(Math.random()*6)];
  return [S.x,S.y,S.face,o[0],o[1]];}
 if(r<.72){const other=FLEET_IDS[Math.floor(Math.random()*FLEET_IDS.length)],S=SPOTS[WORK[other]]||SPOTS.command;
  const ty=isFloor(S.x,S.y+1)?S.y+1:S.y; return [S.x,ty,'up','visit','👀'];}
 if(r<.86){const tx=MARGIN+1+Math.floor(Math.random()*Math.max(1,bandW-2)); return [tx,corrY0+1,'down','patrol','📡'];}
 for(let k=0;k<8;k++){const rm=rooms[Math.floor(Math.random()*rooms.length)];
  const tx=rm.x+1+Math.floor(Math.random()*(rm.ow-2)),ty=rm.y+1+Math.floor(Math.random()*(rm.oh-2));
  if(walk(tx,ty))return [tx,ty,'down','wander','🎵'];}
 const sp=freeLeisure(b),S=SPOTS[sp];return [S.x,S.y,S.face,'relax','😌'];
}
function think(b,now){
 if(!DATA)return;
 const a=DATA.agents[b.id]||{status:'idle'}, st=a.status||'idle'; b.st=st;
 let tx,ty,face,act,emote,dwell;
 if(b.id==='master'){const S=SPOTS.command;tx=S.x;ty=S.y;face=S.face;act='oversee';emote='📊';dwell=9e9;}
 else if(st==='running'){const S=SPOTS[WORK[b.id]];tx=S.x;ty=S.y;face=S.face;act='work';emote='⌨';dwell=9e9;}
 else if(st==='waiting'){const S=SPOTS[WAIT[b.id]];tx=S.x;ty=S.y;face=S.face;act='wait';emote=null;dwell=9e9;}
 else if(st==='error'){const S=SPOTS[WORK[b.id]];tx=S.x;ty=S.y;face=S.face;act='error';emote=null;dwell=9e9;}
 else {[tx,ty,face,act,emote]=freeLife(b);dwell=3500+Math.random()*6000;}
 b.act=act;b.emote=emote;b.dwell=dwell;b.faceAt=face;
 if(!b.spawned){b.spawned=true;b.x=tx;b.y=ty;b.path=[];b.dir=face||'down';b.nextThink=now+dwell;return;}
 if(Math.round(b.x)===tx&&Math.round(b.y)===ty){b.path=[];if(face)b.dir=face;b.nextThink=now+dwell;return;}
 const p=findPath(Math.round(b.x),Math.round(b.y),tx,ty);
 if(p&&p.length){b.path=p;b.nextThink=9e9;}else{b.nextThink=now+dwell;}
}
const BOT_SPEED=3.4; // Kacheln/s
function updateBots(dt,now){
 for(const id of BOT_IDS){
  const b=bots[id];
  const wp=b.path[0];
  if(wp){
   b.moving=true;
   const [tx,ty]=wp, dx=tx-b.x,dy=ty-b.y, dist=Math.hypot(dx,dy), step=BOT_SPEED*dt;
   if(dist<=step){b.x=tx;b.y=ty;b.path.shift();}else{b.x+=dx/dist*step;b.y+=dy/dist*step;}
   b.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');
   b.ft+=dt; if(b.ft>.14){b.frame=1-b.frame;b.ft=0;}
  }else{
   if(b.moving){b.moving=false;b.frame=0;if(b.faceAt)b.dir=b.faceAt;b.nextThink=now+(b.dwell||3000);}
   if(DATA&&now>=b.nextThink)think(b,now);
  }
 }
 // „Quatschen": zwei freie, stehende Bots nah beieinander -> zueinander drehen
 for(const id of BOT_IDS){const b=bots[id];b.chat=false;
  if(b.moving||['work','wait','error','oversee'].includes(b.act))continue;
  for(const id2 of BOT_IDS){if(id2===id)continue;const o=bots[id2];
   if(o.moving||['work','wait','error','oversee'].includes(o.act))continue;
   if(Math.hypot(b.x-o.x,b.y-o.y)<1.8){b.chat=true;
    b.dir=Math.abs(o.x-b.x)>Math.abs(o.y-b.y)?(o.x>b.x?'right':'left'):(o.y>b.y?'down':'up');break;}}
 }
}

  parts.push({x:cx,y:cy-16,vx:(Math.random()-.5)*3,vy:-9-Math.random()*5,life:1.6,c:'rgba(220,230,245,.5)',s:2.4});}

  if(a&&a.status==='error'&&!b.moving&&Math.random()<.15){const [cx,cy]=isoC(b.x,b.y);

}
function updateParts(dt){
 for(let i=parts.length-1;i>=0;i--){
  const p=parts[i];p.life-=dt;

  p.x+=p.vx*dt*U/16;p.y+=p.vy*dt*U/16;
 }
}

  const bx=Math.max(6,Math.min(WORLD_W-tw-6,X-tw/2)), by=Y-54;

  ctx.fillStyle='#e8edf7';ctx.fillText(msg,bx+8,by-1);
  ctx.fillStyle='rgba(10,13,24,.93)';ctx.beginPath();ctx.moveTo(X-5,by+6);ctx.lineTo(X+5,by+6);ctx.lineTo(X,by+13);ctx.fill();}}
}

/* ================= Kamera-Steuerung =================
 Ziehen schwenkt, Rad zoomt (auf den Cursor), Doppelklick zeigt alles,
 Tippen/Klick ohne Ziehen wählt den nächsten Bot. Pointer-Events decken
 Maus UND Touch ab (Pinch-Zoom bleibt außen vor – Rad/Doppelklick genügen). */
function canvasXY(e){const r=cv.getBoundingClientRect();
 return {mx:(e.clientX-r.left)*cv.width/r.width, my:(e.clientY-r.top)*cv.height/r.height, rw:cv.width/r.width};}
function toWorld(e){const {mx,my}=canvasXY(e);return {mx,my,wx:(mx-cam.tx)/cam.scale,wy:(my-cam.ty)/cam.scale};}
let drag=null;
cv.addEventListener('pointerdown',e=>{drag={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y,moved:false};
 try{cv.setPointerCapture(e.pointerId);}catch(_){}});
cv.addEventListener('pointermove',e=>{if(!drag)return;
 const {rw}=canvasXY(e), dx=e.clientX-drag.x, dy=e.clientY-drag.y;
 if(Math.abs(dx)+Math.abs(dy)>4)drag.moved=true;
 cam.x=drag.cx-dx*rw/cam.scale; cam.y=drag.cy-dy*rw/cam.scale; clampCam();});
cv.addEventListener('pointerup',e=>{if(drag&&!drag.moved)pickBot(e); drag=null;});
cv.addEventListener('pointercancel',()=>{drag=null;});
cv.addEventListener('wheel',e=>{e.preventDefault();
 const {mx,my,wx,wy}=toWorld(e);
 cam.scale*=e.deltaY<0?1.12:1/1.12; clampCam();
 cam.x=wx+(cv.width/2-mx)/cam.scale; cam.y=wy+(cv.height/2-my)/cam.scale; clampCam();
},{passive:false});
cv.addEventListener('dblclick',camFit);
function pickBot(e){const {wx,wy}=toWorld(e);
 let best=null,bd=1e9;
 for(const id of BOT_IDS){const b=bots[id];const [px,py]=isoC(b.x,b.y);const d=Math.hypot(px-wx,(py-8)-wy);if(d<26&&d<bd){bd=d;best=id;}}
 if(best){select(best);centerOn(best);}}
function centerOn(id){const b=bots[id];const [px,py]=isoC(b.x,b.y);cam.x=px;cam.y=py;clampCam();}

/* Master = Live-Rollup über die Flotte. Immer aktuell, ohne eigenen Lauf.
   Ein echter Master-Eintrag (Kommandant läuft gerade) überschreibt den Rollup. */
function computeMaster(){
 const list=FLEET_IDS.map(id=>DATA.agents[id]).filter(Boolean);
 const cnt={running:0,ok:0,idle:0,waiting:0,error:0};
 list.forEach(a=>{cnt[a.status]=(cnt[a.status]||0)+1;});
 let status='idle';
 if(cnt.error)status='error';else if(cnt.running)status='running';
 else if(cnt.waiting)status='waiting';else if(cnt.ok&&!cnt.idle)status='ok';
 const parts=[];
 if(cnt.running)parts.push(cnt.running+' läuft');
 if(cnt.waiting)parts.push(cnt.waiting+' wartet');
 if(cnt.error)parts.push(cnt.error+' Fehler');
 if(!parts.length)parts.push('alles ruhig');
 const run=list.filter(a=>a.status==='running');
 const progress=run.length?Math.round(run.reduce((s,a)=>s+(a.progress||0),0)/run.length):(status==='ok'?100:0);
 const real=DATA.agents.master||{};
 const synth={name:'Kommandozentrale',status,phase:cnt.running?('koordiniert '+cnt.running+' Lauf'+(cnt.running>1?'e':'')):(cnt.waiting?'wartet auf dein Go':cnt.error?'Fehler im Blick':'Alle im Blick'),
  progress,message:parts.join(' · '),_counts:cnt,
  last_run:real.last_run||null,next_run:real.next_run||'laufend',outputs:real.outputs||[],log_tail:real.log_tail||'(Kommandant noch nicht gelaufen)'};
 if(real.status==='running'){synth.status='running';synth.phase=real.phase||synth.phase;synth.progress=real.progress??synth.progress;synth.message=real.message||synth.message;}
 DATA.agents.master=synth;
}

/* Multi-Linien-Zeitchart (Inline-SVG, self-contained). series:[{name,color,pts:[num|null]}] */
function svgLine(series,o){
 o=o||{};const w=520,h=150,pl=40,pr=12,pt=12,pb=18;
 const n=Math.max(0,...series.map(s=>s.pts.length));
 const vals=series.flatMap(s=>s.pts).filter(v=>v!=null&&!isNaN(v));
 if(n<2||vals.length<2)return `<div class="chart-empty">Sammelt Daten – Liniengrafik ab 2 Messpunkten.</div>`;
 let max=Math.max(...vals),min=o.zero?0:Math.min(...vals);
 if(max<=min)max=min+1;
 const X=i=>pl+(i/(n-1))*(w-pl-pr), Y=v=>pt+(1-(v-min)/(max-min))*(h-pt-pb);
 const grid=[max,(max+min)/2,min].map(v=>`<line class="gl" x1="${pl}" y1="${Y(v).toFixed(1)}" x2="${w-pr}" y2="${Y(v).toFixed(1)}"/><text class="gt" x="2" y="${(Y(v)+3).toFixed(1)}">${Math.round(v)}</text>`).join('');
 const lines=series.map(s=>{let d='',pen=false;s.pts.forEach((v,i)=>{if(v==null||isNaN(v)){pen=false;return;}d+=(pen?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ';pen=true;});return d?`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="1.6" stroke-linejoin="round"/>`:'';}).join('');
 const dots=series.map(s=>{for(let i=s.pts.length-1;i>=0;i--){const v=s.pts[i];if(v!=null&&!isNaN(v))return `<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.6" fill="${s.color}"/>`;}return '';}).join('');
 return `<svg viewBox="0 0 ${w} ${h}" class="chart" role="img" aria-label="${esc(o.aria||'Verlauf')}">${grid}${lines}${dots}</svg>`;
}
/* Horizontale Balken mit Warnschwelle. rows:[{label,value}] */
function svgBars(rows,o){
 o=o||{};const w=520,pl=132,pr=48,rh=30,tp=6,thr=o.threshold||21;
 const h=tp*2+rows.length*rh;
 const max=Math.max(thr*1.25,...rows.map(r=>r.value||0),1);
 const X=v=>pl+(v/max)*(w-pl-pr);
 const bars=rows.map((r,i)=>{const y=tp+i*rh+5,v=r.value;
   const col=v==null?'var(--mut)':(v<thr?'var(--red)':(v<thr*2?'var(--amb)':'var(--grn)'));
   const bw=Math.max(2,X(v||0)-pl);
   return `<text class="bl" x="0" y="${y+13}">${esc(r.label)}</text><rect x="${pl}" y="${y}" width="${bw.toFixed(1)}" height="16" rx="2" fill="${col}"/><text class="bv" x="${(X(v||0)+6).toFixed(1)}" y="${y+13}">${v==null?'?':v+'d'}</text>`;}).join('');
 const tx=X(thr).toFixed(1);
 return `<svg viewBox="0 0 ${w} ${h}" class="chart" role="img" aria-label="${esc(o.aria||'Balken')}"><line class="thr" x1="${tx}" y1="2" x2="${tx}" y2="${h-2}"/><text class="thrt" x="${(X(thr)+3).toFixed(1)}" y="12">${thr}d</text>${bars}</svg>`;
}

 return `<div class="sect"><h3>Antwortzeit <span>ms · je Website</span></h3>${svgLine(series,{zero:true,aria:'Antwortzeit-Verlauf'})}<div class="legend2">${legend}</div></div>

 const errs=FLEET_IDS.filter(id=>(DATA.agents[id]||{}).status==='error');
 const waits=FLEET_IDS.filter(id=>(DATA.agents[id]||{}).status==='waiting');
 const fleet=FLEET_IDS.map(id=>{const a=DATA.agents[id]||{},c=COLORS[a.status]||COLORS.idle;
   return `<button class="cmd-tab" data-go="${id}"><span class="cn">${esc(a.name||id)}<small>${LABELS[a.status]||esc(a.status)} · ${esc(a.phase||'–')}</small></span><span class="cp mono" style="color:${c}">${a.progress!=null?a.progress+'%':''}</span><span class="cnx">${esc(a.next_run||'–')}</span></button>`;}).join('');
 $('#cmd').innerHTML=`<div class="cmd-panel">
   <div class="cmd-top"><h2>Datacenter</h2>
    <span class="up">${DATA.updated?new Date(DATA.updated).toLocaleString('de-AT'):'–'} · ${DATA.demo?'DEMO':(API?'LIVE · API':'LIVE · statisch')}</span>
    <div class="pills">${pills}</div>
    <button class="runbtn" id="cmdrun" ${!API?'disabled':''} title="${API?'Kommandant koordiniert die Flotte':'Nur mit laufendem server.js'}">▶ KOORDINIEREN</button>
    <button class="cmd-close" aria-label="Datacenter schließen">✕</button></div>
   ${al(errs,'err','⚠ Fehler')}${al(waits,'wait','? Wartet auf dein Go')}
   <div class="cmd-body">
    <div class="cmd-fleet">
     <div class="sect"><h3>Flotte <span>${FLEET_IDS.length} Agents</span></h3>${fleet}</div>
     ${controlsBlock()}
    </div>
    <div class="cmd-main">${uptimeBlock()}</div>
   </div></div>`;
 $('#cmd').querySelector('.cmd-close').addEventListener('click',closeCmd);
 $('#cmd').querySelectorAll('.cmd-tab').forEach(el=>el.addEventListener('click',()=>select(el.dataset.go)));
 const post=async(url,body)=>{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||r.status);return j;};
 const flash=(el,txt,ok)=>{if(!el)return;el.textContent=txt;el.style.color=ok?'var(--grn)':'var(--red)';setTimeout(()=>{if(el)el.textContent='';},3000);};
 const cmdRun=async(id,btn,extra)=>{const t=btn.textContent;btn.disabled=true;btn.textContent='…';
   try{await post('/api/run/'+id,extra);const a=DATA.agents[id];if(a){a.status='running';a.phase='Gestartet';a.progress=2;a.message='Läuft…';}applyData();}
   catch(err){btn.textContent=String(err.message||'').includes('läuft')?'LÄUFT':'FEHLER';setTimeout(()=>{btn.disabled=!API;btn.textContent=t;},2000);}};
 const rb=$('#cmdrun');if(rb)rb.addEventListener('click',()=>cmdRun('master',rb));
 $('#cmd').querySelectorAll('.ctlrow .crun').forEach(btn=>btn.addEventListener('click',()=>cmdRun(btn.closest('.ctlrow').dataset.id,btn)));
 const save=$('#schedsave');
 if(save)save.addEventListener('click',async()=>{save.disabled=true;
   const agents={};$('#cmd').querySelectorAll('.ctlrow').forEach(row=>{agents[row.dataset.id]={enabled:row.querySelector('.cen').checked,cadence:row.querySelector('.cad').value.trim()};});
   try{const j=await post('/api/schedule',{agents});SCHEDULE=j.schedule||SCHEDULE;flash($('#schedmsg'),'Zeitplan gespeichert ✓',true);}
   catch(err){flash($('#schedmsg'),'Fehler: '+err.message,false);}finally{save.disabled=false;}});
 const send=$('#cmdsend'),inp=$('#cmdinput');
 if(send)send.addEventListener('click',async()=>{const txt=(inp.value||'').trim();if(!txt){flash($('#cmdmsg'),'Bitte einen Auftrag eintippen.',false);return;}
   send.disabled=true;send.textContent='…';
   try{await post('/api/run/master',{prompt:'Nutze den Subagent kommandant. Sebastians Auftrag für diesen Lauf: '+txt+' — koordiniere entsprechend, halte dich an deine Regeln, sende nichts nach außen ohne Go.'});
     if(DATA.agents.master){DATA.agents.master.status='running';DATA.agents.master.message='Auftrag läuft…';}inp.value='';flash($('#cmdmsg'),'An Kommandant übergeben ✓',true);applyData();}
   catch(err){flash($('#cmdmsg'),String(err.message||'').includes('läuft')?'Kommandant läuft schon':'Fehler: '+err.message,false);}
   finally{send.disabled=!API;send.textContent='▶ An Kommandant senden';}});
}
/* Backdrop-Klick + ESC schließen */
$('#cmd').addEventListener('click',e=>{if(e.target.id==='cmd')closeCmd();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCmd();});

/* ================= Laden ================= */
(function legend(){
 $('#legend').innerHTML=Object.keys(LABELS).map(k=>`<span style="color:${COLORS[k]}"><i></i>${LABELS[k]}</span>`).join('');
})();
async function load(){
 try{
  const r=await fetch('status.json?ts='+Date.now(),{cache:'no-store'});
  if(!r.ok)throw 0;
  DATA=await r.json();DATA.demo=false;
  $('#demo').style.display='none';
 }catch(e){
  DATA=DEMO;DATA.demo=true;
  $('#demo').style.display='block';
 }
 /* Uptime-Daten (vom Wrapper nach httpdocs gespiegelt) – best effort */
 try{const ur=await fetch('uptime.json?ts='+Date.now(),{cache:'no-store'});UPTIME=ur.ok?await ur.json():null;}catch(e){UPTIME=null;}
 if(!UPTIME&&DATA.demo)UPTIME=DEMO_UPTIME;
 applyData();
 const anyRunning=Object.values(DATA.agents||{}).some(a=>a.status==='running');
 $('#foot2').textContent='refresh '+(anyRunning?'5 s':'30 s');
 clearTimeout(load.t);load.t=setTimeout(load,anyRunning?5000:30000);
}
async function detectApi(){
 try{const r=await fetch('/api/ping');API=r.ok&&(await r.json()).api===true;}catch(e){API=false;}
 const el=$('#apistate');
 el.textContent=API?'API: VERBUNDEN':'API: STATISCH';
 el.className=API?'on':'off';
 if(API)REPORTS=null;
 if(DATA)applyData();
}
initBots();
requestAnimationFrame(t=>{lastT=t;requestAnimationFrame(loop);});
detectApi().then(load);
</script>
</body>
</html>
