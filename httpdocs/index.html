<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent HQ – naschberger.info</title>
<style>
:root{--bg:#070b14;--panel:#0d1424;--line:#1c2a45;--txt:#d7e3f4;--mut:#6b7f9e;
--cyan:#22d3ee;--grn:#34d399;--amb:#fbbf24;--red:#f87171;--vio:#a78bfa}
*{box-sizing:border-box;margin:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;
background-image:linear-gradient(rgba(34,211,238,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,.04) 1px,transparent 1px);
background-size:38px 38px}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--line)}
header h1{font-size:1.1rem;letter-spacing:.14em;text-transform:uppercase}
header h1 span{color:var(--cyan)}
#meta{font-size:.75rem;color:var(--mut);text-align:right}
#demo{display:none;background:rgba(251,191,36,.12);color:var(--amb);text-align:center;font-size:.8rem;padding:6px}
main{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px;padding:18px 24px;max-width:1280px;margin:0 auto}
@media(max-width:900px){main{grid-template-columns:1fr}}
#hausbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px;position:relative;overflow:hidden}
#hausbox::after{content:"";position:absolute;inset:0;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(0,0,0,.12) 3px 4px)}
svg text{font-family:'Consolas','Segoe UI',monospace}
.room{fill:#0a1120;stroke:var(--line);stroke-width:1.5}
.roomlbl{fill:var(--mut);font-size:10px;letter-spacing:.2em}
.bot{cursor:pointer}
.bot:hover .body{filter:brightness(1.35)}
.bobbing{animation:bob 2.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.led-running{animation:blink 1s steps(2) infinite}
@keyframes blink{50%{opacity:.25}}
.bubble rect{fill:#101a30;stroke:var(--cyan);stroke-width:1;rx:6}
.bubble text{fill:var(--txt);font-size:10.5px}
.bubble .tail{fill:#101a30;stroke:var(--cyan);stroke-width:1}
aside{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;font-size:.88rem}
aside h2{font-size:1rem;color:var(--cyan);margin-bottom:2px}
aside .st{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:inline-block;padding:2px 10px;border-radius:99px;border:1px solid}
.lbl{color:var(--mut);font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;margin:12px 0 3px}
.bar{height:8px;background:#0a1120;border:1px solid var(--line);border-radius:4px;overflow:hidden}
.bar div{height:100%;background:linear-gradient(90deg,var(--cyan),var(--vio));transition:width .6s}
ul{margin:4px 0 0 16px;line-height:1.5}
pre{background:#0a1120;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:.72rem;
white-space:pre-wrap;word-break:break-word;max-height:180px;overflow:auto;color:#9fb4d4}
.hint{color:var(--mut);font-style:italic}
footer{color:var(--mut);font-size:.72rem;text-align:center;padding:14px}
</style>
</head>
<body>
<div id="demo">⚠ DEMO-DATEN – noch kein status.json vom Server geladen</div>
<header>
  <h1>AGENT <span>HQ</span></h1>
  <div id="meta">–</div>
</header>
<main>
  <div id="hausbox">
    <svg id="haus" viewBox="0 0 640 470" xmlns="http://www.w3.org/2000/svg" aria-label="Agentur-Haus">
      <!-- Dach -->
      <polygon points="40,140 320,30 600,140" fill="#0a1120" stroke="#22d3ee" stroke-width="2"/>
      <text x="320" y="105" text-anchor="middle" fill="#22d3ee" font-size="15" letter-spacing="6">NASCHBERGER HQ</text>
      <circle cx="320" cy="60" r="4" fill="#22d3ee"><animate attributeName="opacity" values="1;.2;1" dur="2s" repeatCount="indefinite"/></circle>
      <line x1="320" y1="30" x2="320" y2="12" stroke="#22d3ee" stroke-width="2"/>
      <!-- Hauskörper -->
      <rect x="40" y="140" width="560" height="300" fill="#0a1120" stroke="#22d3ee" stroke-width="2"/>
      <!-- Räume -->
      <g id="rooms"></g>
      <!-- Serverraum-Deko unten -->
      <g>
        <rect x="52" y="392" width="536" height="40" class="room"/>
        <text x="60" y="384" class="roomlbl">SERVERRAUM · CRON</text>
        <g id="serverleds"></g>
      </g>
    </svg>
  </div>
  <aside id="panel">
    <h2>Agent wählen</h2>
    <p class="hint">Klick auf ein Männchen im Haus, um Details zu sehen: Status, Fortschritt, letzte Ergebnisse, Log.</p>
  </aside>
</main>
<footer>agents.naschberger.info · aktualisiert alle 30 s · Klick auf einen Roboter für Details</footer>
<script>
const COLORS={running:'var(--cyan)',ok:'var(--grn)',idle:'#6b7f9e',waiting:'var(--amb)',error:'var(--red)'};
const LABELS={running:'läuft',ok:'fertig',idle:'wartet auf Einsatz',waiting:'wartet auf dein Go',error:'Fehler'};
const ROOMS=[
 {id:'wochenreport', label:'REPORT-BÜRO',    x:52,  y:158, w:262, h:214},
 {id:'belege-buchhaltung', label:'FINANZ-RAUM', x:326, y:158, w:262, h:100},
 {id:'content-recherche', label:'CONTENT-STUDIO', x:326, y:272, w:262, h:100}
];
const DEMO={updated:new Date().toISOString(),agents:{
 'wochenreport':{name:'Wochenreport',status:'idle',phase:'Bereit',progress:0,message:'Warte auf Freitag 08:00…',
  last_run:null,next_run:'Fr 08:00',details:['Erstellt pro Kunde: Report, PDF, E-Mail-Entwurf, Discord-Post','Versand nur nach deinem Go'],outputs:[],log_tail:'(noch kein Lauf)'},
 'belege-buchhaltung':{name:'Belege & Buchhaltung',status:'waiting',phase:'Rückfrage offen',progress:80,message:'2 Belege unklar – dein Go?',
  last_run:new Date().toISOString(),next_run:'Mo 09:00',details:['Canva-Beleg: Rechnungsnummer fehlt','KONFLIKT: Rechnung 2026-042 doppelt (850 € vs. 920 €)'],outputs:['belege/dashboard.html'],log_tail:'3 Belege archiviert, 1 geflaggt, 1 Konflikt gemeldet.'},
 'content-recherche':{name:'Content-Recherche',status:'ok',phase:'Contentplan KW28 fertig',progress:100,message:'7 Ideen verifiziert ✓',
  last_run:new Date().toISOString(),next_run:'So 17:00',details:['7-Tage-Plan mit Hooks','7 Ideen mit verifizierten Quellen','5 Ad-Hypothesen'],outputs:['content/2026-KW28/contentplan.md','content/2026-KW28/ads.md'],log_tail:'Rückfrage: zählt modified_time als Quellendatum?'}
}};
let DATA=null,SEL=null;

function botSVG(a,room){
 const c=COLORS[a.status]||COLORS.idle;
 const cx=room.x+room.w/2, gy=room.y+room.h-12;
 const msg=(a.message||'…').length>34?(a.message.slice(0,33)+'…'):(a.message||'…');
 const bw=Math.max(70,msg.length*6.4+16);
 let bx=cx-bw/2; bx=Math.max(room.x+4,Math.min(bx,room.x+room.w-bw-4));
 return `<g class="bot" data-id="${room.id}">
   <g class="${a.status==='running'?'bobbing':''}" style="transform-origin:${cx}px ${gy}px">
     <line x1="${cx}" y1="${gy-58}" x2="${cx}" y2="${gy-66}" stroke="${c}" stroke-width="2"/>
     <circle cx="${cx}" cy="${gy-68}" r="3" fill="${c}" class="${a.status==='running'?'led-running':''}"/>
     <rect class="body" x="${cx-14}" y="${gy-58}" width="28" height="22" rx="6" fill="#141f38" stroke="${c}" stroke-width="1.6"/>
     <circle cx="${cx-6}" cy="${gy-48}" r="3" fill="${c}" class="${a.status==='running'?'led-running':''}"/>
     <circle cx="${cx+6}" cy="${gy-48}" r="3" fill="${c}" class="${a.status==='running'?'led-running':''}"/>
     <rect class="body" x="${cx-17}" y="${gy-34}" width="34" height="26" rx="7" fill="#141f38" stroke="${c}" stroke-width="1.6"/>
     <rect x="${cx-9}" y="${gy-28}" width="18" height="8" rx="2" fill="${c}" opacity=".55"/>
     <rect x="${cx-24}" y="${gy-32}" width="7" height="16" rx="3" fill="#141f38" stroke="${c}" stroke-width="1.4"/>
     <rect x="${cx+17}" y="${gy-32}" width="7" height="16" rx="3" fill="#141f38" stroke="${c}" stroke-width="1.4"/>
     <rect x="${cx-12}" y="${gy-8}" width="9" height="8" rx="2" fill="#141f38" stroke="${c}" stroke-width="1.4"/>
     <rect x="${cx+3}" y="${gy-8}" width="9" height="8" rx="2" fill="#141f38" stroke="${c}" stroke-width="1.4"/>
   </g>
   <g class="bubble">
     <rect x="${bx}" y="${gy-104}" width="${bw}" height="24" rx="6"/>
     <polygon class="tail" points="${cx-5},${gy-80} ${cx+5},${gy-80} ${cx},${gy-72}"/>
     <text x="${bx+8}" y="${gy-88}">${msg.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>
   </g>
   <text x="${cx}" y="${gy+2}" text-anchor="middle" fill="${c}" font-size="10" letter-spacing=".12em">${(a.name||room.id).toUpperCase()}</text>
 </g>`;
}
function render(){
 const g=document.getElementById('rooms');
 g.innerHTML=ROOMS.map(r=>{
  const a=DATA.agents[r.id]||{name:r.id,status:'idle',message:'?'};
  return `<rect class="room" x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}"/>
   <text x="${r.x+8}" y="${r.y+16}" class="roomlbl">${r.label}</text>`+botSVG(a,r);
 }).join('');
 document.getElementById('serverleds').innerHTML=Array.from({length:14},(_,i)=>
  `<rect x="${64+i*38}" y="404" width="22" height="16" rx="2" fill="#101a30" stroke="#1c2a45"/>
   <circle cx="${86+i*38-11}" cy="412" r="2.5" fill="${['#22d3ee','#34d399','#a78bfa'][i%3]}">
    <animate attributeName="opacity" values="1;.15;1" dur="${(1+i*.23).toFixed(2)}s" repeatCount="indefinite"/></circle>`).join('');
 document.getElementById('meta').innerHTML='Stand: '+new Date(DATA.updated).toLocaleString('de-AT')+
  (DATA.demo?'':'<br>live von status.json');
 document.querySelectorAll('.bot').forEach(el=>el.addEventListener('click',()=>{SEL=el.dataset.id;panel();}));
 if(SEL)panel();
}
function panel(){
 const a=DATA.agents[SEL]; if(!a)return;
 const c=COLORS[a.status]||COLORS.idle;
 const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
 document.getElementById('panel').innerHTML=`
  <h2>${esc(a.name)}</h2>
  <span class="st" style="color:${c};border-color:${c}">${LABELS[a.status]||a.status}</span>
  <div class="lbl">Aktuelle Phase</div><div>${esc(a.phase||'–')}</div>
  <div class="lbl">Fortschritt</div><div class="bar"><div style="width:${a.progress||0}%"></div></div>
  <div class="lbl">Was zuletzt passiert ist</div>
  ${(a.details&&a.details.length)?'<ul>'+a.details.map(d=>'<li>'+esc(d)+'</li>').join('')+'</ul>':'<span class="hint">–</span>'}
  <div class="lbl">Ergebnisse</div>
  ${(a.outputs&&a.outputs.length)?'<ul>'+a.outputs.map(o=>'<li><code>'+esc(o)+'</code></li>').join('')+'</ul>':'<span class="hint">noch keine</span>'}
  <div class="lbl">Letzter Lauf / Nächster Lauf</div>
  <div>${a.last_run?new Date(a.last_run).toLocaleString('de-AT'):'–'} &nbsp;→&nbsp; ${esc(a.next_run||'–')}</div>
  <div class="lbl">Log (Ende)</div><pre>${esc(a.log_tail||'(leer)')}</pre>`;
}
async function load(){
 try{
  const r=await fetch('status.json?ts='+Date.now(),{cache:'no-store'});
  if(!r.ok)throw 0;
  DATA=await r.json(); DATA.demo=false;
  document.getElementById('demo').style.display='none';
 }catch(e){
  DATA=DEMO; DATA.demo=true;
  document.getElementById('demo').style.display='block';
 }
 render();
}
load(); setInterval(load,30000);
</script>
</body>
</html>
